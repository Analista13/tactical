    };
    const filterBar = `<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px">
      <div style="display:flex;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px">
        ${pbC('t','Total')}${pbC('1','1ª')}${pbC('2','2ª')}
      </div>
      <div style="display:flex;gap:6px">
        ${nbC(1,'1 Partido')}${nbC(3,'Últimas 3J')}${nbC(6,'Últimas 6J')}
      </div>
    </div>`;

    // ── SVG pitch builder ──────────────────────────────────────────────────────
    function buildCarrilesPitch(cData, size='large') {
      // Exact same style as buildZonaPitch — 5 horizontal bands
      const PVW=1050, PVH=680, PP=22;
      const PLH = (PVH - 2*PP) / 5;           // lane height in SVG units ≈ 127.2
      const CL  = LANE_COL;                    // ['#f0883e','#c8a96e','#3fb950','#c8a96e','#f0883e']
      const LBL = ['C1','C2','C3','C4','C5']; // short lane labels

      const ops = cData.c.map(p => Math.min(0.55, p/100*0.7+0.06).toFixed(2));

      // Horizontal lane fills (within pitch boundary)
      const fills = cData.c.map((pct, i) => {
        const y = (PP + i*PLH).toFixed(1);
        const h = PLH.toFixed(1);
        return `<rect x="${PP}" y="${y}" width="${PVW-2*PP}" height="${h}" fill="${CL[i]}" fill-opacity="${ops[i]}"/>`;
      }).join('');

      // Lane dividers: horizontal dashed lines
      const dividers = [1,2,3,4].map(i => {
        const y = (PP + i*PLH).toFixed(1);
        return `<line x1="${PP}" y1="${y}" x2="${PVW-PP}" y2="${y}" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="16 10"/>`;
      }).join('');

      // Font sizes — same logic as buildZonaPitch
      const fs  = size==='large' ? 72 : 90;
      const w   = size==='large' ? '60%;max-width:480px' : '100%';

      // % centered + small label chip in top-left corner of each band
      const labels = cData.c.map((pct, i) => {
        const bandTop = PP + i * PLH;
        const cy      = bandTop + PLH / 2;
        return `
          <text x="${PVW/2}" y="${(cy + fs*0.36).toFixed(1)}" text-anchor="middle" fill="${CL[i]}" font-size="${fs}" font-weight="700" font-family="'Bebas Neue',sans-serif" opacity="0.9">${pct}%</text>
          <text x="${(PP+10).toFixed(1)}" y="${(bandTop+22).toFixed(1)}" text-anchor="start" fill="rgba(255,255,255,0.32)" font-size="20" font-family="'DM Sans',sans-serif" font-weight="700">${LBL[i]}</text>`;
      }).join('');

      return `<svg viewBox="0 0 ${PVW} ${PVH}" style="width:${w};display:block;margin:0 auto;border-radius:6px">
        <rect width="${PVW}" height="${PVH}" fill="#0f2218" rx="6"/>
        ${fills}
        <rect x="${PP}" y="${PP}" width="${PVW-2*PP}" height="${PVH-2*PP}" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="4" rx="3"/>
        <line x1="${PVW/2}" y1="${PP}" x2="${PVW/2}" y2="${PVH-PP}" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
        ${dividers}
        <circle cx="${PVW/2}" cy="${PVH/2}" r="91.5" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
        <circle cx="${PVW/2}" cy="${PVH/2}" r="5" fill="rgba(255,255,255,0.25)"/>
        <rect x="${PP}"         y="${((PVH-403)/2).toFixed(0)}" width="165" height="403" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
        <rect x="${PP}"         y="${((PVH-183)/2).toFixed(0)}" width="55"  height="183" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
        <rect x="${PP-22}"      y="${((PVH-73)/2).toFixed(0)}"  width="22"  height="73"  fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
        <rect x="${PVW-PP-165}" y="${((PVH-403)/2).toFixed(0)}" width="165" height="403" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
        <rect x="${PVW-PP-55}"  y="${((PVH-183)/2).toFixed(0)}" width="55"  height="183" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
        <rect x="${PVW-PP}"     y="${((PVH-73)/2).toFixed(0)}"  width="22"  height="73"  fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
        ${labels}
        <text x="${PVW-PP-10}" y="${PVH-10}" text-anchor="end" fill="rgba(255,255,255,0.15)" font-size="24" font-family="'DM Sans',sans-serif">↑ izq · dcH ↓</text>
      </svg>`;
    }

    // ── 1J MODE ───────────────────────────────────────────────────────────────
    if (carrilesMatchN === 1) {
      const opts = getPartidos().map(p => {
        const loc    = p.local === currentTeam.name ? '🏠' : '✈️';
        const rival  = p.local === currentTeam.name ? p.vis : p.local;
        const sel    = p.id === carrilesMatchId ? 'selected' : '';
        return `<option value="${p.id}" ${sel}>${loc} ${p.j} · ${rival} · ${p.s} · ${p.f}</option>`;
      }).join('');
      const selector = `<div style="margin-bottom:16px">
        <select onchange="carrilesMatchId=parseInt(this.value);renderPosesion()"
          style="width:100%;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer">
          <option value="">— Selecciona un partido —</option>${opts}
        </select></div>`;

      if (!carrilesMatchId) {
        cont.innerHTML = controls + filterBar + selector +
          `<div style="text-align:center;padding:48px;color:var(--text3)">
            <div style="font-size:28px;margin-bottom:10px">☝️</div>
            Selecciona un partido para ver la distribución por carriles</div>`;
        return;
      }

      const entry  = cd[carrilesMatchId]?.[carrilesPeriodo];
      const partido = PARTIDOS.find(p => p.id === carrilesMatchId);
      if (!entry || !partido) {
        cont.innerHTML = controls + filterBar + selector +
          `<div style="text-align:center;padding:48px;color:var(--text3)">Sin datos para este partido</div>`;
        return;
      }

      const rival   = partido.local === currentTeam.name ? partido.vis : partido.local;
      const esLocal = partido.local === currentTeam.name;
      const [mg, mv] = (partido.s || '0-0').split('-').map(Number);
      const won = esLocal ? mg > mv : mv > mg, draw = mg === mv;
      const rc = won ? '#3fb950' : draw ? '#c8a96e' : '#f85149';
      const disp = esLocal ? `${mg}-${mv}` : `${mv}-${mg}`;

      const header = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <span style="font-size:13px;font-weight:700;color:var(--text)">${partido.j} · ${rival}</span>
        <span style="font-size:13px;font-weight:800;color:${rc}">${disp}</span>
        <span style="font-size:11px;color:var(--text3);margin-left:auto">${perLabel}</span>
      </div>`;

      // KPI: dominant lane
      const maxIdx  = entry.c.indexOf(Math.max(...entry.c));
      const balance = (Math.max(...entry.c) - Math.min(...entry.c)).toFixed(1);
      const kpis = `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0">
        ${entry.c.map((val,i) => `
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center">
            <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px">
              <div style="width:8px;height:8px;border-radius:50%;background:${LANE_COL[i]}"></div>
              <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600">${LANE_NAME[i]}</div>
            </div>
            <div style="font-size:40px;font-family:'Bebas Neue',sans-serif;color:${LANE_COL[i]};line-height:1">${val}%</div>
            <div style="height:4px;border-radius:2px;overflow:hidden;margin-top:10px;background:rgba(255,255,255,0.06)">
              <div style="width:${val}%;height:100%;background:${LANE_COL[i]};opacity:0.7"></div>
            </div>
          </div>`).join('')}
      </div>`;

      const pitchBlock = buildCarrilesPitch(entry, 'large');

      // Player table per lane
      const lineupData = (typeof PONF_LINEUPS !== 'undefined' && PONF_LINEUPS[carrilesMatchId]) || [];
      const posMapC = {};
      lineupData.forEach(row => { if (row[1] && row[2]) posMapC[row[1]] = row[2]; });

      const laneRows = entry.players.map((topPlayers, li) => {
        if (!topPlayers.length) return '';
        const totalDur = entry.dur || 1; // total match possession seconds
        const cols = topPlayers.map(pl => {
          const pos    = posMapC[pl.name] || '';
          const plPct  = (pl.dur / totalDur * 100).toFixed(1); // % of total match possession
          const sn     = pl.name.length > 18 ? pl.name.slice(0,17)+'…' : pl.name;
          const posBadge = pos ? `<span style="font-size:9px;color:var(--text3);background:rgba(255,255,255,0.07);border-radius:5px;padding:1px 5px;margin-left:4px">${pos}</span>` : '';
          return `<div style="flex:1;padding:8px 10px;background:var(--bg3);border-radius:7px;min-width:0">
            <div style="font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sn}${posBadge}</div>
            <div style="font-size:12px;font-weight:700;color:var(--accent);margin-top:2px">${plPct}%</div>
          </div>`;
        }).join('');
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="width:72px;flex-shrink:0">
            <span style="font-size:9px;font-weight:700;background:rgba(200,169,110,0.2);color:var(--accent);border:1px solid rgba(200,169,110,0.4);border-radius:6px;padding:2px 7px">${LANE_NAME[li]}</span>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">${entry.c[li]}%</div>
          </div>
          <div style="display:flex;gap:6px;flex:1;min-width:0">${cols}</div>
        </div>`;
      }).join('');

      const playerTable = laneRows ? `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px">Top jugadores por carril · ${perLabel}</div>
        ${laneRows}
      </div>` : '';

      cont.innerHTML = controls + filterBar + selector + header + pitchBlock + kpis + playerTable;
      return;
    }

    // ── FILMSTRIP MODE (3J / 6J) ──────────────────────────────────────────────
    const lastN = getPartidos().slice(-carrilesMatchN);
    const cols  = 3;

    const cards = lastN.map(p => {
      const entry  = cd[p.id]?.[carrilesPeriodo];
      const rival  = p.local === currentTeam.name ? p.vis : p.local;
      const esLocal = p.local === currentTeam.name;
      const [mg, mv] = (p.s || '0-0').split('-').map(Number);
      const won = esLocal?mg>mv:mv>mg, draw = mg===mv;
      const rc  = won?'#3fb950':draw?'#c8a96e':'#f85149';
      const disp = esLocal?`${mg}-${mv}`:`${mv}-${mg}`;
      const rvShort = rival.length>18?rival.slice(0,17)+'…':rival;

      const pitchSVG = entry
        ? buildCarrilesPitch(entry, 'small')
        : `<div style="padding:40px;text-align:center;color:var(--text3);font-size:12px">Sin datos</div>`;

      // Mini bar
      const miniBar = entry ? `<div style="display:flex;height:5px;border-radius:3px;overflow:hidden;margin:8px 12px 4px">
        ${entry.c.map((p,i)=>`<div style="width:${p}%;background:${LANE_COL[i]};opacity:0.8"></div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-around;padding:0 12px 8px;font-size:10px">
        ${entry.c.map((p,i)=>`<span style="color:${LANE_COL[i]};font-weight:${entry.c[i]===Math.max(...entry.c)?'800':'500'}">${p}%</span>`).join('')}
      </div>` : '';

      return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden">
        <div style="padding:8px 12px 6px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;font-weight:700;color:var(--text2)">${p.j}</span>
          <span style="font-size:11px;color:var(--text3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${rvShort}</span>
          <span style="font-size:13px;font-weight:800;color:${rc}">${disp}</span>
        </div>
        ${pitchSVG}${miniBar}
      </div>`;
    });

    const grid = `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:14px">${cards.join('')}</div>`;

    // Legend
    const legend = `<div style="display:flex;justify-content:center;gap:16px;margin-bottom:16px;flex-wrap:wrap">
      ${LANE_NAME.map((n,i)=>`<div style="display:flex;align-items:center;gap:5px">
        <div style="width:14px;height:14px;border-radius:3px;background:${LANE_COL[i]};opacity:0.82"></div>
        <span style="font-size:11px;color:var(--text3)">${n}</span>
      </div>`).join('')}
    </div>`;

    cont.innerHTML = controls + filterBar + legend + grid;
  }

  async function renderPosesionZonas(cont, controls) {
    const CZ1='#388bfd', CZ2='#c8a96e', CZ3='#3fb950';

    // ── Filter bar ───────────────────────────────────────────────────────────
    const perBtn = (id, lbl) => {
      const act = zonasPeriodo === id;
      return `<button onclick="zonasPeriodo='${id}';renderPosesion()" style="background:${act?'var(--accent)':'transparent'};color:${act?'#0d1117':'var(--text2)'};border:none;border-radius:16px;padding:5px 15px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s">${lbl}</button>`;
    };
    const nBtn = (val, lbl) => {
      const act = zonasMatchN === val;
      return `<button onclick="zonasMatchN=${val};renderPosesion()" style="background:${act?'rgba(200,169,110,0.18)':'transparent'};color:${act?'var(--accent)':'var(--text2)'};border:${act?'1px solid rgba(200,169,110,0.35)':'1px solid transparent'};border-radius:16px;padding:5px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:${act?'700':'500'};cursor:pointer;transition:all 0.15s">${lbl}</button>`;
    };

    const filterBar = `<div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;margin-bottom:20px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;white-space:nowrap">Periodo</span>
        <div style="display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px">
          ${perBtn('t','Total')}${perBtn('1','1ª Parte')}${perBtn('2','2ª Parte')}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;white-space:nowrap">Partidos</span>
        <div style="display:flex;gap:4px">
          ${nBtn(1,'1J')}${nBtn(3,'3J')}${nBtn(6,'6J')}
        </div>
      </div>
    </div>`;

    // Show loading while data fetches
    cont.innerHTML = controls + filterBar +
      `<div style="text-align:center;padding:60px;color:var(--text3);font-size:13px">Cargando datos…</div>`;

    const zd = await loadZonaData();
    const perLabel = zonasPeriodo==='t'?'90 min':zonasPeriodo==='1'?'1ª parte':'2ª parte';

    // ── Pitch builder (reusable, scaled) ─────────────────────────────────────
    // size: 'large' | 'small'
    function buildZonaPitch(zData, size='large') {
      const PVW=1050, PVH=680, PP=22;
      const PZW=(PVW-2*PP)/3;
      const opD = Math.min(0.55, zData.d/100*0.7+0.06).toFixed(2);
      const opM = Math.min(0.55, zData.m/100*0.7+0.06).toFixed(2);
      const opA = Math.min(0.55, zData.a/100*0.7+0.06).toFixed(2);
      const fs   = size==='large' ? 90 : 110;  // font-size for % (scales with viewBox)
      const fsLbl= size==='large' ? 34 : 40;
      const w    = size==='large' ? '60%;max-width:480px' : '100%';

      return `<svg viewBox="0 0 ${PVW} ${PVH}" style="width:${w};display:block;margin:0 auto;border-radius:6px">
        <rect width="${PVW}" height="${PVH}" fill="#0f2218" rx="6"/>
        <rect x="${PP}" y="${PP}" width="${PZW.toFixed(0)}" height="${PVH-2*PP}" fill="${CZ1}" fill-opacity="${opD}" rx="3"/>
        <rect x="${(PP+PZW).toFixed(0)}" y="${PP}" width="${PZW.toFixed(0)}" height="${PVH-2*PP}" fill="${CZ2}" fill-opacity="${opM}"/>
        <rect x="${(PP+2*PZW).toFixed(0)}" y="${PP}" width="${PZW.toFixed(0)}" height="${PVH-2*PP}" fill="${CZ3}" fill-opacity="${opA}" rx="3"/>
        <rect x="${PP}" y="${PP}" width="${PVW-2*PP}" height="${PVH-2*PP}" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="4" rx="3"/>
        <line x1="${PVW/2}" y1="${PP}" x2="${PVW/2}" y2="${PVH-PP}" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
        <line x1="${(PP+PZW).toFixed(0)}" y1="${PP}" x2="${(PP+PZW).toFixed(0)}" y2="${PVH-PP}" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="16 10"/>
        <line x1="${(PP+2*PZW).toFixed(0)}" y1="${PP}" x2="${(PP+2*PZW).toFixed(0)}" y2="${PVH-PP}" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="16 10"/>
        <circle cx="${PVW/2}" cy="${PVH/2}" r="91.5" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
        <circle cx="${PVW/2}" cy="${PVH/2}" r="5" fill="rgba(255,255,255,0.25)"/>
        <rect x="${PP}"         y="${((PVH-403)/2).toFixed(0)}" width="165" height="403" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
        <rect x="${PP}"         y="${((PVH-183)/2).toFixed(0)}" width="55"  height="183" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
        <rect x="${PP-22}"      y="${((PVH-73)/2).toFixed(0)}"  width="22"  height="73"  fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
        <rect x="${PVW-PP-165}" y="${((PVH-403)/2).toFixed(0)}" width="165" height="403" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
        <rect x="${PVW-PP-55}"  y="${((PVH-183)/2).toFixed(0)}" width="55"  height="183" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
        <rect x="${PVW-PP}"     y="${((PVH-73)/2).toFixed(0)}"  width="22"  height="73"  fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
        <text x="${(PP+PZW/2).toFixed(0)}"   y="${(PVH/2-28).toFixed(0)}" text-anchor="middle" fill="${CZ1}" font-size="${fs}" font-weight="700" font-family="'Bebas Neue',sans-serif" opacity="0.9">${zData.d}%</text>
        <text x="${(PP+PZW*1.5).toFixed(0)}" y="${(PVH/2-28).toFixed(0)}" text-anchor="middle" fill="${CZ2}" font-size="${fs}" font-weight="700" font-family="'Bebas Neue',sans-serif" opacity="0.9">${zData.m}%</text>
        <text x="${(PP+PZW*2.5).toFixed(0)}" y="${(PVH/2-28).toFixed(0)}" text-anchor="middle" fill="${CZ3}" font-size="${fs}" font-weight="700" font-family="'Bebas Neue',sans-serif" opacity="0.9">${zData.a}%</text>
        <text x="${(PP+PZW/2).toFixed(0)}"   y="${(PVH/2+48).toFixed(0)}" text-anchor="middle" fill="rgba(255,255,255,0.42)" font-size="${fsLbl}" font-family="'DM Sans',sans-serif" font-weight="700">Z1</text>
        <text x="${(PP+PZW*1.5).toFixed(0)}" y="${(PVH/2+48).toFixed(0)}" text-anchor="middle" fill="rgba(255,255,255,0.42)" font-size="${fsLbl}" font-family="'DM Sans',sans-serif" font-weight="700">Z2</text>
        <text x="${(PP+PZW*2.5).toFixed(0)}" y="${(PVH/2+48).toFixed(0)}" text-anchor="middle" fill="rgba(255,255,255,0.42)" font-size="${fsLbl}" font-family="'DM Sans',sans-serif" font-weight="700">Z3</text>
        <text x="${PVW-PP-10}" y="${PVH-10}" text-anchor="end" fill="rgba(255,255,255,0.15)" font-size="24" font-family="'DM Sans',sans-serif">→ ataque</text>
      </svg>`;
    }

    // ── MODO 1J: vista partido individual ─────────────────────────────────────
    if (zonasMatchN === 1) {
      const matchOpts = getPartidos().map(p => {
        const rival = p.local===currentTeam.name ? p.vis : p.local;
        const loc   = p.local===currentTeam.name ? '🏠' : '✈️';
        return `<option value="${p.id}" ${p.id==zonasMatchId?'selected':''}>${loc} ${p.j} · ${rival} · ${p.s} · ${p.f}</option>`;
      }).join('');

      const selector = `<div style="margin-bottom:20px">
        <select onchange="zonasMatchId=parseInt(this.value);renderPosesion()"
          style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;width:100%">
          <option value="">— Selecciona un partido —</option>${matchOpts}
        </select>
      </div>`;

      if (!zonasMatchId) {
        cont.innerHTML = controls + filterBar + selector +
          `<div style="text-align:center;padding:50px;color:var(--text3);font-size:13px">
            <div style="font-size:28px;margin-bottom:10px">☝️</div>Selecciona un partido para ver la distribución por zonas</div>`;
        return;
      }

      const entry = zd[zonasMatchId]?.[zonasPeriodo];
      const partido = PARTIDOS.find(p => p.id === zonasMatchId);

      if (!entry || !partido) {
        cont.innerHTML = controls + filterBar + selector +
          `<div style="text-align:center;padding:40px;color:var(--text3)">Sin datos para este partido.</div>`;
        return;
      }

      const rival   = partido.local===currentTeam.name ? partido.vis : partido.local;
      const esLocal = partido.local===currentTeam.name;
      const [mg,mv] = (partido.s||'0-0').split('-').map(Number);
      const won=esLocal?mg>mv:mv>mg, draw=mg===mv;
      const rc=won?'#3fb950':draw?'#c8a96e':'#f85149';
      const disp=esLocal?`${mg}-${mv}`:`${mv}-${mg}`;

      // Header card
      const header = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent)">${partido.j}</div>
        <div>
          <div style="font-size:14px;color:var(--text);font-weight:600">${esLocal?'🏠':'✈️'} ${rival}</div>
          <div style="font-size:11px;color:var(--text3)">${partido.f}</div>
        </div>
        <div style="margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:28px;color:${rc}">${disp}</div>
        <div style="font-size:11px;color:var(--text3);border-left:1px solid var(--border);padding-left:14px">${perLabel}</div>
      </div>`;

      // Large pitch
      const pitchBlock = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px">
        ${buildZonaPitch(entry, 'large')}
      </div>`;

      // KPI cards
      const kpis = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        ${[['Zona 1',entry.d,CZ1],['Zona 2',entry.m,CZ2],['Zona 3',entry.a,CZ3]].map(([lbl,val,col])=>`
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center">
            <div style="display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px">
              <div style="width:8px;height:8px;border-radius:50%;background:${col}"></div>
              <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600">${lbl}</div>
            </div>
            <div style="font-size:48px;font-family:'Bebas Neue',sans-serif;color:${col};letter-spacing:1px;line-height:1">${val}%</div>
            <div style="display:flex;height:5px;border-radius:3px;overflow:hidden;margin-top:12px;background:rgba(255,255,255,0.06)">
              <div style="width:${val}%;background:${col};opacity:0.7;transition:width 0.4s"></div>
            </div>
          </div>`).join('')}
      </div>`;

      // ── Player possession ranking ────────────────────────────────────────
      const playerMap = (zd[zonasMatchId].players || {})[zonasPeriodo] || {};
      const totalDur  = Object.values(playerMap).reduce((s,v)=>s+v, 0);
      const playerRanking = Object.entries(playerMap)
        .map(([name, dur]) => ({ name, dur, pct: +(dur/totalDur*100).toFixed(1) }))
        .sort((a,b) => b.dur - a.dur);

      // Build name→position map from PONF_LINEUPS
      const lineupData = (typeof PONF_LINEUPS !== 'undefined' && PONF_LINEUPS[zonasMatchId]) || [];
      const posMapZ = {};
      lineupData.forEach(row => { if (row[1] && row[2]) posMapZ[row[1]] = row[2]; });

      let playerBlock = '';
      if (playerRanking.length > 0) {
        const maxPct = playerRanking[0].pct;
        const rows = playerRanking.map((p, i) => {
          const isTop    = i < 3;
          const isBottom = i >= playerRanking.length - 3;
          const barCol   = isTop ? '#3fb950' : isBottom ? '#f85149' : 'rgba(255,255,255,0.2)';
          const nameCol  = isTop ? '#3fb950' : isBottom ? '#f85149' : 'var(--text)';
          const badge    = isTop ? `<span style="font-size:9px;background:rgba(63,185,80,0.15);color:#3fb950;border-radius:10px;padding:1px 7px;margin-left:6px;font-weight:700">TOP</span>`
                         : isBottom ? `<span style="font-size:9px;background:rgba(248,81,73,0.15);color:#f85149;border-radius:10px;padding:1px 7px;margin-left:6px;font-weight:700">MIN</span>`
                         : '';
          const secs = Math.round(p.dur);
          const mm   = Math.floor(secs/60), ss = String(secs%60).padStart(2,'0');
          const shortName = p.name.length > 22 ? p.name.slice(0,21)+'…' : p.name;
          const pos = posMapZ[p.name] || '';
          const posCell = pos
            ? `<div style="width:34px;flex-shrink:0;text-align:center"><span style="font-size:9px;font-weight:700;color:var(--text3);background:rgba(255,255,255,0.08);border-radius:5px;padding:2px 5px">${pos}</span></div>`
            : `<div style="width:34px;flex-shrink:0;text-align:right;font-size:11px;color:var(--text3)">${i+1}</div>`;
          return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
            ${posCell}
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;margin-bottom:4px">
                <span style="font-size:12px;font-weight:600;color:${nameCol};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${shortName}</span>
                ${badge}
              </div>
              <div style="height:5px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden">
                <div style="height:100%;width:${(p.pct/maxPct*100).toFixed(1)}%;background:${barCol};opacity:0.75;border-radius:3px"></div>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:13px;font-weight:700;color:${nameCol}">${p.pct}%</div>
              <div style="font-size:10px;color:var(--text3)">${mm}:${ss}</div>
            </div>
          </div>`;
        }).join('');

        playerBlock = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:16px">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px">Posesión por jugador · ${perLabel}</div>
          ${rows}
        </div>`;
      }

      cont.innerHTML = controls + filterBar + selector + header + pitchBlock + kpis + playerBlock;
      return;
    }

    // ── MODO FILMSTRIP (3J / 6J) ──────────────────────────────────────────────
    const lastN   = getPartidos().slice(-zonasMatchN);
    const cols    = 3;

    const cards = lastN.map(p => {
      const entry = zd[p.id]?.[zonasPeriodo];
      const rival   = p.local===currentTeam.name ? p.vis : p.local;
      const esLocal = p.local===currentTeam.name;
      const [mg,mv] = (p.s||'0-0').split('-').map(Number);
      const won=esLocal?mg>mv:mv>mg, draw=mg===mv;
      const rc=won?'#3fb950':draw?'#c8a96e':'#f85149';
      const disp=esLocal?`${mg}-${mv}`:`${mv}-${mg}`;
      const rvShort = rival.length>18?rival.slice(0,17)+'…':rival;

      const pitchContent = entry
        ? buildZonaPitch(entry, 'small')
        : `<div style="padding:40px;text-align:center;color:var(--text3);font-size:12px">Sin datos</div>`;

      const zBar = entry ? `
        <div style="display:flex;height:5px;border-radius:3px;overflow:hidden;margin:10px 12px 4px">
          <div style="width:${entry.d}%;background:${CZ1};opacity:0.85"></div>
          <div style="width:${entry.m}%;background:${CZ2};opacity:0.85"></div>
          <div style="width:${entry.a}%;background:${CZ3};opacity:0.85"></div>
        </div>
        <div style="display:flex;justify-content:space-between;padding:0 12px 10px;font-size:10px">
          <span style="color:${CZ1};font-weight:600">${entry.d}%</span>
          <span style="color:${CZ2};font-weight:600">${entry.m}%</span>
          <span style="color:${CZ3};font-weight:600">${entry.a}%</span>
        </div>` : '';

      return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column">
        <div style="padding:8px 12px;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
            <span style="font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--accent)">${p.j}</span>
            <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:${rc}">${disp}</span>
          </div>
          <div style="font-size:12px;color:var(--text);font-weight:500">${esLocal?'🏠':'✈️'} ${rvShort}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:1px">${p.f} · ${perLabel}</div>
        </div>
        <div style="flex:1;padding:10px">${pitchContent}</div>
        ${zBar}
      </div>`;
    }).join('');

    cont.innerHTML = controls + filterBar +
      `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:12px">${cards}</div>`;
  }

  function posShowTip(el, show, evt) {
    const tip = document.getElementById('pos-tip');
    if (!tip) return;
    if (!show) { tip.style.display='none'; return; }
    tip.innerHTML = el.dataset.tip;
    tip.style.display = 'block';
    const x = evt ? evt.clientX : 0;
    const y = evt ? evt.clientY : 0;
    // position above cursor, centered
    tip.style.left = (x - tip.offsetWidth/2) + 'px';
    tip.style.top  = (y - tip.offsetHeight - 14) + 'px';
  }

  function loadPosesion() {
    document.getElementById('content').innerHTML = `<div class="anim">${head()}
      <div id="posesionCont"></div>
    </div>`;
    renderPosesion();
  }

  function renderPosesion() {
    const cont = document.getElementById('posesionCont');
    if (!cont) return;
    const posColor = p => p >= 50 ? '#3fb950' : p >= 40 ? '#c8a96e' : '#f85149';

    const tipoBtn = (id, lbl) => {
      const act = posesionTipo === id;
      return `<button onclick="posesionTipo='${id}';renderPosesion()" style="background:${act?'rgba(200,169,110,0.15)':'var(--bg2)'};border:1px solid ${act?'rgba(200,169,110,0.4)':'var(--border)'};color:${act?'var(--accent)':'var(--text2)'};padding:7px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:${act?'700':'500'};cursor:pointer;transition:all 0.15s">${lbl}</button>`;
    };
    const perBtn = (id, lbl) => {
      const act = posesionPeriodo === id;
      return `<button onclick="posesionPeriodo='${id}';renderPosesion()" style="background:${act?'var(--accent)':'transparent'};color:${act?'#0d1117':'var(--text2)'};border:none;border-radius:16px;padding:6px 16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s">${lbl}</button>`;
    };

    const isCompleta = posesionTipo === 'completa';
    const isZonas    = posesionTipo === 'zonas';
    const isCarriles = posesionTipo === 'carriles';

    // Description text
    const desc = isCompleta
      ? 'Porcentaje total de tiempo con el balón incluyendo todas las fases del juego: balón parado, saques de banda, faltas y situaciones de juego dinámico.'
      : isZonas
        ? 'Distribución de la posesión activa por zona del campo: sector defensivo, centro del campo y sector de ataque.'
        : isCarriles
          ? 'Distribución de la posesión activa por los 5 carriles verticales del campo: exterior izquierdo, interior izquierdo, central, interior derecho y exterior derecho.'
        : 'Tiempo de control real del balón en situaciones de juego activo, excluyendo interrupciones y balón parado. Refleja cuánto domina el equipo el juego en movimiento.';

    // Controls header
    const controls = `<div style="display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:20px">
      <div>
        <div style="display:flex;gap:8px;margin-bottom:10px">
          ${tipoBtn('completa','📊 Posesión Completa')}
          ${tipoBtn('activa','⚡ Posesión Activa')}
          ${tipoBtn('zonas','🗺️ Por Zonas')}
          ${tipoBtn('carriles','🛣️ Por Carriles')}
        </div>
        <div style="font-size:11px;color:var(--text3);max-width:480px;line-height:1.6">${desc}</div>
      </div>
      ${(!isCompleta && !isZonas) ? `<div style="display:flex;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px">
        ${perBtn('t','Total')}${perBtn('1','1ª Parte')}${perBtn('2','2ª Parte')}
      </div>` : ''}
    </div>`;

    // Route to zonas renderer
    if (isZonas)     { renderPosesionZonas(cont, controls); return; }
    if (posesionTipo === 'carriles') { renderPosesionCarriles(cont, controls); return; }

    // Get match data
    const matches = getPartidos().map(p => {
      let pct;
      if (isCompleta) {
        pct = POSSESSION_SOF[p.id];
      } else {
        const pd = POSSESSION_DATA[p.id];
        pct = pd ? pd[posesionPeriodo] : null;
      }
      if (pct == null) return null;
      const rival = p.local === currentTeam.name ? p.vis : p.local;
      const esLocal = p.local === currentTeam.name;
      const [mg, mv] = (p.s || '0-0').split('-').map(Number);
      return { partido: p, pct, rival, esLocal, mg, mv };
    }).filter(Boolean);

    const avg   = (matches.reduce((s,m) => s + m.pct, 0) / matches.length).toFixed(1);
    const above = matches.filter(m => m.pct >= 50).length;
    const best  = [...matches].sort((a,b) => b.pct - a.pct)[0];
    const worst = [...matches].sort((a,b) => a.pct - b.pct)[0];

    // ── Line + area chart (Athletic style) ──
    const W=920, H=310, ML=44, MR=38, MT=28, MB=58;
    const cW=W-ML-MR, cH=H-MT-MB;
    const n=matches.length;
    const xS = i   => ML + (i/(n-1))*cW;
    const yS = pct => MT + cH - (pct/100)*cH;
    const y50 = yS(50);

    // Ponferradina line path
    const linePts  = matches.map((m,i) => `${xS(i).toFixed(1)},${yS(m.pct).toFixed(1)}`);
    const linePth  = 'M' + linePts.join('L');

    // Rival line path (mirror: 100 - ponf%)
    const rivalPts = matches.map((m,i) => `${xS(i).toFixed(1)},${yS(100-m.pct).toFixed(1)}`);
    const rivalPth = 'M' + rivalPts.join('L');

    // Area closed polygon (Ponf vs 50% baseline)
    const areaPth  = `M${xS(0).toFixed(1)},${y50.toFixed(1)} ` +
      linePts.map(p=>'L'+p).join(' ') +
      ` L${xS(n-1).toFixed(1)},${y50.toFixed(1)} Z`;

    // Rolling avg 3-match (Ponf only)
    const rollPts = matches.map((m,i) => {
      const slice = matches.slice(Math.max(0,i-2), i+1);
      const avg3  = slice.reduce((s,x)=>s+x.pct,0)/slice.length;
      return `${xS(i).toFixed(1)},${yS(avg3).toFixed(1)}`;
    });
    const rollPth = 'M' + rollPts.join('L');

    // Grid & axis
    const gridLines = [25,50,75,100].map(v => {
      const y = yS(v).toFixed(1);
      const hl = v===50;
      return `<line x1="${ML}" y1="${y}" x2="${W-MR}" y2="${y}"
        stroke="rgba(255,255,255,${hl?'0.15':'0.05'})"
        stroke-width="${hl?'1.2':'0.6'}"
        stroke-dasharray="${hl?'6 4':''}"/>
      <text x="${ML-6}" y="${(parseFloat(y)+3.5).toFixed(0)}" text-anchor="end"
        fill="rgba(255,255,255,${hl?'0.4':'0.2'})" font-size="${hl?9:8}"
        font-weight="${hl?'600':'400'}"
        font-family="'DM Sans',sans-serif">${v}%</text>`;
    }).join('');

    // X labels — todas las jornadas
    const xLbls = matches.map((m,i) =>
      `<text x="${xS(i).toFixed(1)}" y="${H-MB+18}" text-anchor="middle"
        fill="rgba(255,255,255,0.25)" font-size="8.5"
        font-family="'DM Sans',sans-serif">${m.partido.j.replace('J','')}</text>`
    ).join('');

    // Helper: build tooltip HTML (single-quote style attrs, safe in data-attr)
    const mkTip = (name, col, pct, jornada, rival, rc, disp) =>
      `<div style='font-size:11px;font-weight:700;color:${col};margin-bottom:3px'>${name} · ${pct}%</div>` +
      `<div style='font-size:10px;color:rgba(230,237,243,0.65);margin-bottom:2px'>${jornada} · ${rival}</div>` +
      `<div style='font-size:11px;color:${rc};font-weight:600'>${disp}</div>`;

    // Dots — Ponferradina (blue, on top)
    const dotsPonf = matches.map((m,i) => {
      const cx  = xS(i).toFixed(1), cy = yS(m.pct).toFixed(1);
      const won  = m.esLocal ? m.mg>m.mv : m.mv>m.mg;
      const draw = m.mg===m.mv;
      const rc   = won?'#3fb950':draw?'#c8a96e':'#f85149';
      const disp = m.esLocal?`${m.mg}-${m.mv}`:`${m.mv}-${m.mg}`;
      const rv   = m.rival.length>22 ? m.rival.slice(0,21)+'…' : m.rival;
      const tip  = mkTip('SD Ponferradina','#58a6ff',m.pct,m.partido.j,rv,rc,disp);
      return `<circle cx="${cx}" cy="${cy}" r="4.5" fill="#58a6ff" stroke="#0d1117" stroke-width="1.5"
        style="cursor:pointer" data-tip="${tip}"
        onmouseenter="posShowTip(this,true,event)" onmouseleave="posShowTip(this,false)"/>`;
    }).join('');

    // Dots — Rival (orange)
    const dotsRival = matches.map((m,i) => {
      const cx  = xS(i).toFixed(1), cy = yS(100-m.pct).toFixed(1);
      const won  = m.esLocal ? m.mg>m.mv : m.mv>m.mg;
      const draw = m.mg===m.mv;
      const rc   = won?'#3fb950':draw?'#c8a96e':'#f85149';
      const disp = m.esLocal?`${m.mg}-${m.mv}`:`${m.mv}-${m.mg}`;
      const rv   = m.rival.length>22 ? m.rival.slice(0,21)+'…' : m.rival;
      const rivalPct = 100-m.pct;
      const tip  = mkTip(rv,'#f0883e',rivalPct,m.partido.j,'',rc,disp);
      return `<circle cx="${cx}" cy="${cy}" r="4.5" fill="#f0883e" stroke="#0d1117" stroke-width="1.5"
        style="cursor:pointer" data-tip="${tip}"
        onmouseenter="posShowTip(this,true,event)" onmouseleave="posShowTip(this,false)"/>`;
    }).join('');

    // Team labels right axis
    const lbPonf  = `<text x="${W-MR+5}" y="${yS(matches[n-1].pct).toFixed(0)}" fill="#58a6ff" font-size="9" font-family="'DM Sans',sans-serif" font-weight="700" dominant-baseline="middle">Ponf</text>`;
    const lbRival = `<text x="${W-MR+5}" y="${yS(100-matches[n-1].pct).toFixed(0)}" fill="#f0883e" font-size="9" font-family="'DM Sans',sans-serif" font-weight="700" dominant-baseline="middle">Rival</text>`;

    // Legend
    const legend = `
      <circle cx="${ML+5}"   cy="${H-MB+30}" r="3.5" fill="#58a6ff"/>
      <text x="${ML+14}"  y="${H-MB+34}" fill="rgba(255,255,255,0.45)" font-size="9" font-family="'DM Sans',sans-serif">Ponferradina</text>
      <circle cx="${ML+112}" cy="${H-MB+30}" r="3.5" fill="#f0883e"/>
      <text x="${ML+121}" y="${H-MB+34}" fill="rgba(255,255,255,0.45)" font-size="9" font-family="'DM Sans',sans-serif">Rival</text>
      <rect x="${ML+172}" y="${H-MB+27}" width="9" height="3" fill="#3fb950" fill-opacity="0.6" rx="1"/>
      <text x="${ML+185}" y="${H-MB+31}" fill="rgba(255,255,255,0.32)" font-size="8.5" font-family="'DM Sans',sans-serif">Ponf &gt;50%</text>
      <rect x="${ML+262}" y="${H-MB+27}" width="9" height="3" fill="#f85149" fill-opacity="0.6" rx="1"/>
      <text x="${ML+275}" y="${H-MB+31}" fill="rgba(255,255,255,0.32)" font-size="8.5" font-family="'DM Sans',sans-serif">Rival &gt;50%</text>
      <line x1="${ML+352}" y1="${H-MB+30}" x2="${ML+366}" y2="${H-MB+30}" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="3 2"/>
      <text x="${ML+370}" y="${H-MB+33}" fill="rgba(255,255,255,0.32)" font-size="8.5" font-family="'DM Sans',sans-serif">Media 3J</text>`;

    const chartTitle = isCompleta
      ? 'Posesión completa por jornada'
      : `Posesión activa · ${posesionPeriodo==='t'?'90 min':posesionPeriodo==='1'?'1ª parte':'2ª parte'}`;

    const uid = Math.random().toString(36).slice(2,7);
    const chart = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">${chartTitle}</div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;overflow:visible">
        <defs>
          <clipPath id="cp-up-${uid}"><rect x="${ML}" y="${MT}" width="${cW}" height="${(y50-MT).toFixed(1)}"/></clipPath>
          <clipPath id="cp-dn-${uid}"><rect x="${ML}" y="${y50.toFixed(1)}" width="${cW}" height="${(MT+cH-y50).toFixed(1)}"/></clipPath>
        </defs>
        ${gridLines}
        <!-- Area fill: green above 50%, red below -->
        <path d="${areaPth}" fill="#3fb950" fill-opacity="0.15" clip-path="url(#cp-up-${uid})"/>
        <path d="${areaPth}" fill="#f85149" fill-opacity="0.15" clip-path="url(#cp-dn-${uid})"/>
        <!-- Rival line (behind) -->
        <path d="${rivalPth}" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-linejoin="round" stroke-opacity="0.55"/>
        <!-- Ponferradina line (front) -->
        <path d="${linePth}" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linejoin="round"/>
        <!-- Rolling avg (Ponf, dashed white) -->
        <path d="${rollPth}" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-dasharray="4 3" stroke-linejoin="round"/>
        <!-- Rival dots (z-below Ponf dots) -->
        ${dotsRival}

  // ─── MAPA DE PASES ───────────────────────────────────────────────────────────

  async function getPasesData(matchId) {
    if (_pasesCache.has(matchId)) return _pasesCache.get(matchId);
    try {
      const r = await fetch(`data/${matchId}_passes.json`);
      if (!r.ok) { _pasesCache.set(matchId, []); return []; }
      const d = await r.json();
      _pasesCache.set(matchId, d);
      return d;
    } catch(e) { _pasesCache.set(matchId, []); return []; }
  }

  // Clasifica el tipo de pase: 'prog'|'back'|'lat'|'long'|'other'
  function getPassType(p) {
    const d = p.out === 's' ? (p.dir || '') : (p.tdir || '');
    if (p.rng === 'l' || (p.out !== 's' && p.dist && p.dist > 28)) return 'long';
    if (d === 'f')  return 'prog';
    if (d === 'b')  return 'back';
    if (d === 'sl' || d === 'sr') return 'lat';
    return 'other';
  }

  const PASS_TYPE_META = {
    prog: { label:'Progresivos', color:'#ff7eb6', emoji:'🌸' },
    back: { label:'Hacia atrás', color:'#c78842', emoji:'🟤' },
    lat:  { label:'Horizontales', color:'#e3b341', emoji:'🟡' },
    long: { label:'Largos',       color:'#a371f7', emoji:'🟣' },
    other:{ label:'Sin dirección',color:'#8b949e', emoji:'⚪' },
  };

  async function loadPases() {
    const cont = document.getElementById('content');
    if (!pasesMatchId) {
      const ps = getPartidos();
      pasesMatchId = ps[ps.length - 1]?.id || null;
    }
    cont.innerHTML = `<div class="anim" id="pasesCont"><div class="loading"><div class="spinner"></div><span>Cargando...</span></div></div>`;
    if (pasesSubTab === 'jugadores') await renderPasesJugadores();
    else await renderPasesMap();
  }

        <div style="font-size:10px;color:var(--blue);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:10px">

    return `<div style="margin-bottom:14px">
