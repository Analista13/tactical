  async function renderPasesMap() {
    const cont = document.getElementById('pasesCont');
    if (!cont) return;

    const ps = getPartidos();
    const partido = ps.find(p => p.id === pasesMatchId) || ps[ps.length-1];
    if (!partido) { cont.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">Sin partidos disponibles</div>'; return; }
    pasesMatchId = partido.id;

    const matchSel = buildPasesHeader(partido, ps);

    // ── Period tabs ────────────────────────────────────────────────────────────
    const perBtn = (id,lbl) => {
      const act = pasesPeriod === id;
      return `<button onclick="pasesPeriod='${id}';renderPasesMap()" style="background:${act?'var(--accent)':'transparent'};color:${act?'#0d1117':'var(--text2)'};border:none;border-radius:16px;padding:7px 20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s">${lbl}</button>`;
    };
    const periodBar = `<div style="display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px;width:fit-content;margin-bottom:14px">
      ${perBtn('t','Todo')}${perBtn('1','1ª Parte')}${perBtn('2','2ª Parte')}
    </div>`;

    // ── Zone filter bar ───────────────────────────────────────────────────────
    const zoneFilters = [
      [null, 'Todas',  '#c9d1d9'],
      [1,    'Z1',     '#58a6ff'],
      [2,    'Z2',     '#e3b341'],
      [3,    'Z3',     '#f85149'],
    ];
    const zonePills = zoneFilters.map(([id, lbl, col]) => {
      const act = pasesZoneFilter === id;
      return `<button onclick="pasesZoneFilter=${JSON.stringify(id)};renderPasesMap()" style="background:${act?col+'22':'var(--bg3)'};border:1px solid ${act?col:'var(--border)'};color:${act?col:'var(--text2)'};padding:6px 16px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:${act?'700':'500'};cursor:pointer;transition:all 0.15s;white-space:nowrap">${lbl}</button>`;
    }).join('');
    const zoneBar = `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;align-items:center">
      <span style="font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-right:2px">Zona</span>
      ${zonePills}
    </div>`;

    // ── Type filter pills ──────────────────────────────────────────────────────
    const typeFilters = [
      ['all',  'Todos',       '#c9d1d9'],
      ['prog', 'Progresivos', '#ff7eb6'],
      ['back', 'Hacia atrás', '#c78842'],
      ['lat',  'Horizontales','#e3b341'],
      ['long', 'Largos',      '#a371f7'],
      ['fail', 'Fallidos',    '#f85149'],
    ];
    const typePills = typeFilters.map(([id,lbl,col]) => {
      const act = pasesTypeFilter === id;
      return `<button onclick="pasesTypeFilter='${id}';renderPasesMap()" style="background:${act?col+'22':'var(--bg3)'};border:1px solid ${act?col:'var(--border)'};color:${act?col:'var(--text2)'};padding:6px 16px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:${act?'700':'500'};cursor:pointer;transition:all 0.15s;white-space:nowrap">${lbl}</button>`;
    }).join('');
    const typeBar = `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;align-items:center">
      <span style="font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-right:2px">Tipo</span>
      ${typePills}
    </div>`;

    // ── Load data ─────────────────────────────────────────────────────────────
    cont.innerHTML = matchSel + periodBar + zoneBar + typeBar +
      `<div class="loading"><div class="spinner"></div><span>Cargando datos...</span></div>`;

    const raw = await getPasesData(pasesMatchId);
    if (!raw.length) {
      cont.innerHTML = matchSel + periodBar + zoneBar + typeBar +
        `<div style="padding:60px;text-align:center;color:var(--text3);font-size:13px">Sin datos de pases para este partido</div>`;
      return;
    }

    // ── Filter passes ─────────────────────────────────────────────────────────
    let passes = raw;

    // Period filter
    if (pasesPeriod !== 't') passes = passes.filter(p => p.p == pasesPeriod);

    // Zone filter — usa coordenadas normalizadas (corrige el flip de dirección de ataque)
    if (pasesZoneFilter !== null) {
      passes = passes.filter(p => {
        if (p.x == null) return false;
        const {x: nx} = normPassCoords(p);
        return xToZone(nx) === pasesZoneFilter;
      });
    }

    // Type filter
    if (pasesTypeFilter === 'fail') {
      passes = passes.filter(p => p.out !== 's');
    } else if (pasesTypeFilter !== 'all') {
      passes = passes.filter(p => getPassType(p) === pasesTypeFilter);
    }

    // ── Build SVG ─────────────────────────────────────────────────────────────
    const svg = buildPasesMapSVG(passes);

    // ── Stats ──────────────────────────────────────────────────────────────────
    const total   = passes.length;
    const succ    = passes.filter(p => p.out === 's').length;
    const fail    = passes.filter(p => p.out !== 's').length;
    const pct     = total ? Math.round(succ/total*100) : 0;

    // Count by type
    const byType  = {};
    passes.forEach(p => {
      const t = getPassType(p);
      byType[t] = (byType[t]||0) + 1;
    });

    const mkStat = (label, val, sub, col) =>
      `<div class="card" style="border-left:3px solid ${col||'var(--border)'}">
        <div class="card-label">${label}</div>
        <div class="card-value" style="font-size:28px">${val}</div>
        ${sub ? `<div class="card-sub">${sub}</div>` : ''}
      </div>`;

    const statBar = `<div class="cards" style="margin-top:16px">
      ${mkStat('Total pases',''+total,'filtro actual','var(--accent)')}
      ${mkStat('Exitosos',''+succ,pct+'% precisión','#3fb950')}
      ${mkStat('Fallidos',''+fail,'','#f85149')}
      ${mkStat('Progresivos',''+(byType.prog||0),'(dir. adelante)','#ff7eb6')}
      ${mkStat('Largos',''+(byType.long||0),'','#a371f7')}
    </div>`;

    // ── Legend ─────────────────────────────────────────────────────────────────
    const mkLine = (col, dashed=false) =>
      `<svg width="28" height="10" style="flex-shrink:0"><line x1="0" y1="5" x2="22" y2="5" stroke="${col}" stroke-width="2"${dashed?' stroke-dasharray="6,3"':''}/>${dashed?'':`<polygon points="22,5 16,2 16,8" fill="#3fb950"/>`}</svg>`;
    const mkDot = (col, ring=false) =>
      ring ? `<svg width="10" height="10" style="flex-shrink:0"><circle cx="5" cy="5" r="4" fill="none" stroke="${col}" stroke-width="1.5"/></svg>`
           : `<svg width="10" height="10" style="flex-shrink:0"><circle cx="5" cy="5" r="4" fill="${col}"/></svg>`;

    const legendRows = [
      [mkLine('#ff7eb6'),        'Exitoso — Progresivo (hacia adelante)',  '#ff7eb6'],
      [mkLine('#c78842'),        'Exitoso — Hacia atrás',                  '#c78842'],
      [mkLine('#e3b341'),        'Exitoso — Horizontal/Lateral',           '#e3b341'],
      [mkLine('#a371f7'),        'Exitoso — Largo',                        '#a371f7'],
      [mkLine('#f85149',true),   'Fallido (siempre rojo, discontinuo)',     '#f85149'],
    ];
    const legend = `<div style="display:flex;flex-wrap:wrap;gap:8px 24px;margin-top:14px;padding:10px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);align-items:center">
      <span style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-right:4px">Leyenda</span>
      ${legendRows.map(([icon,lb,col])=>`<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)">
        ${icon}<span>${lb}</span>
      </div>`).join('')}
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);margin-left:auto">
        <svg width="10" height="10"><circle cx="5" cy="5" r="4" fill="#ff7eb6"/></svg><span>origen (éxito)</span>
        <svg width="10" height="10" style="margin-left:6px"><circle cx="5" cy="5" r="4" fill="none" stroke="#f85149" stroke-width="1.5"/></svg><span>origen (fallido)</span>
        <svg width="14" height="10" style="margin-left:6px"><polygon points="14,5 8,2 8,8" fill="#3fb950"/></svg><span>destino (éxito)</span>
      </div>
    </div>`;

    // ── Rival info ─────────────────────────────────────────────────────────────
    const rival  = partido.local === currentTeam.name ? partido.vis : partido.local;
    const isHome = partido.local === currentTeam.name;
    const headerTitle = `🗺️ ${partido.j} · ${isHome?'🏠':'✈️'} ${rival} · ${partido.s||''}`;

    // ── Tabla de pases por jugador ─────────────────────────────────────────
    const TYPE_ORDER = ['prog','long','back','lat','other'];
    const playerPassMap = {};
    passes.forEach(p => {
      if (!playerPassMap[p.n]) playerPassMap[p.n] = {
        pos: p.pos||'', total:0, succ:0,
        types: {prog:{s:0,f:0}, long:{s:0,f:0}, back:{s:0,f:0}, lat:{s:0,f:0}, other:{s:0,f:0}}
      };
      const d = playerPassMap[p.n];
      d.total++;
      const t = getPassType(p);
      if (p.out === 's') { d.succ++; d.types[t].s++; }
      else               {           d.types[t].f++; }
    });

    const playerRows = Object.entries(playerPassMap)
      .map(([name, d]) => ({name, ...d, fail: d.total-d.succ, pct: d.total?Math.round(d.succ/d.total*100):0}))
      .sort((a,b) => b.total - a.total);

    const typeCell = (s, f) => {
      if (!s && !f) return `<td style="padding:6px 8px;text-align:center;color:var(--text3);font-size:11px">—</td>`;
      return `<td style="padding:6px 8px;text-align:center">
        ${s?`<span style="font-size:12px;font-weight:600;color:var(--green)">${s}</span>`:''}${s&&f?`<span style="font-size:10px;color:var(--border)"> / </span>`:''}${f?`<span style="font-size:12px;color:var(--red);opacity:0.85">${f}</span>`:''}
      </td>`;
    };

    const playerTableRows = playerRows.map(pl => {
      const pctCol = pl.pct>=75?'var(--green)':pl.pct>=55?'var(--accent)':'var(--red)';
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:7px 12px;white-space:nowrap">
          <div style="display:flex;align-items:center;gap:7px">
            ${pl.pos?`<span style="font-size:9px;font-weight:700;color:var(--accent);background:var(--accent)18;padding:1px 5px;border-radius:3px;min-width:24px;text-align:center">${pl.pos}</span>`:''}
            <span style="font-size:12px;font-weight:500;color:var(--text)">${dispN(pl.name)}</span>
          </div>
        </td>
        <td style="padding:6px 8px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--text)">${pl.total}</td>
        <td style="padding:6px 8px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--green)">${pl.succ}</td>
        <td style="padding:6px 8px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--red)">${pl.fail}</td>
        <td style="padding:6px 8px;text-align:center">
          <span style="font-size:12px;font-weight:700;color:${pctCol}">${pl.pct}%</span>
        </td>
        ${TYPE_ORDER.map(t => typeCell(pl.types[t].s, pl.types[t].f)).join('')}
      </tr>`;
    }).join('');

    const typeHeaderCells = TYPE_ORDER.map(t => {
      const m = PASS_TYPE_META[t];
      return `<th style="text-align:center;padding:8px 6px">
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          <span style="font-size:12px">${m.emoji}</span>
          <span style="font-size:9px;color:${m.color};font-weight:600;white-space:nowrap">${m.label}</span>
          <span style="font-size:8px;color:var(--text3)">✅ / ❌</span>
        </div>
      </th>`;
    }).join('');

    const playerTable = playerRows.length ? `
      <div style="margin-top:18px">
        <div style="font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:10px">
          Pases por jugador · ${pasesPeriod==='t'?'todo el partido':pasesPeriod==='1'?'1ª parte':'2ª parte'}${pasesTypeFilter!=='all'?' · '+pasesTypeFilter:''}
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Jugador</th>
              <th style="text-align:center">Total</th>
              <th style="text-align:center">✅</th>
              <th style="text-align:center">❌</th>
              <th style="text-align:center">%</th>
              ${typeHeaderCells}
            </tr></thead>
            <tbody>${playerTableRows}</tbody>
          </table>
        </div>
      </div>` : '';

    cont.innerHTML = matchSel + buildPasesSubTabs() + periodBar + zoneBar + typeBar +
      `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
        <span style="font-size:14px;font-weight:700;color:var(--text)">${headerTitle}</span>
        <span style="font-size:11px;color:var(--text3);margin-left:auto">${total} pases mostrados</span>
      </div>` +
      `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">` +
      svg +
      `</div>` +
      statBar + legend + playerTable;
  }

  // ─── MAPA DE PASES — SUB-TAB JUGADORES ───────────────────────────────────────

  // ── Metadatos de todos los pares de zonas ────────────────────────────────────
  const ZONE_PAIR_META = {
    '1-2': { label:'Z1 → Z2', desc:'Construcción',    emoji:'🔵→🟡', fromZ:1, toZ:2, fromCol:'#58a6ff', toCol:'#e3b341', tactic:'Salida de balón desde el bloque defensivo al mediocampo' },
    '1-3': { label:'Z1 → Z3', desc:'Balón largo',     emoji:'🔵→🔴', fromZ:1, toZ:3, fromCol:'#58a6ff', toCol:'#f85149', tactic:'Pase directo sorteando el mediocampo rival' },
    '2-1': { label:'Z2 → Z1', desc:'Descarga',         emoji:'🟡→🔵', fromZ:2, toZ:1, fromCol:'#e3b341', toCol:'#58a6ff', tactic:'Descarga al bloque defensivo para reorganizar o cambiar el punto de ataque' },
    '2-3': { label:'Z2 → Z3', desc:'Progresión',      emoji:'🟡→🔴', fromZ:2, toZ:3, fromCol:'#e3b341', toCol:'#f85149', tactic:'Progresión del mediocampo al tercio ofensivo' },
    '3-2': { label:'Z3 → Z2', desc:'Recirculación',   emoji:'🔴→🟡', fromZ:3, toZ:2, fromCol:'#f85149', toCol:'#e3b341', tactic:'Descarga al mediocampo desde el ataque' },
  };

  // Devuelve número de zona (1|2|3) dado un valor x bruto (no normalizado)
  function xToZone(x) { return x < -17.5 ? 1 : x <= 17.5 ? 2 : 3; }

  // Devuelve zona (1|2|3) a partir del campo third/tthird de SkillCorner
  // (ya normalizado según dirección de ataque real del equipo)
  function passThirdToZone(t) { return t === 'd' ? 1 : t === 'm' ? 2 : t === 'a' ? 3 : 0; }

  // Normaliza coordenadas del pase para que siempre ataquemos de izquierda a derecha.
  // Cuando third='d' pero x>17.5 el equipo atacaba hacia la izquierda → invertir x e y.
  function normPassCoords(p) {
    const tz = passThirdToZone(p.third);
    const rz = xToZone(p.x);
    if (tz && tz !== rz) {
      // Coordenadas invertidas: el equipo atacaba en dirección x negativa
      return { x: -p.x, y: -(p.y||0), xe: -(p.xe||0), ye: -(p.ye||0) };
    }
    return { x: p.x, y: p.y||0, xe: p.xe||0, ye: p.ye||0 };
  }

  async function renderPasesJugadores() {
    if (pasesJugadoresSub === 'individual') { await renderPasesIndividual(); return; }

    const cont = document.getElementById('pasesCont');
    if (!cont) return;

    const ps = getPartidos();
    const partido = ps.find(p => p.id === pasesMatchId) || ps[ps.length-1];
    if (!partido) { cont.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">Sin partidos</div>'; return; }
    pasesMatchId = partido.id;

    const pair = ZONE_PAIR_META[pasesZonePair] || ZONE_PAIR_META['1-2'];
    const matchSel = buildPasesHeader(partido, ps);
    const jugSubBar = buildPasesJugadoresSubTabs();

    // ── Period bar ─────────────────────────────────────────────────────────────
    const perBtn = (id,lbl) => {
      const act = pasesPeriod === id;
      return `<button onclick="pasesPeriod='${id}';renderPasesJugadores()" style="background:${act?'var(--accent)':'transparent'};color:${act?'#0d1117':'var(--text2)'};border:none;border-radius:16px;padding:7px 20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s">${lbl}</button>`;
    };
    const periodBar = `<div style="display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px;width:fit-content;margin-bottom:16px">
      ${perBtn('t','Todo')}${perBtn('1','1ª Parte')}${perBtn('2','2ª Parte')}
    </div>`;

    // ── Zone pair tabs ─────────────────────────────────────────────────────────
    const zoneTabs = Object.entries(ZONE_PAIR_META).map(([id, m]) => {
      const act = pasesZonePair === id;
      return `<button onclick="pasesZonePair='${id}';renderPasesJugadores()"
        style="display:flex;flex-direction:column;align-items:center;gap:2px;
               background:${act?m.fromCol+'18':'var(--bg3)'};
               border:1px solid ${act?m.fromCol:'var(--border)'};
               color:${act?m.fromCol:'var(--text2)'};
               padding:7px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;
               font-size:11px;font-weight:${act?700:500};cursor:pointer;transition:all 0.15s;white-space:nowrap">
        <span style="font-size:14px">${m.emoji}</span>
        <span style="font-size:11px;font-weight:700">${m.label}</span>
        <span style="font-size:9px;color:${act?m.fromCol:'var(--text3)'};font-weight:400">${m.desc}</span>
      </button>`;
    }).join('');
    const zonePairBar = `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px">${zoneTabs}</div>`;

    cont.innerHTML = matchSel + buildPasesSubTabs() + periodBar + jugSubBar + zonePairBar +
      `<div class="loading"><div class="spinner"></div><span>Calculando...</span></div>`;

    // ── Load & filter ──────────────────────────────────────────────────────────
    const raw = await getPasesData(pasesMatchId);
    if (!raw.length) {
      cont.innerHTML = matchSel + buildPasesSubTabs() + periodBar + jugSubBar + zonePairBar +
        `<div style="padding:40px;text-align:center;color:var(--text3)">Sin datos para este partido</div>`;
      return;
    }

    let passes = raw;
    if (pasesPeriod !== 't') passes = passes.filter(p => p.p == pasesPeriod);

    // Filter by selected zone pair:
    // 1. Normalizar coordenadas con normPassCoords (usa 'third' para detectar dirección de ataque)
    // 2. Aplicar xToZone a coordenadas ya normalizadas — no depende de 'tthird'
    //    (tthird puede estar ausente en pases fallidos, cortos o intra-zona)
    const filtered = passes.filter(p => {
      if (p.x == null || p.xe == null) return false;
      const {x: nx, xe: nxe} = normPassCoords(p);
      return xToZone(nx) === pair.fromZ && xToZone(nxe) === pair.toZ;
    });

    // ── Stats ──────────────────────────────────────────────────────────────────
    const total = filtered.length;
    const succ  = filtered.filter(p => p.out === 's').length;
    const fail  = total - succ;
    const pct   = total ? Math.round(succ/total*100) : 0;

    const mkSt = (lbl, val, sub, col) =>
      `<div class="card" style="border-left:3px solid ${col}">
        <div class="card-label">${lbl}</div>
        <div class="card-value" style="font-size:28px">${val}</div>
        ${sub?`<div class="card-sub">${sub}</div>`:''}
      </div>`;

    const statsRow = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:16px">${pair.emoji}</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">${pair.label} — ${pair.desc}</div>
          <div style="font-size:11px;color:var(--text3)">${pair.tactic}</div>
        </div>
      </div>
      <div class="cards" style="margin-bottom:20px">
        ${mkSt(pair.label, total, 'pases en este partido', pair.fromCol)}
        ${mkSt('Completados', succ, pct+'% precisión', '#3fb950')}
        ${mkSt('Fallidos', fail, '', '#f85149')}
      </div>`;

    if (!total) {
      cont.innerHTML = matchSel + buildPasesSubTabs() + periodBar + jugSubBar + zonePairBar + statsRow +
        `<div style="padding:40px;text-align:center;color:var(--text3);font-size:13px">Sin pases ${pair.label} en este período</div>`;
      return;
    }

    // ── SVG pitch ──────────────────────────────────────────────────────────────
    const AW=920, AH=590, AMX=55, AMY=40, APW=AW-AMX*2, APH=AH-AMY*2;
    const sv=(x,y)=>({sx:AMX+((x+52.5)/105)*APW, sy:AMY+((34-y)/68)*APH});

    const pitchBg = `
      <rect x="0" y="0" width="${AW}" height="${AH}" fill="#0b150b"/>
      <rect x="${AMX}" y="${AMY}" width="${APW}" height="${APH}" fill="#0d1f0d" stroke="#1c3a1c" stroke-width="1.5"/>
      <line x1="${AW/2}" y1="${AMY}" x2="${AW/2}" y2="${AH-AMY}" stroke="#1c3a1c" stroke-width="1"/>
      <circle cx="${AW/2}" cy="${AH/2}" r="${(APH*9.15/68).toFixed(0)}" fill="none" stroke="#1c3a1c" stroke-width="1"/>
      <rect x="${AMX}" y="${(AMY+APH*(68-40.32)/2/68).toFixed(1)}" width="${(APW*16.5/105).toFixed(1)}" height="${(APH*40.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.8"/>
      <rect x="${(AW-AMX-APW*16.5/105).toFixed(1)}" y="${(AMY+APH*(68-40.32)/2/68).toFixed(1)}" width="${(APW*16.5/105).toFixed(1)}" height="${(APH*40.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.8"/>
      <rect x="${AMX}" y="${(AMY+APH*(68-18.32)/2/68).toFixed(1)}" width="${(APW*5.5/105).toFixed(1)}" height="${(APH*18.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.5"/>
      <rect x="${(AW-AMX-APW*5.5/105).toFixed(1)}" y="${(AMY+APH*(68-18.32)/2/68).toFixed(1)}" width="${(APW*5.5/105).toFixed(1)}" height="${(APH*18.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.5"/>`;

    // Zone highlights — only from/to zones are bright; third zone dimmed
    const {sx:zAx}=sv(-52.5,34), {sx:zBx}=sv(-17.5,34), {sx:zCx}=sv(17.5,34), {sx:zDx}=sv(52.5,34);
    const zoneXs    = [zAx, zBx, zCx, zDx];
    const zoneCols  = ['#58a6ff','#e3b341','#f85149'];
    const zoneNames = ['Zona 1','Zona 2','Zona 3'];
    let zoneHL = '';
    for (let zi=0; zi<3; zi++) {
      const isFrom = zi+1 === pair.fromZ;
      const isTo   = zi+1 === pair.toZ;
      const col    = zoneCols[zi];
      const op     = (isFrom||isTo) ? '0.13' : '0.02';
      const sop    = (isFrom||isTo) ? '0.5'  : '0.1';
      const sw     = (isFrom||isTo) ? 1.5 : 0.5;
      const fw     = (isFrom||isTo) ? '700' : '400';
      const fop    = (isFrom||isTo) ? '0.8' : '0.2';
      const lbl    = isFrom ? `${zoneNames[zi]} (origen)` : isTo ? `${zoneNames[zi]} (destino)` : zoneNames[zi];
      const cx     = ((zoneXs[zi]+zoneXs[zi+1])/2).toFixed(1);
      zoneHL += `<rect x="${zoneXs[zi].toFixed(1)}" y="${AMY}" width="${(zoneXs[zi+1]-zoneXs[zi]).toFixed(1)}" height="${APH}" fill="${col}" fill-opacity="${op}" stroke="${col}" stroke-width="${sw}" stroke-opacity="${sop}"/>`;
      zoneHL += `<text x="${cx}" y="${(AMY+18).toFixed(1)}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="${fw}" fill="${col}" fill-opacity="${fop}">${lbl}</text>`;
    }

    // Pass lines — usar coordenadas normalizadas para que siempre ataquemos →
    let passLines = '';
    const sortedP = [...filtered].sort((a,b) => (a.out==='s'?0:1)-(b.out==='s'?0:1));
    sortedP.forEach(p => {
      const {x:nx, y:ny, xe:nxe, ye:nye} = normPassCoords(p);
      const {sx:x1,sy:y1} = sv(nx, ny);
      const {sx:x2,sy:y2} = sv(nxe, nye);
      passLines += buildPassLineGroup(p, x1, y1, x2, y2);
    });

    const mapSVG = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px">
      <svg viewBox="0 0 ${AW} ${AH}" style="width:100%;display:block;overflow:visible">${pitchBg}${zoneHL}${passLines}</svg>
    </div>`;

    // ── Rankings ───────────────────────────────────────────────────────────────
    const passerMap = {};
    filtered.forEach(p => {
      if (!passerMap[p.n]) passerMap[p.n] = { total:0, succ:0, pos:p.pos||'' };
      passerMap[p.n].total++;
      if (p.out==='s') passerMap[p.n].succ++;
    });
    const passers = Object.entries(passerMap)
      .map(([name,d]) => ({name, ...d, pct: d.total?Math.round(d.succ/d.total*100):0}))
      .sort((a,b) => b.total - a.total);

    const recvMap = {};
    filtered.filter(p => p.out==='s' && p.to).forEach(p => {
      if (!recvMap[p.to]) recvMap[p.to] = { total:0 };
      recvMap[p.to].total++;
    });
    const receivers = Object.entries(recvMap)
      .map(([name,d]) => ({name, ...d}))
      .sort((a,b) => b.total - a.total);

    const maxP = Math.max(1, ...passers.map(p=>p.total));
    const maxR = Math.max(1, ...receivers.map(r=>r.total));

    // Fila para tabla de PASADORES: Total | Acertados | Fallidos | % | barra
    const mkRowPasser = (item, col) => {
      const fail = item.total - item.succ;
      const barW = Math.round((item.total / maxP) * 100);
      const pctCol = item.pct >= 70 ? 'var(--green)' : item.pct >= 50 ? 'var(--accent)' : 'var(--red)';
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:7px 12px">
          <div style="display:flex;align-items:center;gap:8px">
            ${item.pos?`<span style="font-size:9px;font-weight:700;color:${col};background:${col}18;padding:2px 5px;border-radius:3px;min-width:28px;text-align:center">${item.pos}</span>`:''}
            <span style="font-size:12px;font-weight:500;color:var(--text)">${dispN(item.name)}</span>
          </div>
        </td>
        <td style="padding:7px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:19px;color:${col}">${item.total}</td>
        <td style="padding:7px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--green)">${item.succ}</td>
        <td style="padding:7px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--red)">${fail}</td>
        <td style="padding:7px 8px;text-align:center">
          <span style="font-size:12px;font-weight:700;color:${pctCol}">${item.pct}%</span>
        </td>
        <td style="padding:7px 14px;min-width:70px">
          <div style="height:5px;background:var(--bg4);border-radius:3px">
            <div style="height:5px;width:${barW}%;background:${col};border-radius:3px;opacity:0.75"></div>
          </div>
        </td>
      </tr>`;
    };

    // Fila para tabla de RECEPTORES: Recepciones | barra
    const mkRowReceiver = (item, col) => {
      const barW = Math.round((item.total / maxR) * 100);
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:7px 12px">
          <span style="font-size:12px;font-weight:500;color:var(--text)">${dispN(item.name)}</span>
        </td>
        <td style="padding:7px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:19px;color:${col}">${item.total}</td>
        <td style="padding:7px 14px;min-width:70px">
          <div style="height:5px;background:var(--bg4);border-radius:3px">
            <div style="height:5px;width:${barW}%;background:${col};border-radius:3px;opacity:0.75"></div>
          </div>
        </td>
      </tr>`;
    };

    const mkTablePasser = (rows, col) =>
      rows.length ? `<div class="table-wrap"><table>
        <thead><tr>
          <th>Jugador</th>
          <th style="text-align:center">Total</th>
          <th style="text-align:center">✅</th>
          <th style="text-align:center">❌</th>
          <th style="text-align:center">%</th>
          <th></th>
        </tr></thead>
        <tbody>${rows.map(r => mkRowPasser(r, col)).join('')}</tbody>
      </table></div>` :
      `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Sin datos</div>`;

    const mkTableReceiver = (rows, col) =>
      rows.length ? `<div class="table-wrap"><table>
        <thead><tr>
          <th>Jugador</th>
          <th style="text-align:center">Recepciones</th>
          <th></th>
        </tr></thead>
        <tbody>${rows.map(r => mkRowReceiver(r, col)).join('')}</tbody>
      </table></div>` :
      `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Sin pases completados</div>`;

    const rankingCols = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:${pair.fromCol};font-weight:600;margin-bottom:10px;padding:8px 12px;background:${pair.fromCol}12;border:1px solid ${pair.fromCol}30;border-radius:6px">
          Pasadores — desde ${zoneNames[pair.fromZ-1]}
        </div>
        ${mkTablePasser(passers, pair.fromCol)}
      </div>
      <div>
        <div style="font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:${pair.toCol};font-weight:600;margin-bottom:10px;padding:8px 12px;background:${pair.toCol}12;border:1px solid ${pair.toCol}30;border-radius:6px">
          Receptores — en ${zoneNames[pair.toZ-1]}
        </div>
        ${mkTableReceiver(receivers, pair.toCol)}
      </div>
    </div>`;

    // ── Tabla resumen por todos los pares de zona ───────────────────────────
    const allPairStats = Object.entries(ZONE_PAIR_META).map(([id, m]) => {
      const pp   = passes.filter(p => {
        if (p.x == null || p.xe == null) return false;
        const {x:nx, xe:nxe} = normPassCoords(p);
        return xToZone(nx) === m.fromZ && xToZone(nxe) === m.toZ;
      });
      const tot  = pp.length;
      const succ = pp.filter(p => p.out === 's').length;
      const fail = tot - succ;
      const pct  = tot ? Math.round(succ / tot * 100) : null;
      return { id, m, tot, succ, fail, pct };
    });
    const maxTot = Math.max(1, ...allPairStats.map(s => s.tot));

    const summaryRows = allPairStats.map(({id, m, tot, succ, fail, pct}) => {
      const act  = pasesZonePair === id;
      const barW = Math.round((tot / maxTot) * 100);
      const pctCol = pct === null ? 'var(--text3)' : pct >= 70 ? 'var(--green)' : pct >= 50 ? 'var(--accent)' : 'var(--red)';
      return `<tr onclick="pasesZonePair='${id}';renderPasesJugadores()"
        style="border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;${act?`background:${m.fromCol}0d`:''}"
        onmouseenter="this.style.background='${m.fromCol}0d'" onmouseleave="this.style.background='${act?m.fromCol+'0d':'transparent'}'">
        <td style="padding:8px 12px;white-space:nowrap">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:14px">${m.emoji}</span>
            <div>
              <div style="font-size:12px;font-weight:${act?700:500};color:${act?m.fromCol:'var(--text)'}">${m.label}</div>
              <div style="font-size:10px;color:var(--text3)">${m.desc}</div>
            </div>
            ${act?`<span style="font-size:9px;font-weight:700;color:${m.fromCol};background:${m.fromCol}22;padding:1px 6px;border-radius:3px;margin-left:2px">activo</span>`:''}
          </div>
        </td>
        <td style="padding:8px 14px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text)">${tot || '—'}</td>
        <td style="padding:8px 14px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green)">${tot ? succ : '—'}</td>
        <td style="padding:8px 14px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red)">${tot ? fail : '—'}</td>
        <td style="padding:8px 14px;text-align:center">
          ${pct !== null ? `<span style="font-size:14px;font-weight:700;color:${pctCol}">${pct}%</span>` : '<span style="color:var(--text3);font-size:12px">—</span>'}
        </td>
        <td style="padding:8px 16px;min-width:90px">
          <div style="height:5px;background:var(--bg4);border-radius:3px">
            <div style="height:5px;width:${barW}%;background:${m.fromCol};border-radius:3px;opacity:0.75;transition:width 0.3s"></div>
          </div>
        </td>
      </tr>`;
    }).join('');

    const summaryTable = `
      <div style="margin-top:24px">
        <div style="font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:10px">
          Resumen de pases por zonas · ${pasesPeriod==='t'?'todo el partido':pasesPeriod==='1'?'1ª parte':'2ª parte'}
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Par de zona</th>
              <th style="text-align:center">Total</th>
              <th style="text-align:center">Acertados</th>
              <th style="text-align:center">Fallidos</th>
              <th style="text-align:center">% Precisión</th>
              <th></th>
            </tr></thead>
            <tbody>${summaryRows}</tbody>
          </table>
        </div>
      </div>`;

    cont.innerHTML = matchSel + buildPasesSubTabs() + periodBar + jugSubBar + zonePairBar + statsRow + mapSVG + rankingCols + summaryTable;
  }

  // ── Análisis individual por jugador y zona ────────────────────────────────
  async function renderPasesIndividual() {
    const cont = document.getElementById('pasesCont');
    if (!cont) return;

    const ps = getPartidos();
    const partido = ps.find(p => p.id === pasesMatchId) || ps[ps.length - 1];
    if (!partido) { cont.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">Sin partidos</div>'; return; }
    pasesMatchId = partido.id;

    const matchSel  = buildPasesHeader(partido, ps);
    const jugSubBar = buildPasesJugadoresSubTabs();

    // Period bar
    const perBtn = (id, lbl) => {
      const act = pasesPeriod === id;
      return `<button onclick="pasesPeriod='${id}';renderPasesIndividual()" style="background:${act?'var(--accent)':'transparent'};color:${act?'#0d1117':'var(--text2)'};border:none;border-radius:16px;padding:7px 20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s">${lbl}</button>`;
    };
    const periodBar = `<div style="display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px;width:fit-content;margin-bottom:16px">
      ${perBtn('t','Todo')}${perBtn('1','1ª Parte')}${perBtn('2','2ª Parte')}
    </div>`;

    // Zone selector
    const Z_COLS = ['#58a6ff','#e3b341','#f85149'];
    const zoneBar = `<div style="display:flex;gap:6px;margin-bottom:20px">
      ${[1,2,3].map(z => {
        const act = pasesIndivZone === z;
        const col = Z_COLS[z-1];
        return `<button onclick="pasesIndivZone=${z};pasesIndivPlayer=null;renderPasesIndividual()"
          style="background:${act?col+'18':'var(--bg3)'};border:1px solid ${act?col:'var(--border)'};
                 color:${act?col:'var(--text2)'};padding:7px 20px;border-radius:8px;
                 font-family:'DM Sans',sans-serif;font-size:13px;font-weight:${act?700:500};
                 cursor:pointer;transition:all 0.15s">Z${z}</button>`;
      }).join('')}
    </div>`;

    cont.innerHTML = matchSel + buildPasesSubTabs() + periodBar + jugSubBar + zoneBar +
      `<div class="loading"><div class="spinner"></div><span>Analizando...</span></div>`;

    // ── Cargar y normalizar datos ──────────────────────────────────────────
    const raw = await getPasesData(pasesMatchId);
    if (!raw.length) {
      cont.innerHTML = matchSel + buildPasesSubTabs() + periodBar + jugSubBar + zoneBar +
        `<div style="padding:40px;text-align:center;color:var(--text3)">Sin datos para este partido</div>`;
      return;
    }

    let passes = raw.filter(p => p.x != null && p.xe != null);
    if (pasesPeriod !== 't') passes = passes.filter(p => p.p == pasesPeriod);

    // Normalizar coordenadas y precalcular zonas
    const withZ = passes.map(p => {
      const {x:nx, y:ny, xe:nxe, ye:nye} = normPassCoords(p);
      return {...p, _nx:nx, _ny:ny, _nxe:nxe, _nye:nye, _fromZ:xToZone(nx), _toZ:xToZone(nxe)};
    });

    // Filtrar por zona seleccionada
    const zonePass = withZ.filter(p => p._fromZ === pasesIndivZone);

    // Mapa de jugadores
    const PRESS = 65;
    const playerMap = {};
    zonePass.forEach(p => {
      if (!playerMap[p.n]) playerMap[p.n] = {total:0, succ:0, pos:p.pos||'', passes:[]};
      playerMap[p.n].total++;
      if (p.out === 's') playerMap[p.n].succ++;
      playerMap[p.n].passes.push(p);
    });

    const players = Object.entries(playerMap)
      .map(([name,d]) => ({name, ...d, pct: d.total ? Math.round(d.succ/d.total*100) : 0}))
      .sort((a,b) => b.total - a.total);

    if (!players.length) {
      cont.innerHTML = matchSel + buildPasesSubTabs() + periodBar + jugSubBar + zoneBar +
        `<div style="padding:40px;text-align:center;color:var(--text3);font-size:13px">Sin pases desde Zona ${pasesIndivZone} en este período</div>`;
      return;
    }

    // Auto-seleccionar primer jugador
    if (!pasesIndivPlayer || !playerMap[pasesIndivPlayer]) pasesIndivPlayer = players[0].name;

    // ── Grid de jugadores ──────────────────────────────────────────────────
    const zCol = Z_COLS[pasesIndivZone - 1];
    const playerCards = players.map(pl => {
      const act      = pasesIndivPlayer === pl.name;
      const isTarget = pl.pct < PRESS;
      const isWeak   = pl.pct >= PRESS && pl.pct < 75;
      const brdCol   = isTarget ? '#f85149' : isWeak ? '#e3b341' : act ? zCol : 'var(--border)';
      const pctCol   = pl.pct >= 75 ? 'var(--green)' : pl.pct >= PRESS ? '#e3b341' : '#f85149';
      const safe     = pl.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<button onclick="pasesIndivPlayer='${safe}';renderPasesIndividual()"
        style="display:flex;flex-direction:column;gap:5px;
               background:${act?zCol+'12':'var(--bg3)'};
               border:1px solid ${act?brdCol:isTarget?'#f8514950':'var(--border)'};
               border-radius:8px;padding:10px 12px;cursor:pointer;text-align:left;
               transition:all 0.15s;flex:1;min-width:140px;max-width:210px">
        <div style="display:flex;align-items:center;gap:6px">
          ${pl.pos?`<span style="font-size:9px;font-weight:700;color:${brdCol};background:${brdCol}22;padding:1px 5px;border-radius:3px;flex-shrink:0">${pl.pos}</span>`:''}
          <span style="font-size:11px;font-weight:${act?700:500};color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${dispN(pl.name)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;height:4px;background:var(--bg4);border-radius:2px">
            <div style="height:4px;width:${pl.pct}%;background:${pctCol};border-radius:2px"></div>
          </div>
          <span style="font-size:11px;font-weight:700;color:${pctCol};flex-shrink:0">${pl.pct}%</span>
          <span style="font-size:10px;color:var(--text3);flex-shrink:0">${pl.total}p</span>
        </div>
        ${isTarget?`<div style="font-size:9px;font-weight:700;color:#f85149">🎯 Objetivo de presión</div>`:isWeak?`<div style="font-size:9px;color:#e3b341">⚠️ Presionable</div>`:''}
      </button>`;
    }).join('');

    const playerGrid = `<div style="margin-bottom:22px">
      <div style="font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:${zCol};font-weight:600;margin-bottom:10px;padding:8px 12px;background:${zCol}12;border:1px solid ${zCol}30;border-radius:6px">
        Jugadores con pases desde Zona ${pasesIndivZone}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${playerCards}</div>
    </div>`;

    // ── Análisis del jugador seleccionado ──────────────────────────────────
    const selData  = playerMap[pasesIndivPlayer];
    const selP     = selData ? selData.passes : [];
    const selTot   = selP.length;
    const selSucc  = selP.filter(p => p.out === 's').length;
    const selFail  = selTot - selSucc;
    const selPct   = selTot ? Math.round(selSucc / selTot * 100) : 0;
    const selPcCol = selPct >= 75 ? 'var(--green)' : selPct >= PRESS ? '#e3b341' : '#f85149';
    const selIsT   = selPct < PRESS;

    const mkC = (lbl, val, col) => `<div class="card" style="border-left:3px solid ${col}">
      <div class="card-label">${lbl}</div>
      <div class="card-value" style="font-size:28px">${val}</div>
    </div>`;

    const selHeader = `
      <div style="background:var(--bg2);border:1px solid ${selIsT?'#f85149':'var(--border)'};border-radius:var(--radius);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        ${selData?.pos?`<span style="font-size:10px;font-weight:700;color:${selPcCol};background:${selPcCol}22;padding:2px 8px;border-radius:4px">${selData.pos}</span>`:''}
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;color:var(--text)">${dispN(pasesIndivPlayer)} — Zona ${pasesIndivZone}</div>
          <div style="font-size:11px;color:${selPcCol};font-weight:${selIsT?600:400};margin-top:2px">
            ${selIsT?'🎯 Objetivo de presión — ':''}${selPct}% de completitud · ${selTot} pases
          </div>
        </div>
      </div>
      <div class="cards" style="margin-bottom:18px">
        ${mkC('Total',selTot,zCol)}${mkC('Acertados',selSucc,'var(--green)')}${mkC('Fallidos',selFail,'var(--red)')}${mkC('% Precisión',selPct+'%',selPcCol)}
      </div>`;

    // SVG campo
    const AW=920,AH=590,AMX=55,AMY=40,APW=AW-AMX*2,APH=AH-AMY*2;
    const sv=(x,y)=>({sx:AMX+((x+52.5)/105)*APW,sy:AMY+((34-y)/68)*APH});
    const {sx:z0x}=sv(-52.5,34),{sx:z1x}=sv(-17.5,34),{sx:z2x}=sv(17.5,34),{sx:z3x}=sv(52.5,34);
    const zXs=[z0x,z1x,z2x,z3x];
    let zHL='';
    for(let zi=0;zi<3;zi++){
      const active=zi+1===pasesIndivZone, col=Z_COLS[zi];
      zHL+=`<rect x="${zXs[zi].toFixed(1)}" y="${AMY}" width="${(zXs[zi+1]-zXs[zi]).toFixed(1)}" height="${APH}" fill="${col}" fill-opacity="${active?'0.13':'0.02'}" stroke="${col}" stroke-width="${active?1.5:0.5}" stroke-opacity="${active?0.5:0.1}"/>`;
      zHL+=`<text x="${((zXs[zi]+zXs[zi+1])/2).toFixed(1)}" y="${(AMY+18).toFixed(1)}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" font-weight="${active?700:400}" fill="${col}" fill-opacity="${active?0.8:0.2}">${active?`Zona ${zi+1} (origen)`:`Zona ${zi+1}`}</text>`;
    }
    let passLines='';
    [...selP].sort((a,b)=>(a.out==='s'?0:1)-(b.out==='s'?0:1)).forEach(p=>{
      const {sx:x1,sy:y1}=sv(p._nx,p._ny), {sx:x2,sy:y2}=sv(p._nxe,p._nye);
      passLines+=buildPassLineGroup(p,x1,y1,x2,y2);
    });
    const pitchBg=`<rect x="0" y="0" width="${AW}" height="${AH}" fill="#0b150b"/>
      <rect x="${AMX}" y="${AMY}" width="${APW}" height="${APH}" fill="#0d1f0d" stroke="#1c3a1c" stroke-width="1.5"/>
      <line x1="${AW/2}" y1="${AMY}" x2="${AW/2}" y2="${AH-AMY}" stroke="#1c3a1c" stroke-width="1"/>
      <circle cx="${AW/2}" cy="${AH/2}" r="${(APH*9.15/68).toFixed(0)}" fill="none" stroke="#1c3a1c" stroke-width="1"/>
      <rect x="${AMX}" y="${(AMY+APH*(68-40.32)/2/68).toFixed(1)}" width="${(APW*16.5/105).toFixed(1)}" height="${(APH*40.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.8"/>
      <rect x="${(AW-AMX-APW*16.5/105).toFixed(1)}" y="${(AMY+APH*(68-40.32)/2/68).toFixed(1)}" width="${(APW*16.5/105).toFixed(1)}" height="${(APH*40.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.8"/>`;
    const mapSVG=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:18px">
      <svg viewBox="0 0 ${AW} ${AH}" style="width:100%;display:block;overflow:visible">${pitchBg}${zHL}${passLines}</svg>
    </div>`;

    // Tabla por tipo de pase
    const typeStats={};
    selP.forEach(p=>{const t=getPassType(p);if(!typeStats[t])typeStats[t]={total:0,succ:0};typeStats[t].total++;if(p.out==='s')typeStats[t].succ++;});
    const maxTy=Math.max(1,...Object.values(typeStats).map(t=>t.total));
    const typeRows=['long','prog','back','lat','other'].filter(t=>typeStats[t]).map(t=>{
      const {total,succ}=typeStats[t],fail=total-succ,pct=Math.round(succ/total*100);
      const meta=PASS_TYPE_META[t],pc=pct>=70?'var(--green)':pct>=55?'#e3b341':'#f85149';
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:7px 12px"><span style="font-size:10px;font-weight:700;color:${meta.color};background:${meta.color}18;padding:2px 8px;border-radius:3px">${meta.emoji} ${meta.label}</span></td>
        <td style="padding:7px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text)">${total}</td>
        <td style="padding:7px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green)">${succ}</td>
        <td style="padding:7px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--red)">${fail}</td>
        <td style="padding:7px 8px;text-align:center"><span style="font-size:12px;font-weight:700;color:${pc}">${pct}%</span></td>
        <td style="padding:7px 14px;min-width:65px"><div style="height:5px;background:var(--bg4);border-radius:3px"><div style="height:5px;width:${Math.round(total/maxTy*100)}%;background:${meta.color};border-radius:3px;opacity:0.75"></div></div></td>
      </tr>`;
    }).join('');

    // Tabla por zona de destino
    const destStats={1:{total:0,succ:0},2:{total:0,succ:0},3:{total:0,succ:0}};
    selP.forEach(p=>{if(destStats[p._toZ]){destStats[p._toZ].total++;if(p.out==='s')destStats[p._toZ].succ++;}});
    const maxDe=Math.max(1,...Object.values(destStats).map(d=>d.total));
    const destRows=[1,2,3].filter(z=>destStats[z].total>0).map(z=>{
      const {total,succ}=destStats[z],fail=total-succ,pct=Math.round(succ/total*100);
      const col=Z_COLS[z-1],pc=pct>=70?'var(--green)':pct>=55?'#e3b341':'#f85149';
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:7px 12px">
          <span style="font-size:11px;font-weight:700;color:${col}">Z${z}</span>
          ${z===pasesIndivZone?`<span style="font-size:9px;color:var(--text3);margin-left:6px">intra-zona</span>`:''}
        </td>
        <td style="padding:7px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text)">${total}</td>
        <td style="padding:7px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--green)">${succ}</td>
        <td style="padding:7px 10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--red)">${fail}</td>
        <td style="padding:7px 8px;text-align:center"><span style="font-size:12px;font-weight:700;color:${pc}">${pct}%</span></td>
        <td style="padding:7px 14px;min-width:65px"><div style="height:5px;background:var(--bg4);border-radius:3px"><div style="height:5px;width:${Math.round(total/maxDe*100)}%;background:${col};border-radius:3px;opacity:0.75"></div></div></td>
      </tr>`;
    }).join('');

    const mkTH = cols => `<thead><tr>${cols.map(c=>typeof c==='string'?`<th>${c}</th>`:`<th style="text-align:center">${c.t}</th>`).join('')}</tr></thead>`;
    const typeTable = typeRows ? `<div class="table-wrap"><table>${mkTH(['Tipo de pase',{t:'Total'},{t:'✅'},{t:'❌'},{t:'%'},''])}<tbody>${typeRows}</tbody></table></div>` : '<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">Sin datos</div>';
    const destTable = destRows ? `<div class="table-wrap"><table>${mkTH(['Zona destino',{t:'Total'},{t:'✅'},{t:'❌'},{t:'%'},''])}<tbody>${destRows}</tbody></table></div>` : '<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">Sin datos</div>';

    const analysis = selTot ? `${selHeader}${mapSVG}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div style="font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:10px">Por tipo de pase</div>
          ${typeTable}
        </div>
        <div>
          <div style="font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);font-weight:600;margin-bottom:10px">Zona de destino</div>
          ${destTable}
        </div>
      </div>` : '';

    cont.innerHTML = matchSel + buildPasesSubTabs() + periodBar + jugSubBar + zoneBar + playerGrid + analysis;
  }

  // ── Pass tooltip — HTML flotante que sigue al cursor ─────────────────────
  const _passReg = {};
  let   _passRegIdx = 0;
  const PHASE_LABELS = {bu:'Build-up',cr:'Creación',fi:'Finalización',di:'Directo',tr:'Transición',sp:'Pelota parada',ch:'Cambio',qb:'Quick break',ds:'Desde portero'};

  function showPassTip(evt, id) {
    const p = _passReg[id]; if (!p) return;
    const succ    = p.out === 's';
    const type    = getPassType(p);
    const meta    = PASS_TYPE_META[type] || PASS_TYPE_META.other;
    const col     = succ ? meta.color : '#f85149';
    const phase   = PHASE_LABELS[p.phase||''] || '';
    const receiver= succ && p.to ? p.to : null;
    const pos     = p.pos || '';

    const tip = document.getElementById('passTip');
    tip.innerHTML = `
      <div style="background:#0d1117;border:1px solid ${col};border-left:4px solid ${col};border-radius:8px;
                  padding:10px 14px;box-shadow:0 8px 32px rgba(0,0,0,0.8);min-width:190px;max-width:280px">
        <div style="display:flex;align-items:baseline;gap:7px;margin-bottom:5px">
          <span style="font-size:13px;font-weight:700;color:#e6edf3;white-space:nowrap">${p.n}</span>
          ${pos?`<span style="font-size:9px;font-weight:700;color:${col};background:${col}22;padding:1px 5px;border-radius:3px">${pos}</span>`:''}
        </div>
        ${receiver?`<div style="font-size:12px;color:${col};margin-bottom:6px">→ <span style="color:#c9d1d9;font-weight:500">${receiver}</span></div>`:''}
        <div style="height:1px;background:rgba(255,255,255,0.07);margin-bottom:6px"></div>
        <div style="display:flex;flex-wrap:wrap;gap:4px 8px;font-size:10.5px;color:#8b949e">
          <span><b style="color:${col}">${meta.emoji}</b> ${meta.label}</span>
          ${p.dist?`<span>· ${Math.round(p.dist)} m</span>`:''}
          ${p.min!=null?`<span>· min. ${p.min}</span>`:''}
          ${phase?`<span>· ${phase}</span>`:''}
          <span style="color:${succ?'#3fb950':'#f85149'};font-weight:600">· ${succ?'✅ Éxito':'❌ Fallido'}</span>
        </div>
      </div>`;
    tip.style.display = 'block';
    movePassTip(evt);
  }

  function movePassTip(evt) {
    const tip = document.getElementById('passTip');
    if (!tip || tip.style.display === 'none') return;
    const inner = tip.firstElementChild;
    const w = inner ? inner.offsetWidth  : 220;
    const h = inner ? inner.offsetHeight : 80;
    const x = evt.clientX + 18;
    const y = evt.clientY - 10;
    tip.style.left = Math.min(x, window.innerWidth  - w - 16) + 'px';
    tip.style.top  = Math.max(10, Math.min(y, window.innerHeight - h - 16)) + 'px';
  }

  function hidePassTip() {
    const tip = document.getElementById('passTip');
    if (tip) tip.style.display = 'none';
  }

  // ── Helper: build a single pass line (no SVG tooltip — uses HTML tooltip) ──
  function buildPassLineGroup(p, x1, y1, x2, y2) {
    const succ    = p.out === 's';
    const type    = getPassType(p);
    const typeCol = (PASS_TYPE_META[type] || PASS_TYPE_META.other).color;
    const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy);
    if (len < 2) return '';

    const id = 'pt' + (_passRegIdx++);
    _passReg[id] = p;

    let vis = '';
    if (succ) {
      vis += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#3fb950" stroke-width="6" stroke-opacity="0.10" stroke-linecap="round"/>`;
      vis += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${typeCol}" stroke-width="2" stroke-opacity="0.82" stroke-linecap="round"/>`;
      const nx=dx/len, ny=dy/len, ax=x2-nx*9, ay=y2-ny*9, px=-ny*4.5, py=nx*4.5;
      vis += `<polygon points="${x2.toFixed(1)},${y2.toFixed(1)} ${(ax+px).toFixed(1)},${(ay+py).toFixed(1)} ${(ax-px).toFixed(1)},${(ay-py).toFixed(1)}" fill="#3fb950" fill-opacity="0.90"/>`;
      vis += `<circle cx="${x1.toFixed(1)}" cy="${y1.toFixed(1)}" r="3.5" fill="${typeCol}" fill-opacity="0.85" stroke="#0d1f0d" stroke-width="0.8"/>`;
    } else {
      vis += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#f85149" stroke-width="5" stroke-opacity="0.12" stroke-linecap="round" stroke-dasharray="8,5"/>`;
      vis += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#f85149" stroke-width="1.6" stroke-opacity="0.72" stroke-linecap="round" stroke-dasharray="8,5"/>`;
      vis += `<circle cx="${x1.toFixed(1)}" cy="${y1.toFixed(1)}" r="3.5" fill="none" stroke="#f85149" stroke-width="1.5" stroke-opacity="0.80"/>`;
    }
    // Wide transparent hitbox — easy hover target even on thin lines
    const hit = `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="transparent" stroke-width="18" stroke-linecap="round"/>`;

    return `<g onmouseenter="showPassTip(event,'${id}')" onmousemove="movePassTip(event)" onmouseleave="hidePassTip()" style="cursor:crosshair">${vis}${hit}</g>`;
  }

  // No CSS needed in SVG anymore — tooltip is HTML
  const PASS_TIP_CSS = '';

  function buildPasesMapSVG(passes) {
    const AW=920, AH=590, AMX=55, AMY=40, APW=AW-AMX*2, APH=AH-AMY*2;
    const sv=(x,y)=>({sx:AMX+((x+52.5)/105)*APW, sy:AMY+((34-y)/68)*APH});

    // ── Pitch background ───────────────────────────────────────────────────────
    const pitch = `
      <rect x="0" y="0" width="${AW}" height="${AH}" fill="#0b150b"/>
      <rect x="${AMX}" y="${AMY}" width="${APW}" height="${APH}" fill="#0d1f0d" stroke="#1c3a1c" stroke-width="1.5"/>
      <line x1="${AW/2}" y1="${AMY}" x2="${AW/2}" y2="${AH-AMY}" stroke="#1c3a1c" stroke-width="1"/>
      <circle cx="${AW/2}" cy="${AH/2}" r="${(APH*9.15/68).toFixed(0)}" fill="none" stroke="#1c3a1c" stroke-width="1"/>
      <rect x="${AMX}" y="${(AMY+APH*(68-40.32)/2/68).toFixed(1)}" width="${(APW*16.5/105).toFixed(1)}" height="${(APH*40.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.8"/>
      <rect x="${(AW-AMX-APW*16.5/105).toFixed(1)}" y="${(AMY+APH*(68-40.32)/2/68).toFixed(1)}" width="${(APW*16.5/105).toFixed(1)}" height="${(APH*40.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.8"/>
      <rect x="${AMX}" y="${(AMY+APH*(68-18.32)/2/68).toFixed(1)}" width="${(APW*5.5/105).toFixed(1)}" height="${(APH*18.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.5"/>
      <rect x="${(AW-AMX-APW*5.5/105).toFixed(1)}" y="${(AMY+APH*(68-18.32)/2/68).toFixed(1)}" width="${(APW*5.5/105).toFixed(1)}" height="${(APH*18.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.5"/>`;

    // ── Zone overlays ──────────────────────────────────────────────────────────
    // Zone 1: x ∈ [-52.5, -17.5], Zone 2: [-17.5, 17.5], Zone 3: [17.5, 52.5]
    const {sx:z1x1}=sv(-52.5,34); const {sx:z1x2}=sv(-17.5,34);
    const {sx:z2x2}=sv(17.5,34);  const {sx:z3x2}=sv(52.5,34);
    const zoneW1=z1x2-z1x1, zoneW2=z2x2-z1x2, zoneW3=z3x2-z2x2;

    const ZONE_COLORS = ['#58a6ff','#e3b341','#f85149'];
    const ZONE_LABELS = ['Zona 1','Zona 2','Zona 3'];
    let zones = '';
    [[z1x1,zoneW1,0],[z1x2,zoneW2,1],[z2x2,zoneW3,2]].forEach(([zx,zw,zi])=>{
      const active = pasesZoneFilter === zi+1;
      const col = ZONE_COLORS[zi];
      const lx = (zx + zw/2).toFixed(1);
      const toggleFn = `pasesZoneFilter=${active?'null':zi+1};renderPasesMap()`;
      zones += `<g onclick="${toggleFn}" style="cursor:pointer">
        <rect x="${zx.toFixed(1)}" y="${AMY}" width="${zw.toFixed(1)}" height="${APH}"
          fill="${col}" fill-opacity="${active?'0.15':'0.04'}"
          stroke="${col}" stroke-width="${active?2:1}" stroke-opacity="${active?0.7:0.25}"
          rx="0"/>
        <text x="${lx}" y="${(AMY+16).toFixed(1)}" text-anchor="middle"
          font-family="DM Sans,sans-serif" font-size="11" font-weight="${active?'700':'500'}"
          fill="${col}" fill-opacity="${active?0.95:0.5}">${ZONE_LABELS[zi]}</text>
      </g>`;
    });

    // ── Pass lines — successful first (below failed), each wrapped with tooltip ─
    // Coordenadas normalizadas: equipo siempre ataca →
    let lines = '';
    const sorted = [...passes].sort((a,b) => (a.out==='s'?0:1) - (b.out==='s'?0:1));
    sorted.forEach(p => {
      if (p.x == null || p.xe == null) return;
      const {x:nx, y:ny, xe:nxe, ye:nye} = normPassCoords(p);
      const {sx:x1,sy:y1} = sv(nx,  ny);
      const {sx:x2,sy:y2} = sv(nxe, nye);
      lines += buildPassLineGroup(p, x1, y1, x2, y2);
    });

    // ── Zone click hint ────────────────────────────────────────────────────────
    const hint = `<text x="${(AW/2).toFixed(0)}" y="${(AH-8).toFixed(0)}" text-anchor="middle"
      font-family="DM Sans,sans-serif" font-size="9" fill="#6e7681">Haz clic en una zona para filtrar</text>`;

    return `<svg viewBox="0 0 ${AW} ${AH}" style="width:100%;display:block;overflow:visible">${PASS_TIP_CSS}${pitch}${zones}${lines}${hint}</svg>`;
  }

  // INIT
  loadRedPases();
</script>
</body>
</html>
