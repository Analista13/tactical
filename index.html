          <td style="padding:10px 16px;text-align:center;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);border-left:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap">${label}</td>
          <td style="padding:10px 16px;text-align:left;color:${w2?'var(--green)':'var(--text2)'}">${fmt(v2)}</td>
        </tr>`;
      }).join('');

      const rival=partido.local===currentTeam.name?partido.vis:partido.local;
      const lugar=partido.local===currentTeam.name?'🏠':'✈️';

      cont.innerHTML=`
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
          <div><div style="font-size:11px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px">${partido.j} · ${partido.f} · ${lugar} · 1ª vs 2ª Parte</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px">${currentTeam.name} vs ${rival}</div></div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent)">${partido.s}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
          ${miniNet(m1,'⚽ 1ª Parte','#c8a96e')}
          ${miniNet(m2,'⚽ 2ª Parte','#58a6ff')}
        </div>
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="border-bottom:2px solid var(--border)">
              <th style="padding:10px 16px;text-align:right;font-size:12px;color:var(--accent);font-weight:700;width:35%">1ª Parte</th>
              <th style="padding:10px 16px;text-align:center;font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;border-left:1px solid var(--border);border-right:1px solid var(--border)">MÉTRICA</th>
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--blue);font-weight:700;width:35%">2ª Parte</th>
            </tr></thead>
            <tbody>${cmpHTML}</tbody>
          </table>
        </div>`;
    } catch(e){
      cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--red)">${e.message}</div>`;
    }
  }

  // ── ZONAS SKILLCORNER: 3 tercios × 5 canales = 15 zonas oficiales ──────────
  // Canales (eje y, de izq a der): wide_left | half_space_left | center | half_space_right | wide_right
  // Tercios (eje x, de atrás a ataque): defensive_third | middle_third | attacking_third
  // Límites canal: y > 20.4 → wide_left, 6.8-20.4 → half_space_left, ±6.8 → center, etc.
  // Límites tercio: x < -17.5 → def, -17.5 a 17.5 → mid, x > 17.5 → att

  function buildZoneMap(points, AW, AH, AMX, AMY, compact=false) {
    const APW=AW-AMX*2, APH=AH-AMY*2;
    const total=points.length;
    // 15 celdas: [tercio 0-2][canal 0-4]
    const grid=Array.from({length:5},()=>[0,0,0]); // [canal][tercio]
    points.forEach(({x,y})=>{
      const t=x<-17.5?0:x<=17.5?1:2;
      const c=y>20.4?0:y>6.8?1:y>=-6.8?2:y>=-20.4?3:4;
      grid[c][t]++;
    });
    const maxV=Math.max(1,...grid.flat());
    const TW=APW/3, CH=APH/5; // tamaño celda en píxeles
    // etiquetas de canales y tercios (solo vista completa)
    const CANAL_LABELS=['Banda Izq','Semi Izq','Centro','Semi Dch','Banda Dch'];
    const TERCIO_LABELS=['ZONA 1','ZONA 2','ZONA 3'];
    let cells='', labels='';
    for(let c=0;c<5;c++) for(let t=0;t<3;t++){
      const v=grid[c][t];
      const pct=total?Math.round(v/total*100):0;
      const intensity=v/maxV;
      // color: escala accent con opacidad
      const alpha=(intensity*0.72).toFixed(2);
      const bx=(AMX+t*TW).toFixed(1), by=(AMY+c*CH).toFixed(1);
      const bw=TW.toFixed(1), bh=CH.toFixed(1);
      cells+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="rgba(200,169,110,${alpha})" stroke="rgba(200,169,110,0.15)" stroke-width="0.5"/>`;
      if(!compact && pct>0){
        const cx=(+bx+TW/2).toFixed(1), cy=(+by+CH/2).toFixed(1);
        const fs=Math.max(9, Math.min(14, TW/5));
        cells+=`<text x="${cx}" y="${(+cy+fs*0.35).toFixed(1)}" text-anchor="middle" font-family="'Bebas Neue',sans-serif" font-size="${fs}" fill="rgba(255,255,255,${Math.max(0.45,intensity).toFixed(2)})">${pct}%</text>`;
      }
    }
    if(!compact){
      // Etiquetas tercios (arriba)
      TERCIO_LABELS.forEach((lbl,t)=>{
        const cx=(AMX+t*TW+TW/2).toFixed(1);
        labels+=`<text x="${cx}" y="${(AMY-8).toFixed(1)}" text-anchor="middle" font-family="'DM Mono',monospace" font-size="9" fill="#8b949e" letter-spacing="1.5">${lbl}</text>`;
      });
      // Etiquetas canales (izquierda)
      CANAL_LABELS.forEach((lbl,c)=>{
        const cy=(AMY+c*CH+CH/2).toFixed(1);
        labels+=`<text x="${(AMX-6).toFixed(1)}" y="${cy}" text-anchor="end" dominant-baseline="middle" font-family="'DM Sans',sans-serif" font-size="8" fill="#8b949e">${lbl}</text>`;
      });
    }
    // campo base (líneas discretas)
    const fieldBase=`<rect x="0" y="0" width="${AW}" height="${AH}" fill="#0d1117"/>
      <rect x="${AMX}" y="${AMY}" width="${APW}" height="${APH}" fill="#0d1f0d" stroke="rgba(200,169,110,0.12)" stroke-width="1"/>
      <line x1="${(AMX+TW).toFixed(1)}" y1="${AMY}" x2="${(AMX+TW).toFixed(1)}" y2="${AH-AMY}" stroke="rgba(200,169,110,0.12)" stroke-width="0.8" stroke-dasharray="3,3"/>
      <line x1="${(AMX+TW*2).toFixed(1)}" y1="${AMY}" x2="${(AMX+TW*2).toFixed(1)}" y2="${AH-AMY}" stroke="rgba(200,169,110,0.12)" stroke-width="0.8" stroke-dasharray="3,3"/>
      <line x1="${AMX}" y1="${(AMY+CH).toFixed(1)}" x2="${AW-AMX}" y2="${(AMY+CH).toFixed(1)}" stroke="rgba(200,169,110,0.08)" stroke-width="0.5"/>
      <line x1="${AMX}" y1="${(AMY+CH*2).toFixed(1)}" x2="${AW-AMX}" y2="${(AMY+CH*2).toFixed(1)}" stroke="rgba(200,169,110,0.08)" stroke-width="0.5"/>
      <line x1="${AMX}" y1="${(AMY+CH*3).toFixed(1)}" x2="${AW-AMX}" y2="${(AMY+CH*3).toFixed(1)}" stroke="rgba(200,169,110,0.08)" stroke-width="0.5"/>
      <line x1="${AMX}" y1="${(AMY+CH*4).toFixed(1)}" x2="${AW-AMX}" y2="${(AMY+CH*4).toFixed(1)}" stroke="rgba(200,169,110,0.08)" stroke-width="0.5"/>`;
    // posición media
    let marker='';
    if(total>0){
      const ax=points.reduce((s,p)=>s+p.x,0)/total;
      const ay=points.reduce((s,p)=>s+p.y,0)/total;
      const mx=(AMX+((ax+52.5)/105)*APW).toFixed(1);
      const my=(AMY+((34-ay)/68)*APH).toFixed(1);
      const mr=compact?4:7;
      marker=`<circle cx="${mx}" cy="${my}" r="${mr}" fill="rgba(255,255,255,0.9)" stroke="rgba(0,0,0,0.5)" stroke-width="1.5"/>`;
    }
    return `<svg viewBox="0 0 ${AW} ${AH}" style="width:100%;display:block">${fieldBase}${cells}${marker}${labels}</svg>`;
  }

  // ── barra de subtabs de Jugadores ──────────────────────────────────────────
  function jugSubTabBar() {
    const tabs=[['mapa','🗺️ Mapa de Pases'],['asoc','🤝 Asociaciones'],['telarana','🕸️ Telaraña'],['metricas','📊 Métricas'],['calor','🔥 Mapas de Calor']];
    return `<div style="display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border)">
      ${tabs.map(([id,lbl])=>`<button onclick="setJugSubTab('${id}')" style="background:transparent;border:none;border-bottom:2px solid ${jugSubTab===id?'var(--accent)':'transparent'};color:${jugSubTab===id?'var(--accent)':'var(--text2)'};padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap">${lbl}</button>`).join('')}
    </div>`;
  }

  async function renderJugadores() {
    const tid=currentTeam.id, mid=redMatchId;
    const cont=document.getElementById('redCont');
    if(!cont) return;
    if(!mid){
      cont.innerHTML=`<div style="text-align:center;padding:60px;color:var(--text3);font-size:13px">Selecciona un partido</div>`;
      return;
    }
    cont.innerHTML=`${jugSubTabBar()}<div class="loading"><div class="spinner"></div><span>Cargando datos...</span></div>`;
    const partido=PARTIDOS.find(p=>p.id==mid);
    try {
      const lineup=await getLineup(mid,tid);
      if(!lineup.length){
        cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3)">Sin datos de alineación</div>`;
        return;
      }
      const playerMap={}, idMap={};
      lineup.forEach(p=>{ playerMap[p.name]=p.position; idMap[p.name]=p.id; });
      const allPlayers=Object.keys(playerMap);
      const allPlayersSet=new Set(allPlayers);

      // Queries paralelas → posiciones y pases simultáneamente
      const [{data:posData},{data:passData}] = await Promise.all([
        sbGet('eventos',`select=player_name,x_start,y_start&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&x_start=not.is.null&limit=5000`),
        sbGet('eventos',`select=player_name,player_targeted_name,x_start,y_start,x_end,y_end,pass_distance,player_targeted_xthreat,player_targeted_xpass_completion,first_line_break,lead_to_shot&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&pass_outcome=eq.successful&limit=5000`)
      ]);
      const posA={},posC={},posRaw={};
      posData.forEach(e=>{
        if(!allPlayersSet.has(e.player_name)) return;
        if(!posA[e.player_name]){posA[e.player_name]={x:0,y:0};posC[e.player_name]=0;posRaw[e.player_name]=[];}
        posA[e.player_name].x+=e.x_start; posA[e.player_name].y+=e.y_start; posC[e.player_name]++;
        posRaw[e.player_name].push({x:e.x_start,y:e.y_start});
      });
      const posM={};
      const GK_POS=['GK','PT','PORTERO','POR','P','GOALKEEPER'];
      allPlayers.forEach(n=>{
        if(posC[n]>0){ posM[n]={x:posA[n].x/posC[n],y:posA[n].y/posC[n]}; }
        else { const pos=(playerMap[n]||'').toUpperCase().trim(); posM[n]=GK_POS.includes(pos)?{x:-47,y:0}:null; }
      });
      const playerPasses={},playerTotal={},playerProg={},playerRecv={};
      const playerFT={},playerDistSum={},playerDistN={};
      const playerXT={},playerXTN={},playerXpassSum={},playerXpassN={},playerLB={},playerShot={};
      const playerShort={},playerLong={};
      passData.forEach(e=>{
        if(!allPlayersSet.has(e.player_name)||!allPlayersSet.has(e.player_targeted_name)||e.player_name===e.player_targeted_name) return;
        if(!playerPasses[e.player_name]) playerPasses[e.player_name]={};
        const k=e.player_targeted_name;
        if(!playerPasses[e.player_name][k]) playerPasses[e.player_name][k]={total:0,prog:0,back:0};
        playerPasses[e.player_name][k].total++;
        playerTotal[e.player_name]=(playerTotal[e.player_name]||0)+1;
        playerRecv[k]=(playerRecv[k]||0)+1;
        const dx=e.x_end!=null&&e.x_start!=null?e.x_end-e.x_start:0;
        if(dx>9){ playerPasses[e.player_name][k].prog++; playerProg[e.player_name]=(playerProg[e.player_name]||0)+1; }
        if(dx<-5) playerPasses[e.player_name][k].back++;
        // Último tercio
        if(e.x_end!=null&&e.x_end>17.5) playerFT[e.player_name]=(playerFT[e.player_name]||0)+1;
        // Distancia (pre-calculada por SkillCorner)
        if(e.pass_distance!=null){
          playerDistSum[e.player_name]=(playerDistSum[e.player_name]||0)+e.pass_distance;
          playerDistN[e.player_name]=(playerDistN[e.player_name]||0)+1;
          if(e.pass_distance<15) playerShort[e.player_name]=(playerShort[e.player_name]||0)+1;
          if(e.pass_distance>32) playerLong[e.player_name]=(playerLong[e.player_name]||0)+1;
        }
        // xThreat generado
        if(e.player_targeted_xthreat!=null){ playerXT[e.player_name]=(playerXT[e.player_name]||0)+e.player_targeted_xthreat; playerXTN[e.player_name]=(playerXTN[e.player_name]||0)+1; }
        // xPass completion esperada
        if(e.player_targeted_xpass_completion!=null){ playerXpassSum[e.player_name]=(playerXpassSum[e.player_name]||0)+e.player_targeted_xpass_completion; playerXpassN[e.player_name]=(playerXpassN[e.player_name]||0)+1; }
        // Líneas rotas
        if(e.first_line_break===true) playerLB[e.player_name]=(playerLB[e.player_name]||0)+1;
        // Posesiones que terminan en tiro
        if(e.lead_to_shot===true) playerShot[e.player_name]=(playerShot[e.player_name]||0)+1;
      });

      const sorted=allPlayers.map(n=>({
        name:n, pos:playerMap[n]||'', id:idMap[n]||null,
        ...getPosTier(playerMap[n]),
        total:playerTotal[n]||0,
      })).sort((a,b)=>a.tier!==b.tier?a.tier-b.tier:a.order!==b.order?a.order-b.order:b.total-a.total);

      // Colores por línea (referencia globals: TIER_COL, TIER_BG, TIER_BO, TIER_LABEL)

      // ── Helpers SVG compartidos ─────────────────────────────────────────────
      const W=260,H=170,MX=20,MY=14,PW=W-MX*2,PH=H-MY*2;
      const sv=(x,y)=>({sx:MX+((x+52.5)/105)*PW,sy:MY+((34-y)/68)*PH});
      const rival=partido.local===currentTeam.name?partido.vis:partido.local;
      const lugar=partido.local===currentTeam.name?'🏠':'✈️';

      const fieldBase=()=>`<rect x="${MX}" y="${MY}" width="${PW}" height="${PH}" fill="#0a1a0a" stroke="#1a3a1a" stroke-width="1"/>
        <line x1="${(W/2).toFixed(1)}" y1="${MY}" x2="${(W/2).toFixed(1)}" y2="${H-MY}" stroke="#1a3a1a" stroke-width="0.8"/>
        <circle cx="${(W/2).toFixed(1)}" cy="${(H/2).toFixed(1)}" r="${(PH*9.15/68).toFixed(0)}" fill="none" stroke="#1a3a1a" stroke-width="0.8"/>
        <rect x="${MX}" y="${(MY+PH*(68-40.32)/2/68).toFixed(1)}" width="${(PW*16.5/105).toFixed(1)}" height="${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#1a3a1a" stroke-width="0.6"/>
        <rect x="${(W-MX-PW*16.5/105).toFixed(1)}" y="${(MY+PH*(68-40.32)/2/68).toFixed(1)}" width="${(PW*16.5/105).toFixed(1)}" height="${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#1a3a1a" stroke-width="0.6"/>
        <rect x="${MX}" y="${(MY+PH*(68-18.32)/2/68).toFixed(1)}" width="${(PW*5.5/105).toFixed(1)}" height="${(PH*18.32/68).toFixed(1)}" fill="none" stroke="#1a3a1a" stroke-width="0.4"/>
        <rect x="${(W-MX-PW*5.5/105).toFixed(1)}" y="${(MY+PH*(68-18.32)/2/68).toFixed(1)}" width="${(PW*5.5/105).toFixed(1)}" height="${(PH*18.32/68).toFixed(1)}" fill="none" stroke="#1a3a1a" stroke-width="0.4"/>`;

      const playerDot=(px,py,tc)=>`
        <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="8" fill="${tc}" fill-opacity="0.15" stroke="${tc}" stroke-width="0"/>
        <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5.5" fill="${tc}" fill-opacity="0.25" stroke="${tc}" stroke-width="2"/>
        <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="2.5" fill="${tc}" fill-opacity="0.95"/>`;

      const cardHeader=(pos,dispName,tc,bo,bg,playerId,extra='')=>{
        const dorsal=playerId&&PLAYER_DORSALES[playerId];
        return `<div style="padding:9px 12px 8px;border-bottom:1px solid ${bo};display:flex;align-items:center;gap:7px;background:${bg}">
          ${dorsal?`<span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:${tc};opacity:0.75;line-height:1;flex-shrink:0;min-width:22px;text-align:right">${dorsal}</span>`:''}
          <span style="color:${tc};font-size:9px;font-weight:700;background:rgba(0,0,0,0.25);border:1px solid ${bo};padding:2px 6px;border-radius:4px;flex-shrink:0;letter-spacing:0.8px;font-family:'DM Mono',monospace">${pos}</span>
          <span style="font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${dispName}</span>
          ${extra}
        </div>`;
      };

      const matchHeader=(subtitle,legend='')=>
        `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:20px">
          <div>
            <div style="font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px">${partido.j} · ${partido.f} · ${lugar} · ${subtitle}</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px">${currentTeam.name} <span style="color:var(--text3);font-size:16px">vs</span> ${rival}</div>
          </div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:4px;color:var(--accent)">${partido.s}</div>
          ${legend?`<div style="margin-left:auto;display:flex;gap:18px;font-size:11px;color:var(--text2);align-items:center;flex-wrap:wrap">${legend}</div>`:''}
        </div>`;

      const tierSection=(tierId,players,content)=>{
        const tc=TIER_COL[tierId], bo=TIER_BO[tierId];
        return `<div style="margin-bottom:32px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid ${bo}">
            <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:${tc}">${TIER_LABEL[tierId]}</div>
            <div style="font-size:11px;color:var(--text3);font-weight:400">${players} jugador${players>1?'es':''}</div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:16px">${content}</div>
        </div>`;
      };

      // ── ROUTING: Mapa de Pases / Asociaciones / Telaraña ────────────────────
      let html='';

      if(jugSubTab==='mapa'){
        // ── MAPA DE PASES ───────────────────────────────────────────────────────
        const legend=`
          <div style="display:flex;align-items:center;gap:5px"><div style="width:18px;height:3px;background:#3fb950;border-radius:2px"></div>Progresivo</div>
          <div style="display:flex;align-items:center;gap:5px"><div style="width:18px;height:3px;background:#c8a96e;border-radius:2px"></div>Lateral</div>
          <div style="display:flex;align-items:center;gap:5px"><div style="width:18px;height:3px;background:#8b949e;border-radius:2px"></div>Atrás</div>`;
        html=matchHeader('Mapa de pases individual',legend);

        const miniField=(playerName,tierId)=>{
          const p=posM[playerName]; if(!p) return null;
          const {sx:px,sy:py}=sv(p.x,p.y);
          const passes=playerPasses[playerName]||{};
          const maxT=Math.max(1,...Object.values(passes).map(v=>v.total));
          let lin='',dots='';
          Object.entries(passes).sort((a,b)=>a[1].total-b[1].total).forEach(([tgt,cnts])=>{
            const tp=posM[tgt]; if(!tp) return;
            const {sx:tx,sy:ty}=sv(tp.x,tp.y);
            const n=cnts.total, op=0.22+(n/maxT)*0.62, sw=0.7+(n/maxT)*3.8;
            const col=cnts.prog/n>0.35?'#3fb950':cnts.back/n>0.45?'#8b949e':'#c8a96e';
            lin+=`<line x1="${px.toFixed(1)}" y1="${py.toFixed(1)}" x2="${tx.toFixed(1)}" y2="${ty.toFixed(1)}" stroke="${col}" stroke-width="${sw.toFixed(1)}" stroke-opacity="${op.toFixed(2)}" stroke-linecap="round"/>`;
            dots+=`<circle cx="${tx.toFixed(1)}" cy="${ty.toFixed(1)}" r="3" fill="${col}" fill-opacity="0.2" stroke="${col}" stroke-width="1.2" stroke-opacity="${(0.4+(n/maxT)*0.6).toFixed(2)}"/>`;
          });
          return `${fieldBase()}${lin}${dots}${playerDot(px,py,TIER_COL[tierId]||'#c8a96e')}`;
        };

        for(let t=0;t<=3;t++){
          const tp=sorted.filter(p=>p.tier===t&&posM[p.name]); if(!tp.length) continue;
          const bo=TIER_BO[t]; let cards='';
          tp.forEach(({name,pos,total,id})=>{
            const fc=miniField(name,t); if(!fc) return;
            const recv=playerRecv[name]||0, prog=playerProg[name]||0;
            const progPct=total>0?Math.round((prog/total)*100):0;
            cards+=`<div style="background:var(--bg2);border:1px solid ${bo};border-radius:var(--radius);overflow:hidden;width:260px;flex-shrink:0;transition:transform 0.18s,box-shadow 0.18s" onmouseenter="this.style.transform='translateY(-3px)';this.style.boxShadow='0 6px 24px rgba(0,0,0,0.35)'" onmouseleave="this.style.transform='';this.style.boxShadow=''">
              ${cardHeader(pos,dispN(name),TIER_COL[t],bo,TIER_BG[t],id)}
              <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">${fc}</svg>
              <div style="padding:8px 12px;border-top:1px solid ${bo};display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;background:var(--bg)">
                <div style="padding:4px 0;border-right:1px solid ${bo}">
                  <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:${TIER_COL[t]};line-height:1.1">${total}</div>
                  <div style="font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:1px">Enviados</div>
                </div>
                <div style="padding:4px 0;border-right:1px solid ${bo}">
                  <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text2);line-height:1.1">${recv}</div>
                  <div style="font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:1px">Recibidos</div>
                </div>
                <div style="padding:4px 0">
                  <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:#3fb950;line-height:1.1">${progPct}<span style="font-size:10px;font-family:'DM Sans',sans-serif;color:var(--text3)">%</span></div>
                  <div style="font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:1px">Progresivos</div>
                </div>
              </div>
            </div>`;
          });
          html+=tierSection(t,tp.length,cards);
        }

      } else if(jugSubTab==='asoc'){
        // ── ASOCIACIONES ────────────────────────────────────────────────────────
        // Pases bidireccionales A↔B = A→B + B→A
        const assocM={};
        allPlayers.forEach(a=>allPlayers.forEach(b=>{
          if(a===b) return;
          const tot=((playerPasses[a]?.[b]?.total)||0)+((playerPasses[b]?.[a]?.total)||0);
          if(!tot) return;
          if(!assocM[a]) assocM[a]={};
          assocM[a][b]=tot;
        }));

        const RCOL=['#f0c040','#b0b8c8','#cd8c5c'];

        const assocField=(playerName,tierId)=>{
          const p=posM[playerName]; if(!p) return null;
          const {sx:px,sy:py}=sv(p.x,p.y);
          // Mismo estilo que Mapa de Pases (pases direccionales, coloreados por tipo)
          const passes=playerPasses[playerName]||{};
          const maxT=Math.max(1,...Object.values(passes).map(v=>v.total));
          let lin='',dots='';
          Object.entries(passes).sort((a,b)=>a[1].total-b[1].total).forEach(([tgt,cnts])=>{
            const tp=posM[tgt]; if(!tp) return;
            const {sx:tx,sy:ty}=sv(tp.x,tp.y);
            const n=cnts.total, op=0.22+(n/maxT)*0.62, sw=0.7+(n/maxT)*3.8;
            const col=cnts.prog/n>0.35?'#3fb950':cnts.back/n>0.45?'#8b949e':'#c8a96e';
            // Línea igual que Mapa de Pases
            lin+=`<line x1="${px.toFixed(1)}" y1="${py.toFixed(1)}" x2="${tx.toFixed(1)}" y2="${ty.toFixed(1)}" stroke="${col}" stroke-width="${sw.toFixed(1)}" stroke-opacity="${op.toFixed(2)}" stroke-linecap="round"/>`;
            // Círculo-dorsal como marcador de destino
            const dop=(0.45+(n/maxT)*0.55).toFixed(2);
            const dorsal=PLAYER_DORSALES[idMap[tgt]];
            if(dorsal!=null){
              dots+=`<circle cx="${tx.toFixed(1)}" cy="${ty.toFixed(1)}" r="7.5" fill="#0a1410" fill-opacity="0.92" stroke="${col}" stroke-width="1.5" stroke-opacity="${dop}"/>`;
              dots+=`<text x="${tx.toFixed(1)}" y="${(ty+2.8).toFixed(1)}" fill="${col}" font-size="7.5" font-family="'DM Mono',monospace" font-weight="700" text-anchor="middle" opacity="${dop}">${dorsal}</text>`;
            } else {
              dots+=`<circle cx="${tx.toFixed(1)}" cy="${ty.toFixed(1)}" r="3" fill="${col}" fill-opacity="0.2" stroke="${col}" stroke-width="1.2" stroke-opacity="${dop}"/>`;
            }
          });
          const tc=TIER_COL[tierId]||'#c8a96e';
          return `${fieldBase()}${lin}${dots}${playerDot(px,py,tc)}`;
        };

        html=matchHeader('Asociaciones clave por jugador',
          `<div style="display:flex;align-items:center;gap:5px"><div style="width:18px;height:3px;background:#3fb950;border-radius:2px"></div>Progresivo</div>
           <div style="display:flex;align-items:center;gap:5px"><div style="width:18px;height:3px;background:#c8a96e;border-radius:2px"></div>Lateral</div>
           <div style="display:flex;align-items:center;gap:5px"><div style="width:18px;height:3px;background:#8b949e;border-radius:2px"></div>Atrás</div>`);

        const sortedA=allPlayers.map(n=>({
          name:n, pos:playerMap[n]||'', id:idMap[n]||null,
          ...getPosTier(playerMap[n]),
          totalA:Object.values(assocM[n]||{}).reduce((s,v)=>s+v,0),
        })).sort((a,b)=>a.tier!==b.tier?a.tier-b.tier:a.order!==b.order?a.order-b.order:b.totalA-a.totalA);

        for(let t=0;t<=3;t++){
          const tp=sortedA.filter(p=>p.tier===t&&posM[p.name]); if(!tp.length) continue;
          const bo=TIER_BO[t]; let cards='';
          tp.forEach(({name,pos,totalA,id})=>{
            const fc=assocField(name,t); if(!fc) return;
            const top3=Object.entries(assocM[name]||{}).sort((a,b)=>b[1]-a[1]).slice(0,3);
            const rankRows=top3.length?top3.map(([partner,cnt],idx)=>{
              const pDorsal=PLAYER_DORSALES[idMap[partner]];
              return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;${idx<top3.length-1?'border-bottom:1px solid '+bo:''}">
                <span style="color:${RCOL[idx]};font-size:10px;font-weight:700;font-family:'DM Mono',monospace;width:22px;flex-shrink:0">#${idx+1}</span>
                ${pDorsal?`<span style="color:${RCOL[idx]};font-family:'Bebas Neue',sans-serif;font-size:14px;line-height:1;opacity:0.7;flex-shrink:0">${pDorsal}</span>`:''}
                <span style="font-size:11px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${dispN(partner)}</span>
                <span style="font-family:'Bebas Neue',sans-serif;font-size:17px;color:${RCOL[idx]};line-height:1">${cnt}</span>
              </div>`;}).join('')
              :`<div style="font-size:11px;color:var(--text3);text-align:center;padding:4px">Sin conexiones</div>`;
            cards+=`<div style="background:var(--bg2);border:1px solid ${bo};border-radius:var(--radius);overflow:hidden;width:260px;flex-shrink:0;transition:transform 0.18s,box-shadow 0.18s" onmouseenter="this.style.transform='translateY(-3px)';this.style.boxShadow='0 6px 24px rgba(0,0,0,0.35)'" onmouseleave="this.style.transform='';this.style.boxShadow=''">
              ${cardHeader(pos,dispN(name),TIER_COL[t],bo,TIER_BG[t],id,
                `<span style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text3);margin-left:auto;flex-shrink:0">${totalA} asoc.</span>`)}
              <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">${fc}</svg>
              <div style="padding:10px 12px;border-top:1px solid ${bo};background:var(--bg)">${rankRows}</div>
            </div>`;
          });
          html+=tierSection(t,tp.length,cards);
        }

      } else if(jugSubTab==='telarana'){
        // ── TELARAÑA ────────────────────────────────────────────────────────────
        // Starters = jugadores con start_time == '00:00:00'
        const starterNames=new Set(lineup.filter(p=>p.start_time==='00:00:00').map(p=>p.name));

        // Función que construye un SVG de red dado un array de jugadores activos
        const buildRed=(activePlayers)=>{
          const activeSet=new Set(activePlayers);
          const teaPairs=[];
          const seen=new Set();
          activePlayers.forEach(a=>activePlayers.forEach(b=>{
            if(a===b) return;
            const key=[a,b].sort().join('|||');
            if(seen.has(key)) return; seen.add(key);
            const cnt=((playerPasses[a]?.[b]?.total)||0)+((playerPasses[b]?.[a]?.total)||0);
            if(cnt>0) teaPairs.push({a,b,cnt});
          }));
          const maxCnt=Math.max(1,...teaPairs.map(p=>p.cnt));
          const maxTotal=Math.max(1,...activePlayers.map(n=>playerTotal[n]||0));

          const TW=860,TH=560,TMX=60,TMY=44,TPW=860-120,TPH=560-88;
          const tsv=(x,y)=>({sx:TMX+((x+52.5)/105)*TPW,sy:TMY+((34-y)/68)*TPH});

          const tField=`
            <rect x="${TMX}" y="${TMY}" width="${TPW}" height="${TPH}" fill="#0a1a0a" stroke="#1a3a1a" stroke-width="1.5"/>
            <line x1="${TW/2}" y1="${TMY}" x2="${TW/2}" y2="${TH-TMY}" stroke="#1a3a1a" stroke-width="1"/>
            <circle cx="${TW/2}" cy="${TH/2}" r="${(TPH*9.15/68).toFixed(0)}" fill="none" stroke="#1a3a1a" stroke-width="1"/>
            <rect x="${TMX}" y="${(TMY+TPH*(68-40.32)/2/68).toFixed(1)}" width="${(TPW*16.5/105).toFixed(1)}" height="${(TPH*40.32/68).toFixed(1)}" fill="none" stroke="#1a3a1a" stroke-width="0.8"/>
            <rect x="${(TW-TMX-TPW*16.5/105).toFixed(1)}" y="${(TMY+TPH*(68-40.32)/2/68).toFixed(1)}" width="${(TPW*16.5/105).toFixed(1)}" height="${(TPH*40.32/68).toFixed(1)}" fill="none" stroke="#1a3a1a" stroke-width="0.8"/>
            <rect x="${TMX}" y="${(TMY+TPH*(68-18.32)/2/68).toFixed(1)}" width="${(TPW*5.5/105).toFixed(1)}" height="${(TPH*18.32/68).toFixed(1)}" fill="none" stroke="#1a3a1a" stroke-width="0.5"/>
            <rect x="${(TW-TMX-TPW*5.5/105).toFixed(1)}" y="${(TMY+TPH*(68-18.32)/2/68).toFixed(1)}" width="${(TPW*5.5/105).toFixed(1)}" height="${(TPH*18.32/68).toFixed(1)}" fill="none" stroke="#1a3a1a" stroke-width="0.5"/>`;

          let tLines='',tNodes='';
          teaPairs.sort((a,b)=>a.cnt-b.cnt).forEach(({a,b,cnt})=>{
            const pa=posM[a],pb=posM[b]; if(!pa||!pb) return;
            const {sx:ax,sy:ay}=tsv(pa.x,pa.y);
            const {sx:bx,sy:by}=tsv(pb.x,pb.y);
            const ratio=cnt/maxCnt;
            const op=(0.05+ratio*0.55).toFixed(2);
            const sw=(0.4+ratio*5.5).toFixed(1);
            tLines+=`<line x1="${ax.toFixed(1)}" y1="${ay.toFixed(1)}" x2="${bx.toFixed(1)}" y2="${by.toFixed(1)}" stroke="#c8a96e" stroke-width="${sw}" stroke-opacity="${op}" stroke-linecap="round"/>`;
          });

          const activeSorted=sorted.filter(s=>activeSet.has(s.name));
          activeSorted.forEach(({name,id})=>{
            const p=posM[name]; if(!p) return;
            const {sx,sy}=tsv(p.x,p.y);
            const {tier}=getPosTier(playerMap[name]);
            const tc=TIER_COL[tier]||'#c8a96e';
            const total=playerTotal[name]||0;
            const r=10+(total/maxTotal)*11;
            const dorsal=id&&PLAYER_DORSALES[id];
            const fs=(r*0.75).toFixed(1);
            tNodes+=`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${(r+6).toFixed(1)}" fill="${tc}" fill-opacity="0.07"/>`;
            tNodes+=`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${r.toFixed(1)}" fill="#0d1117" stroke="${tc}" stroke-width="2"/>`;
            if(dorsal!=null){
              tNodes+=`<text x="${sx.toFixed(1)}" y="${(sy+r*0.38).toFixed(1)}" fill="${tc}" font-size="${fs}" font-family="'Bebas Neue',sans-serif" text-anchor="middle">${dorsal}</text>`;
            }
            tNodes+=`<text x="${sx.toFixed(1)}" y="${(sy+r+11).toFixed(1)}" fill="#8b949e" font-size="9.5" font-family="'DM Sans',sans-serif" text-anchor="middle" font-weight="500">${dispN(name)}</text>`;
          });

          return `<svg viewBox="0 0 ${TW} ${TH}" style="width:100%;display:block">${tField}${tLines}${tNodes}</svg>`;
        };

        // Toggle Todos / XI Inicial
        const modeToggle=`<div style="display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px;width:fit-content;margin-bottom:16px">
          ${[['todos','👥 Todos'],['titulares','🟡 XI Inicial']].map(([m,lbl])=>`
            <button onclick="setTelaranaMode('${m}')" style="background:${telaranaMode===m?'var(--accent)':'transparent'};color:${telaranaMode===m?'#0d1117':'var(--text2)'};border:none;border-radius:16px;padding:6px 16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.18s;white-space:nowrap">${lbl}</button>`).join('')}
        </div>`;

        const tLegend=`
          ${[0,1,2,3].map((t,i)=>`<div style="display:flex;align-items:center;gap:5px">
            <div style="width:11px;height:11px;border-radius:50%;border:2px solid ${TIER_COL[t]};background:rgba(13,17,23,0.9)"></div>
            <span>${['GK','DEF','MED','DEL'][i]}</span>
          </div>`).join('')}
          <div style="display:flex;align-items:center;gap:5px;margin-left:6px">
            <div style="width:22px;height:3px;background:#c8a96e;border-radius:2px;opacity:0.7"></div>
            <span>Pases bilaterales</span>
          </div>`;

        const activePlayers = telaranaMode==='titulares'
          ? allPlayers.filter(n=>starterNames.has(n))
          : allPlayers;

        const svgRed = buildRed(activePlayers);
        const teLabel = telaranaMode==='titulares'
          ? `🟡 XI Inicial · ${activePlayers.length} jugadores`
          : `👥 Todos · ${activePlayers.length} jugadores`;

        html=matchHeader(`🕸️ Telaraña — ${teLabel}`,tLegend);
        html+=modeToggle;
        html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">${svgRed}</div>`;

      } else if(jugSubTab==='metricas'){
        // ── MÉTRICAS ─────────────────────────────────────────────────────────────
        // Construcción de filas con métricas básicas + SkillCorner avanzadas
        const metRows=sorted.map(({name,pos,id,tier})=>{
          const xtTotal=playerXT[name]||0;
          const xtN=playerXTN[name]||0;
          const xpassN=playerXpassN[name]||0;
          const tot=playerTotal[name]||0;
          return {
            name, pos, id, tier,
            total : tot,
            ft    : playerFT[name]||0,
            dist  : playerDistN[name]>0 ? +(playerDistSum[name]/playerDistN[name]).toFixed(1) : 0,
            xt    : +xtTotal.toFixed(4),
            xtpp  : xtN>0 ? +(xtTotal/xtN).toFixed(4) : 0,
            xpas  : xpassN>0 ? Math.round((playerXpassSum[name]/xpassN)*100) : 0,
            lb    : playerLB[name]||0,
            shot  : playerShot[name]||0,
            short : playerShort[name]||0,
            long  : playerLong[name]||0,
          };
        });

        // ── LEYENDA en tarjetas con descripción ─────────────────────────────
        const metDefs=[
          {abbr:'ENV',    col:'var(--text2)', label:'Pases enviados',    desc:'Total pases completados al equipo en el partido'},
          {abbr:'ÚLT⅓',  col:'var(--text2)', label:'Último tercio',     desc:'Pases cuyo destino entra en el tercio final del campo (x>17.5)'},
          {abbr:'DIST',   col:'var(--text2)', label:'Distancia media',   desc:'Longitud media de sus pases en metros'},
          {abbr:'CORTOS', col:'#58a6ff',      label:'Pases cortos',      desc:'Pases completados de menos de 15 m — circulación y apoyo'},
          {abbr:'LARGOS', col:'#58a6ff',      label:'Pases largos',      desc:'Pases completados de más de 32 m — cambios de juego y pelotazos'},
          {abbr:'xT↑',   col:'var(--accent)',label:'xThreat generado',  desc:'Aumento de prob. de gol acumulado. Cada pase sube el valor de zona de destino menos la de origen'},
          {abbr:'xT/P',  col:'var(--accent)',label:'xThreat por pase',  desc:'Peligro medio por pase. Indica calidad de decisión, no volumen'},
          {abbr:'xPas%', col:'var(--accent)',label:'Compl. esperada',   desc:'% que el modelo espera que se completen sus pases (dificultad táctica y técnica)'},
          {abbr:'LÍNEAS',col:'var(--text2)', label:'Líneas rotas',      desc:'Pases que superan al menos una línea defensiva rival (first_line_break)'},
          {abbr:'→TIRO', col:'#f85149',      label:'Acaban en tiro',    desc:'Posesiones del jugador en esa secuencia que terminan con un disparo del equipo'},
        ];
        const metLegend=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-top:4px">
          ${metDefs.map(d=>`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 10px">
            <div style="font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:${d.col};letter-spacing:1px;margin-bottom:3px">${d.abbr}</div>
            <div style="font-size:11px;color:var(--text);font-weight:600;margin-bottom:2px">${d.label}</div>
            <div style="font-size:10px;color:var(--text3);line-height:1.4">${d.desc}</div>
          </div>`).join('')}
        </div>`;
        html=matchHeader('📊 Métricas avanzadas', metLegend);

        for(let t=0;t<=3;t++){
          const tp=metRows.filter(p=>p.tier===t); if(!tp.length) continue;
          const bo=TIER_BO[t], tc=TIER_COL[t];
          const mx={
            total:Math.max(1,...tp.map(p=>p.total)), ft:Math.max(1,...tp.map(p=>p.ft)),
            dist :Math.max(1,...tp.map(p=>p.dist)),  xt:Math.max(0.0001,...tp.map(p=>p.xt)),
            xtpp :Math.max(0.0001,...tp.map(p=>p.xtpp)), xpas:Math.max(1,...tp.map(p=>p.xpas)),
            lb   :Math.max(1,...tp.map(p=>p.lb)),    shot:Math.max(1,...tp.map(p=>p.shot)),
            short:Math.max(1,...tp.map(p=>p.short)), long:Math.max(1,...tp.map(p=>p.long)),
          };
          const bar=(v,m,col=tc)=>`<div style="height:2px;background:var(--bg4);border-radius:1px;margin-top:4px"><div style="height:2px;width:${Math.min(100,Math.round(v/m*100))}%;background:${col};border-radius:1px;transition:width 0.3s"></div></div>`;
          const cell=(v,m,disp,col=tc,last=false)=>`<td style="padding:9px 13px;text-align:right;${last?'':'border-right:1px solid '+bo+';'}vertical-align:top;min-width:64px">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:17px;color:${col};line-height:1;white-space:nowrap">${disp}</div>
            ${bar(v,m,col)}
          </td>`;

          const thS=`padding:8px 13px;text-align:right;font-size:9px;letter-spacing:1.5px;color:var(--text3);font-weight:600;font-family:'DM Mono',monospace;border-right:1px solid ${bo};white-space:nowrap`;
          const thLast=`padding:8px 13px;text-align:right;font-size:9px;letter-spacing:1.5px;color:var(--text3);font-weight:600;font-family:'DM Mono',monospace;white-space:nowrap`;
          const thead=`<tr style="border-bottom:2px solid ${bo};background:var(--bg)">
            <th style="${thS.replace('text-align:right','text-align:left')}">JUGADOR</th>
            <th style="${thS}">ENV.</th>
            <th style="${thS}">ÚLT⅓</th>
            <th style="${thS}">DIST.</th>
            <th style="${thS};color:#58a6ff" title="Pases < 15m">CORTOS</th>
            <th style="${thS};color:#58a6ff" title="Pases > 32m">LARGOS</th>
            <th style="${thS};color:${tc}">xT↑</th>
            <th style="${thS};color:${tc}">xT/P</th>
            <th style="${thS};color:${tc}">xPas%</th>
            <th style="${thS}">LÍNEAS</th>
            <th style="${thLast}">→TIRO</th>
          </tr>`;

          const rows=tp.sort((a,b)=>b.xt-a.xt).map(p=>{
            const dorsal=p.id&&PLAYER_DORSALES[p.id];
            // xT columns get accent highlight
            const xtCol=tc; // color tier
            return `<tr style="border-bottom:1px solid ${bo};transition:background 0.12s" onmouseenter="this.style.background='rgba(255,255,255,0.025)'" onmouseleave="this.style.background=''">
              <td style="padding:9px 14px;border-right:1px solid ${bo};white-space:nowrap;min-width:160px">
                <div style="display:flex;align-items:center;gap:7px">
                  ${dorsal?`<span style="font-family:'Bebas Neue',sans-serif;font-size:17px;color:${tc};opacity:0.65;min-width:18px;text-align:right;flex-shrink:0">${dorsal}</span>`:''}
                  <span style="color:${tc};font-size:8px;font-weight:700;background:rgba(0,0,0,0.3);border:1px solid ${bo};padding:2px 5px;border-radius:3px;letter-spacing:0.8px;font-family:'DM Mono',monospace;flex-shrink:0">${p.pos}</span>
                  <span style="font-size:12px;font-weight:600;color:var(--text)">${dispN(p.name)}</span>
                </div>
              </td>
              ${cell(p.total,mx.total,p.total)}
              ${cell(p.ft,mx.ft,p.ft)}
              ${cell(p.dist,mx.dist,p.dist+'m')}
              ${cell(p.short,mx.short,p.short,'#58a6ff')}
              ${cell(p.long,mx.long,p.long,'#58a6ff')}
              ${cell(p.xt,mx.xt,p.xt.toFixed(3),xtCol)}
              ${cell(p.xtpp,mx.xtpp,p.xtpp.toFixed(3),xtCol)}
              ${cell(p.xpas,mx.xpas,p.xpas+'%',xtCol)}
              ${cell(p.lb,mx.lb,p.lb)}

  // ─── TAB SWITCHING ──────────────────────────────────────────────────────────
  function switchTab(tab) {

  // ─── ALINEACIONES ────────────────────────────────────────────────────────────
  // Coordenadas tácticas por código de posición (SkillCorner → campo horizontal)
  // x ∈ [-52.5, 52.5]  izq=propio arco, der=portería rival
  // y ∈ [-34, 34]       y>0=izquierda, y<0=derecha
  const POS_XY = {
    'GK' :{x:-47,y:  0},
    'LB' :{x:-32,y: 24}, 'RB' :{x:-32,y:-24},
    'LCB':{x:-35,y: 11}, 'RCB':{x:-35,y:-11},
    'CB' :{x:-35,y:  0},
    'LWB':{x:-18,y: 28}, 'RWB':{x:-18,y:-28},
    'LDM':{x:-12,y: 13}, 'RDM':{x:-12,y:-13},
    'DM' :{x:-14,y:  0},
    'LCM':{x:  1,y: 15}, 'RCM':{x:  1,y:-15},
    'CM' :{x:  1,y:  0},
    'LM' :{x:  3,y: 19}, 'RM' :{x:  3,y:-19},
    'LAM':{x: 16,y: 15}, 'RAM':{x: 16,y:-15},
    'AM' :{x: 16,y:  0}, 'CAM':{x: 16,y:  0},
    'LW' :{x: 30,y: 27}, 'RW' :{x: 30,y:-27},
    'CF' :{x: 38,y:  0},
    'LF' :{x: 35,y: 16}, 'RF' :{x: 35,y:-16},
    'SS' :{x: 33,y:  0}, 'ST' :{x: 38,y:  0},
  };

  // ─── Posición canónica de cada jugador (posición táctica real del equipo) ────
  // Fuente: conocimiento del analista. Usada como fallback cuando el tracking
  // de SkillCorner asigna una posición claramente errónea (ej. un defensa como CF).
  const PLAYER_CANONICAL_POS = {
    928181:'RW',   // A. Keita        — extremo derecho / delantero
    25640: 'LB',   // Andoni López    — lateral izquierdo
    13149: 'LCB',  // B. Moltenis     — central (zurdo)
    826951:'CF',   // Borja Vázquez   — delantero centro
    25796: 'LW',   // Borja Valle     — extremo izquierdo
    736606:'LM',   // E. Frimpong     — mediocampista izq.
    532819:'CM',   // Eneko Aguilar   — mediocampista central
    62134: 'LCB',  // Eneko Undabarrena — central (zurdo)
    23777: 'DM',   // Fede San Emeterio — pivote defensivo
    746539:'RCB',  // Germán Novoa    — central (diestro)
    745374:'CF',   // José Luis Cortés — delantero centro
    70531: 'RW',   // P. Ferrer       — extremo derecho
    31995: 'CF',   // Sergio Benito   — delantero centro
    505184:'RB',   // Diego Moreno    — lateral derecho
    69380: 'AM',   // Xemi Fernández  — mediapunta / extremo
    34150: 'GK',   // Ángel Jiménez   — portero
    3156:  'LM',   // Erik Morán      — mediocampista izq.
    24021: 'GK',   // Andrés Prieto   — portero
    24345: 'CM',   // Vicente Esquerdo — mediocampista central
    26415: 'LW',   // Álex Mula       — extremo izquierdo
    31972: 'LCB',  // David Andújar   — central
    69915: 'CF',   // Borislav Stankov — delantero
    180393:'LB',   // Vasco Sousa     — lateral izquierdo
    258595:'RB',   // Mario Jorrín    — lateral derecho
    486534:'AM',   // S. Petkov       — mediapunta
    531656:'RW',   // Carlos Calderón — extremo derecho
    671880:'RW',   // Lian            — extremo derecho
    819170:'RB',   // Koke            — lateral derecho
    1029735:'RM',  // V. Kisil        — mediocampista derecho
    1066888:'RM',  // O. Mfulu        — mediocampista derecho
  };

  // Corrige posiciones de tracking cuando el tier difiere ≥ 2 respecto a la canónica
  // (ej. defensa rastreado como delantero, portero como CM, etc.)
  function resolvePlayerPosition(player) {
    const tracked  = (player.position || '').toUpperCase().trim();
    const canonical = PLAYER_CANONICAL_POS[player.id];
    if(!canonical) return tracked || 'CM';
    const tTracked   = getPosTier(tracked).tier;
    const tCanonical = getPosTier(canonical).tier;
    // GK nunca puede cambiar de posición
    if(tCanonical === 0 || tTracked === 0) return tCanonical === 0 ? canonical : tracked;
    // Diferencia de 2 o más tiers (DEF↔ATT): claramente incorrecto → usar canónica
    if(Math.abs(tTracked - tCanonical) >= 2) return canonical;
    return tracked;
  }

  // ─── Helpers globales (accesibles desde buildAlineacionSVG, renderAlineacion, renderJugadores) ───
  function getPosTier(pos){
    const p=(pos||'').toUpperCase().trim();
    if(['GK','PT','POR','PORTERO','P','GOALKEEPER'].includes(p)) return {tier:0,order:0};
    if(['RB','RWB','RCB'].includes(p)) return {tier:1,order:1};
    if(['CB','DC','DF','DEF','CD','BC','CT','LCB'].includes(p)) return {tier:1,order:2};
    if(['LB','LWB'].includes(p)) return {tier:1,order:3};
    if(['RM','RDM','RCM','RAM'].includes(p)) return {tier:2,order:1};
    if(['CDM','DM','SD','CM','MC','MID','CAM','AM','MF','M','MO'].includes(p)) return {tier:2,order:2};
    if(['LM','LDM','LCM','LAM'].includes(p)) return {tier:2,order:3};
    if(['RW','RF'].includes(p)) return {tier:3,order:1};
    if(['CF','ST','FW','ATT','DEL','SS'].includes(p)) return {tier:3,order:2};
    if(['LW','LF'].includes(p)) return {tier:3,order:3};
    return {tier:2,order:2};
  }
  const TIER_COL  = ['#c8a96e','#58a6ff','#3fb950','#f85149'];
  const TIER_BG   = ['rgba(200,169,110,0.07)','rgba(88,166,255,0.07)','rgba(63,185,80,0.07)','rgba(248,81,73,0.07)'];
  const TIER_BO   = ['rgba(200,169,110,0.2)','rgba(88,166,255,0.2)','rgba(63,185,80,0.2)','rgba(248,81,73,0.2)'];
  const TIER_LABEL= ['🧤 Portero','🛡️ Defensas','⚙️ Centrocampistas','⚡ Delanteros'];
  const dispN     = n=>{const p=n.split(' ');return n.length>20?(p.length>1?p[p.length-1]:n.substring(0,18)):n;};

  function detectFormacion(players) {
    const DEF = ['LB','RB','LCB','RCB','CB','LWB','RWB'];
    const DM  = ['LDM','RDM','DM'];
    const MID = ['LCM','RCM','CM','LM','RM'];
    const AMF = ['LAM','RAM','AM','CAM'];
    const FWD = ['LW','RW','CF','LF','RF','SS','ST','FW','ATT'];
    const pos = p => (p.position||'').toUpperCase();
    const nd=players.filter(p=>DEF.includes(pos(p))).length;
    const ndm=players.filter(p=>DM.includes(pos(p))).length;
    const nm=players.filter(p=>MID.includes(pos(p))).length;
    const na=players.filter(p=>AMF.includes(pos(p))).length;
    const nf=players.filter(p=>FWD.includes(pos(p))).length;
    const parts=[nd];
    if(ndm&&(nm||na||nf)) parts.push(ndm);
    if(nm) parts.push(nm);
    if(na&&nf) parts.push(na);
    else if(na) { parts[parts.length-1]=(parts[parts.length-1]||0)+na; }
    parts.push(nf);
    return parts.filter(Boolean).join('-');
  }

  function buildAlineacionSVG(players, parte) {
    // Coordenadas reales de SkillCorner (avg x,y de posesiones) cuando disponibles
    // Fallback a POS_XY con resolución de colisiones para jugadores sin tracking
    const coords={};
    const noCoords=[];   // jugadores sin avg_x/avg_y → usar POS_XY

    players.forEach(p=>{
      if(p.avg_x!==null && p.avg_x!==undefined && p.avg_y!==null && p.avg_y!==undefined){
        coords[p.id]={x:p.avg_x, y:p.avg_y};  // posición real SkillCorner
      } else {
        noCoords.push(p);
      }
    });

    // Para jugadores sin datos reales: POS_XY + anticolisión
    const byPos={};
    noCoords.forEach(p=>{
      const k=p.position;
      if(!byPos[k]) byPos[k]=[];
      byPos[k].push(p);
    });
    Object.entries(byPos).forEach(([pos,grp])=>{
      const base=POS_XY[pos]||{x:0,y:0};
      const spread=grp.length>1?10:0;
      grp.forEach((p,i)=>{
        coords[p.id]={x:base.x, y:base.y+(i-(grp.length-1)/2)*spread};
      });
    });

    const AW=920, AH=590, AMX=70, AMY=46, APW=AW-AMX*2, APH=AH-AMY*2;
    const asv=(x,y)=>({sx:AMX+((x+52.5)/105)*APW, sy:AMY+((34-y)/68)*APH});

    // Campo
    const fieldSVG=`
      <rect x="0" y="0" width="${AW}" height="${AH}" fill="#0b150b"/>
      <rect x="${AMX}" y="${AMY}" width="${APW}" height="${APH}" fill="#0d1f0d" stroke="#1c3a1c" stroke-width="1.5"/>
      <line x1="${AW/2}" y1="${AMY}" x2="${AW/2}" y2="${AH-AMY}" stroke="#1c3a1c" stroke-width="1"/>
      <circle cx="${AW/2}" cy="${AH/2}" r="${(APH*9.15/68).toFixed(0)}" fill="none" stroke="#1c3a1c" stroke-width="1"/>
      <rect x="${AMX}" y="${(AMY+APH*(68-40.32)/2/68).toFixed(1)}" width="${(APW*16.5/105).toFixed(1)}" height="${(APH*40.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.8"/>
      <rect x="${(AW-AMX-APW*16.5/105).toFixed(1)}" y="${(AMY+APH*(68-40.32)/2/68).toFixed(1)}" width="${(APW*16.5/105).toFixed(1)}" height="${(APH*40.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.8"/>
      <rect x="${AMX}" y="${(AMY+APH*(68-18.32)/2/68).toFixed(1)}" width="${(APW*5.5/105).toFixed(1)}" height="${(APH*18.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.5"/>
      <rect x="${(AW-AMX-APW*5.5/105).toFixed(1)}" y="${(AMY+APH*(68-18.32)/2/68).toFixed(1)}" width="${(APW*5.5/105).toFixed(1)}" height="${(APH*18.32/68).toFixed(1)}" fill="none" stroke="#1c3a1c" stroke-width="0.5"/>`;

    // Nodos
    let nodes='';
    players.forEach(p=>{
      const c=coords[p.id]||{x:0,y:0};
      const {sx,sy}=asv(c.x,c.y);
      const {tier}=getPosTier(p.position);
      const tc=TIER_COL[tier]||'#c8a96e';
      const dorsal=PLAYER_DORSALES[p.id];
      const isSub = parte==='2' && p.start_time!=='00:00:00';
      const subMin = isSub ? Math.floor(timeToMin(p.start_time)) : null;
      const R=23;

      // Aura exterior
      nodes+=`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${R+7}" fill="${tc}" fill-opacity="0.06"/>`;
      // Círculo principal
      nodes+=`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${R}" fill="#111c11" stroke="${tc}" stroke-width="${isSub?'2':'2.5'}" ${isSub?`stroke-dasharray="4 2"`:''} />`;
      // Dorsal
      if(dorsal!=null){
        nodes+=`<text x="${sx.toFixed(1)}" y="${(sy+8).toFixed(1)}" fill="${tc}" font-size="17" font-family="'Bebas Neue',sans-serif" text-anchor="middle" font-weight="bold">${dorsal}</text>`;
      } else {
        nodes+=`<text x="${sx.toFixed(1)}" y="${(sy+6).toFixed(1)}" fill="${tc}" font-size="11" font-family="'DM Sans',sans-serif" text-anchor="middle" font-weight="600">${p.position}</text>`;
      }
      // Nombre del jugador
      const shortName=p.name.split(' ')[0].length>8?p.name.split(' ')[0]:dispN(p.name);
      nodes+=`<text x="${sx.toFixed(1)}" y="${(sy+R+14).toFixed(1)}" fill="#c9d1d9" font-size="10.5" font-family="'DM Sans',sans-serif" text-anchor="middle" font-weight="500">${shortName}</text>`;
      // Indicador de cambio (entrada)
      if(isSub){
        nodes+=`<text x="${sx.toFixed(1)}" y="${(sy+R+27).toFixed(1)}" fill="#3fb950" font-size="9.5" font-family="'DM Sans',sans-serif" text-anchor="middle" font-weight="700">▲ ${subMin}'</text>`;
      }
    });

    return `<svg viewBox="0 0 ${AW} ${AH}" style="width:100%;display:block">${fieldSVG}${nodes}</svg>`;
  }

  function loadAlineaciones() {
    const matchOpts = PARTIDOS.map(p=>{
      const rival = p.local===currentTeam.name?p.vis:p.local;
      const s = p.local===currentTeam.name?'🏠':'✈️';
      return `<option value="${p.id}" ${p.id==aliMatchId?'selected':''}>${s} ${p.j} · ${rival} · ${p.s} · ${p.f}</option>`;
    }).join('');

    document.getElementById('content').innerHTML=`<div class="anim">${head()}
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap">
        <select id="aliSel" onchange="aliMatchId=parseInt(this.value);renderAlineacion()"
          style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;flex:1;min-width:280px">
          <option value="">— Selecciona un partido —</option>${matchOpts}
        </select>
      </div>
      <div id="aliCont">
        <div style="text-align:center;padding:60px;color:var(--text3);font-size:13px">Selecciona un partido para ver la alineación</div>
      </div>
    </div>`;

    if(aliMatchId) renderAlineacion();
  }

  function renderAlineacion() {
    const cont=document.getElementById('aliCont');
    if(!cont) return;
    const partido=PARTIDOS.find(p=>p.id==aliMatchId);
    const rawLineup=PONF_LINEUPS[aliMatchId]||[];
    if(!rawLineup.length){
      cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3)">Sin datos de alineación para este partido</div>`;
      return;
    }

    const lineup=rawLineup.map(r=>({id:r[0],name:r[1],position:r[2],start_time:r[3],end_time:r[4],
      avg_x:(r[5]!==undefined&&r[5]!==null)?r[5]:null,
      avg_y:(r[6]!==undefined&&r[6]!==null)?r[6]:null}));

    // Parte 1: jugadores que inician
    const starters=lineup.filter(p=>p.start_time==='00:00:00');
    // Parte 2: jugadores que terminan (end_time=null → en campo al final)
    const finishers=lineup.filter(p=>p.end_time===null);

    const activePlayers = aliParte==='1' ? starters : finishers;
    // Resolver posiciones: corrige errores de tracking (defensa rastreado como delantero, etc.)
    const resolvedPlayers = activePlayers.map(p=>({...p, position: resolvePlayerPosition(p)}));
    const formacion=detectFormacion(resolvedPlayers.filter(p=>p.position!=='GK'));

    // Jugadores que salieron si es 2ª parte (para mostrar cambios)
    const outPlayers = aliParte==='2' ? lineup.filter(p=>p.start_time==='00:00:00'&&p.end_time!==null) : [];

    // Subtabs parte
    const parteBtn=(id,lbl)=>{
      const act=aliParte===id;
      return `<button onclick="aliParte='${id}';renderAlineacion()" style="background:${act?'var(--accent)':'transparent'};color:${act?'#0d1117':'var(--text2)'};border:none;border-radius:16px;padding:7px 20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.18s;white-space:nowrap">${lbl}</button>`;
    };

    const rival=partido?(partido.local===currentTeam.name?partido.vis:partido.local):'?';
    const esLocal=partido&&partido.local===currentTeam.name;
    const score=partido?partido.s:'';
    const parteLabel=aliParte==='1'?`XI Inicial · ${starters.length} jugadores`:`XI Final · ${finishers.length} jugadores`;

    // Bloque de cambios (solo 2ª parte)
    let cambiosHtml='';
    if(aliParte==='2'&&outPlayers.length){
      const subIns=finishers.filter(p=>p.start_time!=='00:00:00');
      cambiosHtml=`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">`;
      subIns.forEach(sin=>{
        const minIn=Math.floor(timeToMin(sin.start_time));
        // Buscar a quién reemplazó (player que salió en el mismo rango de tiempo)
        const sout=outPlayers.find(so=>Math.abs(timeToMin(so.end_time)-timeToMin(sin.start_time))<2);
        const dIn=PLAYER_DORSALES[sin.id]!=null?`#${PLAYER_DORSALES[sin.id]} `:'';
        const dOut=sout&&PLAYER_DORSALES[sout.id]!=null?`#${PLAYER_DORSALES[sout.id]} `:'';
        cambiosHtml+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;display:flex;align-items:center;gap:8px">
          <span style="color:#3fb950;font-weight:700">▲</span>
          <span style="color:var(--text);font-weight:600">${dIn}${dispN(sin.name)}</span>
          ${sout?`<span style="color:var(--text3)">·</span><span style="color:#f85149;font-weight:600">▼ ${dOut}${dispN(sout.name)}</span>`:''}
          <span style="color:var(--text3);font-size:11px;margin-left:2px">${minIn}'</span>
        </div>`;
      });
      cambiosHtml+='</div>';
    }

    cont.innerHTML=`
      <!-- Header de partido -->
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px">
        <div>
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">${partido?partido.j+' · '+partido.f:''}</div>
          <div style="font-size:20px;font-weight:700;color:var(--text);font-family:'Bebas Neue',sans-serif;letter-spacing:1px">${esLocal?currentTeam.name:rival} <span style="color:var(--accent)">${score}</span> ${esLocal?rival:currentTeam.name}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:3px">${esLocal?'🏠 Local':'✈️ Visitante'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div style="background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.2);border-radius:20px;padding:4px 14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent)">
            ${formacion}
          </div>
          <div style="font-size:11px;color:var(--text3)">${parteLabel}</div>
        </div>
      </div>

      <!-- Toggle parte -->
      <div style="display:flex;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px;width:fit-content;margin-bottom:16px">
        ${parteBtn('1','⚽ 1ª Parte — XI Inicial')}
        ${parteBtn('2','🔄 2ª Parte — XI Final')}
      </div>

      ${cambiosHtml}

      <!-- Campo con jugadores -->
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        ${buildAlineacionSVG(resolvedPlayers, aliParte)}
      </div>

      <!-- Leyenda -->
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;padding:0 4px">
        ${[0,1,2,3].map((t,i)=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)">
          <div style="width:10px;height:10px;border-radius:50%;border:2px solid ${TIER_COL[t]}"></div>
          <span>${['Portero','Defensa','Medio','Delantero'][i]}</span>
        </div>`).join('')}
        ${aliParte==='2'?`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)">
          <div style="width:14px;height:14px;border-radius:50%;border:2px dashed #3fb950"></div>
          <span>Entró como suplente</span>
        </div>`:''}
      </div>`;
  }

  // INIT
  loadRedPases();
</script>
</body>
</html>
