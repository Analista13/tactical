    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:grid; grid-template-rows:var(--header) 1fr; grid-template-columns:var(--sidebar) 1fr; grid-template-areas:"header header" "sidebar main"; overflow:hidden; }

    header { grid-area:header; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; z-index:50; }
    .header-logo { width:28px; height:28px; object-fit:contain; }
    .header-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; }
    .header-sub { font-size:11px; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; margin-left:4px; margin-top:2px; }
    .header-badge { margin-left:auto; background:rgba(200,169,110,0.08); border:1px solid rgba(200,169,110,0.15); padding:4px 10px; border-radius:100px; font-size:11px; color:var(--accent); }

    aside { grid-area:sidebar; background:var(--bg2); border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; }
    aside::-webkit-scrollbar { width:4px; } aside::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:2px; }
    .sidebar-label { padding:16px 16px 6px; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text3); font-weight:600; }
    .team-item { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; border-radius:8px; margin:2px 8px; transition:all 0.15s; border:1px solid transparent; }
    .team-item:hover { background:var(--bg3); }
    .team-item.active { background:rgba(200,169,110,0.1); border-color:rgba(200,169,110,0.2); }
    .team-escudo { width:30px; height:30px; object-fit:contain; flex-shrink:0; }
    .team-name { font-size:13px; font-weight:500; color:var(--text); }
    .team-item.active .team-name { color:var(--accent); }
    .team-sub { font-size:11px; color:var(--text3); margin-top:1px; }
    .sidebar-divider { height:1px; background:var(--border); margin:8px 16px; }

    main { grid-area:main; display:flex; flex-direction:column; overflow:hidden; }
    .tabs-bar { height:var(--tabs); background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:4px; flex-shrink:0; overflow-x:auto; }
    .tabs-bar::-webkit-scrollbar { display:none; }
    .tab { display:flex; align-items:center; gap:6px; padding:6px 13px; border-radius:6px; font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; white-space:nowrap; transition:all 0.15s; border:1px solid transparent; }
    .tab:hover { background:var(--bg3); color:var(--text); }
    .tab.active { background:rgba(200,169,110,0.1); border-color:rgba(200,169,110,0.2); color:var(--accent); }

    .content { flex:1; overflow-y:auto; padding:24px; }
    .content::-webkit-scrollbar { width:6px; } .content::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:3px; }

    .content-head { display:flex; align-items:center; gap:12px; margin-bottom:22px; }
    .content-head-escudo { width:36px; height:36px; object-fit:contain; }
    .content-head h2 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; }
    .content-head p { font-size:12px; color:var(--text2); margin-top:1px; }

    .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; margin-bottom:22px; }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:18px; transition:all 0.2s; }
    .card:hover { border-color:rgba(200,169,110,0.25); transform:translateY(-1px); }
    .card-label { font-size:11px; color:var(--text3); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:8px; }
    .card-value { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:1px; color:var(--accent); line-height:1; }
    .card-sub { font-size:11px; color:var(--text3); margin-top:4px; }

    .table-wrap { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { padding:10px 16px; text-align:left; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); border-bottom:1px solid var(--border); font-weight:600; }
    td { padding:11px 16px; border-bottom:1px solid rgba(255,255,255,0.03); color:var(--text2); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--bg3); color:var(--text); }
    td:first-child { color:var(--text); font-weight:500; }

    .partidos { display:flex; flex-direction:column; gap:6px; }
    .partido { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; display:flex; align-items:center; gap:14px; transition:all 0.15s; }

    .partido-teams { flex:1; }

    .partido-score { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; }
    .win { color:var(--green); } .draw { color:var(--accent); } .loss { color:var(--red); }

    .bar-row { display:flex; align-items:center; gap:10px; }
    .bar-bg { flex:1; height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; }
    .bar-fill { height:100%; background:var(--accent); border-radius:3px; }
    .bar-pct { font-size:12px; color:var(--text2); min-width:38px; text-align:right; }

    .pill { display:inline-block; padding:3px 8px; border-radius:100px; font-size:11px; font-weight:500; }
    .pill-blue { background:rgba(88,166,255,0.12); color:var(--blue); }
    .pill-green { background:rgba(63,185,80,0.12); color:var(--green); }

    .pill-red { background:rgba(248,81,73,0.12); color:var(--red); }

    .loading { display:flex; flex-direction:column; align-items:center; gap:14px; padding:80px; color:var(--text3); font-size:13px; }
    .spinner { width:28px; height:28px; border:2px solid var(--bg4); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .subtab { background:transparent; border:none; color:var(--text2); padding:7px 16px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .subtab:hover { color:var(--text); background:var(--bg3); }
    .subtab.active { background:rgba(200,169,110,0.1); color:var(--accent); }

  async function sbGet(table, params) {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
      headers: { 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}`, 'Prefer':'count=exact' }

  function selectTeam(id, name, escudo) {

    currentTeam = {id, name, escudo};

  // Betweenness centrality (Brandes) — módulo compartido
  function calcBetweenness(nodes,ps){
    const bc={};nodes.forEach(n=>bc[n]=0);
    for(const s of nodes){
      const pred={},dist={},sigma={};
      nodes.forEach(n=>{dist[n]=Infinity;sigma[n]=0;pred[n]=[];});
      dist[s]=0;sigma[s]=1;const Q=[s],S=[];
      while(Q.length){
        const v=Q.shift();S.push(v);
        for(const w of nodes){
          if(!ps[`${v}|${w}`]) continue;
          if(dist[w]===Infinity){dist[w]=dist[v]+1;Q.push(w);}
          if(dist[w]===dist[v]+1){sigma[w]+=sigma[v];pred[w].push(v);}
        }
      }
      const delta={};nodes.forEach(n=>delta[n]=0);
      while(S.length){
        const w=S.pop();
        for(const v of pred[w]) delta[v]+=(sigma[v]/sigma[w])*(1+delta[w]);
        if(w!==s) bc[w]+=delta[w];
      }
    }
    return bc;
  }

  // RED DE PASES

  // Convertir start_time "HH:MM:SS" a minutos reales
  function timeToMin(t) {
    if(!t) return 999;
    const [h,m,s] = t.split(':').map(Number);
    return h*60 + m + s/60;
  }

  async function getLineup(matchId, teamId) {
    const r = await fetch(`${SB_URL}/rest/v1/rpc/get_lineup`, {
      method: 'POST',
      headers: { 'apikey':SB_KEY, 'Authorization':`Bearer ${SB_KEY}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ p_match_id: parseInt(matchId), p_team_id: parseInt(teamId) })
    });
    const data = await r.json();
    return Array.isArray(data) ? data : [];
  }

  async function renderRed(periodo) {
    const tid=currentTeam.id, mid=redMatchId;
    const cont=document.getElementById('redCont');
    if(!cont) return;
    cont.innerHTML=`<div class="loading"><div class="spinner"></div><span>Calculando red...</span></div>`;
    const partido=PARTIDOS.find(p=>p.id==mid);
    try {
      // Obtener alineación real desde JSON del partido
      const lineup = await getLineup(mid, tid);

      // Determinar jugadores en campo para este periodo
      // Periodo 1: jugadores con start_time = 00:00:00 (titulares)
      // Periodo 2: titulares que no salieron antes del min 45 + suplentes que entraron antes del min 90
      let jugadoresPeriodo = [];
      let suplentes = [];

      if(periodo === 1) {
        jugadoresPeriodo = lineup.filter(p => timeToMin(p.start_time) < 45);
        suplentes = jugadoresPeriodo.filter(p => timeToMin(p.start_time) > 0);
      } else {
        // En la 2ª parte: titulares que jugaron la 2ª parte + suplentes que entraron en 2ª parte
        jugadoresPeriodo = lineup.filter(p => {
          const entrada = timeToMin(p.start_time);
          const salida = p.end_time ? timeToMin(p.end_time) : 999;
          return entrada < 90 && salida > 45;
        });
        suplentes = jugadoresPeriodo.filter(p => timeToMin(p.start_time) >= 45);
      }

      const titMap = {};
      jugadoresPeriodo.forEach(p => { titMap[p.name] = p.position; });
      const tits = Object.keys(titMap);

      if(!tits.length){ cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3)">Sin datos de alineación para este partido</div>`; return; }

      const {data:allPP}=await sbGet('eventos',`select=player_name,x_start,y_start&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&period=eq.${periodo}&x_start=not.is.null&limit=5000`);
      const posA={},posC={};
      allPP.forEach(e=>{ if(!tits.includes(e.player_name)) return; if(!posA[e.player_name]){posA[e.player_name]={x:0,y:0};posC[e.player_name]=0;} posA[e.player_name].x+=e.x_start; posA[e.player_name].y+=e.y_start; posC[e.player_name]++; });
      const posM={};
      const GK_POS=['GK','PT','PORTERO','POR','P','GOALKEEPER'];
      tits.forEach(n=>{
        if(posC[n]>0){ posM[n]={x:posA[n].x/posC[n],y:posA[n].y/posC[n]}; }
        else { const pos=(titMap[n]||'').toUpperCase().trim(); posM[n]=GK_POS.includes(pos)?{x:-47,y:0}:null; }
      });

      const {data:pd}=await sbGet('eventos',`select=player_name,player_targeted_name,x_start,x_end&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&pass_outcome=eq.successful&period=eq.${periodo}&limit=5000`);
      const pases={}, progP={};
      tits.forEach(n=>{progP[n]=0;});
      pd.forEach(e=>{
        if(!tits.includes(e.player_name)||!tits.includes(e.player_targeted_name)||e.player_name===e.player_targeted_name) return;
        const k=`${e.player_name}|${e.player_targeted_name}`;
        pases[k]=(pases[k]||0)+1;
        if(e.x_end!=null&&e.x_start!=null&&(e.x_end-e.x_start)>9) progP[e.player_name]=(progP[e.player_name]||0)+1;
      });

      const totP={};
      tits.forEach(n=>{totP[n]=0;});
      Object.entries(pases).forEach(([k,n])=>{ const [f]=k.split('|'); totP[f]=(totP[f]||0)+n; });
      const maxP=Math.max(1,...Object.values(pases));
      const maxT=Math.max(1,...Object.values(totP));

      const totProgresivos=Object.values(progP).reduce((a,b)=>a+b,0);
      const totPasesAll=Object.values(pases).reduce((a,b)=>a+b,0);

      const bcScores=calcBetweenness(tits,pases);
      const maxBC=Math.max(1,...Object.values(bcScores));

      // Top 5 conexiones
      const topConn=Object.entries(pases).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,n])=>{
        const [fr,to]=k.split('|');
        return {fr,to,n,prog:posM[fr]&&posM[to]&&posM[to].x>posM[fr].x};
      });

      const suplSet = new Set(suplentes.map(p => p.name));

      let suplHTML='';
      if(suplentes.length > 0){
        const minToReal = (t) => {
          if(!t) return 0;
          const [h,m,s] = t.split(':').map(Number);
          if(h === 0) return m;
          return 45 + m;
        };
        const label = periodo===1 ? 'Suplentes 1ª parte' : 'Suplentes 2ª parte';
        suplHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px">
          <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px">${label}</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">${suplentes.map(p => {
            const minEntrada = minToReal(p.start_time);
            const jugadorSaliente = lineup.find(x => x.end_time === p.start_time && x.team_id === tid);
            const saliente = jugadorSaliente ? ` por ${jugadorSaliente.name}` : '';
            return `<div style="background:rgba(88,166,255,0.08);border:1px solid rgba(88,166,255,0.2);border-radius:6px;padding:5px 12px;font-size:12px;display:flex;gap:6px;align-items:center">
              <span style="color:#58a6ff;font-weight:700">↑</span>
              <span style="color:var(--text)">${p.name}</span>
              <span style="color:var(--accent);font-size:10px">${p.position}</span>
              <span style="color:var(--text3)">min ${minEntrada}'${saliente}</span>
            </div>`;
          }).join('')}
          </div></div>`;
      }

      const W=820,H=540,MX=50,MY=40,PW=W-MX*2,PH=H-MY*2;
      const sv=(x,y)=>({sx:MX+((x+52.5)/105)*PW, sy:MY+((34-y)/68)*PH});

      let lin='';
      Object.entries(pases).forEach(([k,n])=>{
        const [fr,to]=k.split('|');
        if(!posM[fr]||!posM[to]) return;
        const {sx:x1,sy:y1}=sv(posM[fr].x,posM[fr].y);
        const {sx:x2,sy:y2}=sv(posM[to].x,posM[to].y);
        const g=1+(n/maxP)*7, op=0.25+(n/maxP)*0.65;
        const cmx=(x1+x2)/2,cmy=(y1+y2)/2;
        // Flecha en el 60% de la línea, siempre visible
        const angle=Math.atan2(y2-y1,x2-x1);
        const ax=x1+0.60*(x2-x1), ay=y1+0.60*(y2-y1);
        const as=6+(n/maxP)*6;
        const a1=`${(ax+as*Math.cos(angle)).toFixed(1)},${(ay+as*Math.sin(angle)).toFixed(1)}`;
        const a2=`${(ax+as*0.5*Math.cos(angle+2.0)).toFixed(1)},${(ay+as*0.5*Math.sin(angle+2.0)).toFixed(1)}`;
        const a3=`${(ax+as*0.5*Math.cos(angle-2.0)).toFixed(1)},${(ay+as*0.5*Math.sin(angle-2.0)).toFixed(1)}`;
        lin+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#c8a96e" stroke-width="${g.toFixed(1)}" stroke-opacity="${op.toFixed(2)}" stroke-linecap="round"/>
        <polygon points="${a1} ${a2} ${a3}" fill="#e8c98e" fill-opacity="0.9"/>
        <text x="${cmx.toFixed(1)}" y="${(cmy-2).toFixed(1)}" text-anchor="middle" font-size="9" fill="#c8a96e" opacity="${Math.min(op+0.2,1).toFixed(2)}">${n}</text>`;
      });

      let nod='';
      tits.forEach(n=>{
        if(!posM[n]) return;
        const {sx,sy}=sv(posM[n].x,posM[n].y);
        const r=18+(totP[n]/maxT)*10;
        const pos=titMap[n]||'';
        const ap=n.split(' ').slice(-1)[0].substring(0,9);
        const esSup=suplSet.has(n);
        const strokeC=esSup?'#58a6ff':'#c8a96e';
        const fillC=esSup?'#0d1a2d':'#1c2333';
        const posC=esSup?'#79c0ff':'#e8c98e';
        const bcNorm=maxBC>0?(bcScores[n]||0)/maxBC:0;
        const glow=bcNorm>0.25?`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${(r+7).toFixed(1)}" fill="none" stroke="#f0883e" stroke-width="2.5" stroke-opacity="${(bcNorm*0.85).toFixed(2)}" stroke-dasharray="4,3"/>`:'' ;
        nod+=`<g>${glow}<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${r.toFixed(1)}" fill="${fillC}" stroke="${strokeC}" stroke-width="2.5"/>
          <text x="${sx.toFixed(1)}" y="${(sy-3).toFixed(1)}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" font-weight="700" fill="${posC}">${pos}</text>
          <text x="${sx.toFixed(1)}" y="${(sy+9).toFixed(1)}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="#8b949e">${ap}</text></g>`;
      });
      const leyHt=suplSet.size>0?72:50;
      const leyenda=`
        <rect x="${MX+4}" y="${MY+4}" width="155" height="${leyHt}" rx="4" fill="#0d1117" fill-opacity="0.85"/>
        <circle cx="${MX+16}" cy="${MY+16}" r="5" fill="#1c2333" stroke="#c8a96e" stroke-width="1.5"/>
        <text x="${MX+26}" y="${MY+20}" font-family="DM Sans,sans-serif" font-size="9" fill="#8b949e">Titular</text>
        ${suplSet.size>0?`<circle cx="${MX+16}" cy="${MY+32}" r="5" fill="#0d1a2d" stroke="#58a6ff" stroke-width="1.5"/>
        <text x="${MX+26}" y="${MY+36}" font-family="DM Sans,sans-serif" font-size="9" fill="#8b949e">Suplente</text>
        <circle cx="${MX+16}" cy="${MY+56}" r="6" fill="none" stroke="#f0883e" stroke-width="2" stroke-dasharray="3,2"/>
        <text x="${MX+26}" y="${MY+60}" font-family="DM Sans,sans-serif" font-size="9" fill="#8b949e">Alta centralidad</text>`
        :`<circle cx="${MX+16}" cy="${MY+32}" r="6" fill="none" stroke="#f0883e" stroke-width="2" stroke-dasharray="3,2"/>
        <text x="${MX+26}" y="${MY+36}" font-family="DM Sans,sans-serif" font-size="9" fill="#8b949e">Alta centralidad</text>`}`;

      const rival=partido.local==='Pontevedra CF'?partido.vis:partido.local;
      const lugar=partido.local==='Pontevedra CF'?'🏠':'✈️';
      const pctProg=totPasesAll>0?Math.round((totProgresivos/totPasesAll)*100):0;

      // Centralidad HTML
      const centHTML=tits.filter(n=>posM[n]).sort((a,b)=>(bcScores[b]||0)-(bcScores[a]||0)).slice(0,5).map((n,i)=>{
        const bcN=maxBC>0?(bcScores[n]||0)/maxBC:0;
        const ap=n.split(' ').slice(-1)[0].substring(0,11);
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:11px;color:var(--text3);width:16px;text-align:right;flex-shrink:0">${i+1}</span>
          <span style="font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ap}</span>
          <span style="font-size:9px;color:var(--accent);flex-shrink:0">${titMap[n]||''}</span>
          <div style="width:60px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;flex-shrink:0"><div style="width:${Math.round(bcN*100)}%;height:100%;background:#f0883e;border-radius:3px"></div></div>
        </div>`;
      }).join('');

      // Top conexiones HTML
      const topConnHTML=topConn.map(({fr,to,n,prog},i)=>{
        const apFr=fr.split(' ').slice(-1)[0].substring(0,10);
        const apTo=to.split(' ').slice(-1)[0].substring(0,10);
        const barW=Math.round((n/topConn[0].n)*100);
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:11px;color:var(--text3);width:16px;text-align:right;flex-shrink:0">${i+1}</span>
          <span style="font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${apFr} <span style="color:var(--text3)">→</span> ${apTo}${prog?'<span style="color:var(--green);margin-left:4px;font-size:10px">↑</span>':''}</span>
          <div style="width:60px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;flex-shrink:0"><div style="width:${barW}%;height:100%;background:var(--accent);border-radius:3px"></div></div>
          <span style="font-size:12px;font-weight:700;color:var(--accent);width:22px;text-align:right;flex-shrink:0">${n}</span>
        </div>`;
      }).join('');

      cont.innerHTML=`
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
          <div><div style="font-size:11px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px">${partido.j} · ${partido.f} · ${lugar} · ${periodo===1?'1ª Parte':'2ª Parte'}</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px">Pontevedra CF vs ${rival}</div></div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent)">${partido.s}</div>
          <div style="margin-left:auto;display:flex;gap:20px;align-items:center">
            <div style="text-align:center"><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent)">${totPasesAll}</div><div style="font-size:10px;color:var(--text3);letter-spacing:1px">PASES</div></div>
            <div style="text-align:center"><div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green)">${pctProg}%</div><div style="font-size:10px;color:var(--text3);letter-spacing:1px">PROGRESIVOS</div></div>
          </div>
        </div>
        ${suplHTML}
        <div style="display:grid;grid-template-columns:1fr 220px;gap:14px;margin-bottom:16px;align-items:start">
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
            <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
              <rect x="${MX}" y="${MY}" width="${PW}" height="${PH}" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1.5"/>
              <line x1="${W/2}" y1="${MY}" x2="${W/2}" y2="${H-MY}" stroke="#1e3a1e" stroke-width="1"/>
              <circle cx="${W/2}" cy="${H/2}" r="${(PH*9.15/68).toFixed(0)}" fill="none" stroke="#1e3a1e" stroke-width="1"/>
              <rect x="${MX}" y="${(MY+PH*(68-40.32)/2/68).toFixed(1)}" width="${(PW*16.5/105).toFixed(1)}" height="${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e"/>
              <rect x="${MX}" y="${(MY+PH*(68-18.32)/2/68).toFixed(1)}" width="${(PW*5.5/105).toFixed(1)}" height="${(PH*18.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e"/>
              <rect x="${(W-MX-PW*16.5/105).toFixed(1)}" y="${(MY+PH*(68-40.32)/2/68).toFixed(1)}" width="${(PW*16.5/105).toFixed(1)}" height="${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e"/>
              <rect x="${(W-MX-PW*5.5/105).toFixed(1)}" y="${(MY+PH*(68-18.32)/2/68).toFixed(1)}" width="${(PW*5.5/105).toFixed(1)}" height="${(PH*18.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e"/>
              <text x="${MX+8}" y="${H-MY+22}" font-size="10" fill="#2a4a2a">← Portería propia</text>
              <text x="${W-MX-8}" y="${H-MY+22}" text-anchor="end" font-size="10" fill="#2a4a2a">Portería rival →</text>
              ${lin}${nod}${leyenda}
            </svg>
          </div>
          <div style="display:flex;flex-direction:column;gap:14px">
            <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px">
              <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px">Top conexiones</div>
              ${topConnHTML}
              <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--text3)">
                <span style="color:var(--green)">↑</span> pase hacia portería rival
              </div>
            </div>
            <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px">
              <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px">Centralidad de red</div>
              ${centHTML}
              <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--text3)">
                <span style="color:#f0883e">●</span> halo naranja en el campo
              </div>
            </div>
          </div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px">
          <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px">${tits.length} jugadores · ${periodo===1?'1ª Parte':'2ª Parte'}</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">${tits.map(n=>{
            const pct=totP[n]>0?Math.round((progP[n]/totP[n])*100):0;
            const ap=n.split(' ').slice(-1)[0];
            return `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;display:flex;gap:6px;align-items:center">
              <span style="color:var(--accent);font-size:10px;font-weight:700">${titMap[n]}</span>
              <span>${ap}</span>
              <span style="color:var(--text3);font-size:11px">${totP[n]}</span>
              <span style="color:var(--green);font-size:10px;font-weight:600">↑${pct}%</span>
            </div>`;
          }).join('')}</div>
        </div>`;
    } catch(e) {
      cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--red)">${e.message}</div>`;
    }
  }

  async function renderMatriz() {
    const tid=currentTeam.id, mid=redMatchId;
    const cont=document.getElementById('redCont');
    if(!cont) return;
    cont.innerHTML=`<div class="loading"><div class="spinner"></div><span>Calculando matriz...</span></div>`;
    const partido=PARTIDOS.find(p=>p.id==mid);
    try {
      // Obtener posiciones reales desde get_lineup
      const lineup = await getLineup(mid, tid);
      const jugPos={};
      lineup.forEach(p => { jugPos[p.name] = p.position; });

      const {data}=await sbGet('eventos',`select=player_name,player_targeted_name&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&pass_outcome=eq.successful&limit=5000`);
      const jugsSet=new Set(), mat={};
      data.forEach(e=>{ if(!e.player_name||!e.player_targeted_name) return; jugsSet.add(e.player_name); jugsSet.add(e.player_targeted_name); const k=`${e.player_name}|${e.player_targeted_name}`; mat[k]=(mat[k]||0)+1; });
      const totD={},totR={};
      jugsSet.forEach(j=>{totD[j]=0;totR[j]=0;});
      Object.entries(mat).forEach(([k,n])=>{ const [f,t]=k.split('|'); totD[f]=(totD[f]||0)+n; totR[t]=(totR[t]||0)+n; });
      const jugs=[...jugsSet].sort((a,b)=>(totD[b]||0)-(totD[a]||0));
      const maxV=Math.max(1,...Object.values(mat));

      const thC=jugs.map(j=>`<th style="padding:6px 4px;font-size:9px;color:var(--text3);text-align:center;writing-mode:vertical-rl;transform:rotate(180deg);min-width:28px">${j.split(' ').slice(-1)[0].substring(0,7)}<tspan style='font-size:8px;color:var(--accent)'> (${jugPos[j]||''})</tspan></th>`).join('');
      const filas=jugs.map(fr=>{
        const pos=jugPos[fr]?`<span style='color:var(--accent);font-size:10px;font-weight:700;margin-right:4px'>${jugPos[fr]}</span>`:''; const ap=fr.split(' ').slice(-1)[0].substring(0,10);
        const cels=jugs.map(to=>{
          if(fr===to) return `<td style="background:var(--bg4);border:1px solid var(--border)"></td>`;
          const n=mat[`${fr}|${to}`]||0;
          if(!n) return `<td style="border:1px solid var(--border);text-align:center;font-size:10px;color:var(--text3)">—</td>`;
          const iv=n/maxV;
          const bg=`rgba(200,169,110,${(iv*0.6+0.08).toFixed(2)})`;
          const col=iv>0.4?'#0d1117':'#e8c98e';
          return `<td style="background:${bg};border:1px solid var(--border);text-align:center;font-size:11px;font-weight:600;color:${col}">${n}</td>`;
        }).join('');
        return `<tr><td style="padding:4px 10px;font-size:11px;border:1px solid var(--border);font-weight:500;white-space:nowrap">${pos}${ap}</td>${cels}<td style="padding:4px 8px;font-size:11px;color:var(--accent);font-weight:700;border:1px solid var(--border);text-align:center">${totD[fr]||0}</td></tr>`;
      }).join('');
      const recRow=jugs.map(j=>`<td style="padding:4px;font-size:11px;color:var(--blue);font-weight:700;border:1px solid var(--border);text-align:center">${totR[j]||0}</td>`).join('');
      const rival=partido.local==='Pontevedra CF'?partido.vis:partido.local;

      cont.innerHTML=`
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
          <div><div style="font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:3px">${partido.j} · ${partido.f} · Ambas partes</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px">Pontevedra CF vs ${rival}</div></div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent)">${partido.s}</div>
          <div style="margin-left:auto;font-size:12px;color:var(--text2)">${data.length} pases completados</div>
        </div>
        <div style="display:flex;gap:16px;font-size:11px;color:var(--text3);margin-bottom:12px">
          <span>Filas = <span style="color:var(--accent)">Pasador</span></span>
          <span>Columnas = <span style="color:var(--blue)">Receptor</span></span>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:auto">
          <table style="border-collapse:collapse;min-width:100%">
            <thead><tr><th style="padding:6px 10px;font-size:10px;color:var(--text3);border:1px solid var(--border);min-width:80px">↓ Pasa \\ Recibe →</th>${thC}<th style="padding:6px 8px;font-size:10px;color:var(--accent);border:1px solid var(--border);text-align:center">TOTAL</th></tr></thead>
            <tbody>${filas}<tr style="border-top:2px solid var(--border)"><td style="padding:4px 10px;font-size:10px;color:var(--blue);font-weight:700;border:1px solid var(--border)">RECIBIDOS</td>${recRow}<td style="border:1px solid var(--border)"></td></tr></tbody>
          </table>

    } catch(e) {

  }

  async function renderTendencia() {
    const tid=currentTeam.id, mid=redMatchId;
    const cont=document.getElementById('redCont');
    if(!cont) return;
    cont.innerHTML=`<div class="loading"><div class="spinner"></div><span>Calculando tendencias...</span></div>`;
    const partido=PARTIDOS.find(p=>p.id==mid);
    try {
      const {data}=await sbGet('eventos',`select=x_start,y_start&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&pass_outcome=eq.successful&x_start=not.is.null&limit=5000`);
      if(!data.length){cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3)">Sin datos de pases</div>`;return;}

      // zones[col][lane]: col 0-2 = Z1/Z2/Z3, lane 0-4 = C5→C1 (der→izq)
      const zones=Array.from({length:3},()=>Array(5).fill(0));
      data.forEach(e=>{
        const col=e.x_start<-17.5?0:e.x_start<17.5?1:2;
        const lane=e.y_start<-20.4?0:e.y_start<-6.8?1:e.y_start<6.8?2:e.y_start<20.4?3:4;
        zones[col][lane]++;
      });
      const total=data.length;
      const maxZone=Math.max(...zones.flat());

      const W=820,H=540,MX=50,MY=40,PW=W-MX*2,PH=H-MY*2;
      const sv=(x,y)=>({sx:MX+((x+52.5)/105)*PW,sy:MY+((34-y)/68)*PH});
      const xR=[[-52.5,-17.5],[-17.5,17.5],[17.5,52.5]];
      // 5 carriles top→bottom en SVG (y decrece hacia abajo)
      const yR=[[34,20.4],[20.4,6.8],[6.8,-6.8],[-6.8,-20.4],[-20.4,-34]];

      let zoneSVG='';
      for(let c=0;c<3;c++){
        for(let vr=0;vr<5;vr++){
          const count=zones[c][4-vr]; // vr 0=C1(top/izq), vr 4=C5(bottom/der)
          const {sx:sx1,sy:sy1}=sv(xR[c][0],yR[vr][0]);
          const {sx:sx2,sy:sy2}=sv(xR[c][1],yR[vr][1]);
          const zw=sx2-sx1,zh=sy2-sy1,cx=sx1+zw/2,cy=sy1+zh/2;
          const pct=((count/total)*100).toFixed(1);
          const op=count>0?Math.max(0.06,(count/maxZone)*0.78):0;
          const dark=op>0.35;
          zoneSVG+=`<rect x="${sx1.toFixed(1)}" y="${sy1.toFixed(1)}" width="${zw.toFixed(1)}" height="${zh.toFixed(1)}" fill="#c8a96e" fill-opacity="${op.toFixed(3)}" stroke="#1e3a1e" stroke-width="0.8"/>
          <text x="${cx.toFixed(1)}" y="${(cy-3).toFixed(1)}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="15" font-weight="700" fill="${dark?'#0d1117':'#e8c98e'}">${pct}%</text>
          <text x="${cx.toFixed(1)}" y="${(cy+12).toFixed(1)}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="${dark?'#1c2333':'#8b949e'}">${count} pases</text>`;
        }
      }

      // Etiquetas de eje
      const xMids=[MX+PW*0.167, MX+PW*0.5, MX+PW*0.833];
      const xLabels=['Z1','Z2','Z3'];
      const yMids=[MY+PH*0.1, MY+PH*0.3, MY+PH*0.5, MY+PH*0.7, MY+PH*0.9];
      const yLabels=['C1','C2','C3','C4','C5'];
      const axisLabels=xLabels.map((l,i)=>`<text x="${xMids[i].toFixed(1)}" y="${(MY-10).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="600" fill="#484f58">${l}</text>`).join('')
        +yLabels.map((l,i)=>`<text x="${(MX-10).toFixed(1)}" y="${yMids[i].toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="11" font-weight="600" fill="#484f58">${l}</text>`).join('');

      // Resumen por carril (C1=izq exterior … C5=der exterior)
      const corr=[
        {label:'C1 — Izq. exterior', n:zones[0][4]+zones[1][4]+zones[2][4]},
        {label:'C2 — Izq. interior', n:zones[0][3]+zones[1][3]+zones[2][3]},
        {label:'C3 — Central',       n:zones[0][2]+zones[1][2]+zones[2][2]},
        {label:'C4 — Der. interior', n:zones[0][1]+zones[1][1]+zones[2][1]},
        {label:'C5 — Der. exterior', n:zones[0][0]+zones[1][0]+zones[2][0]},
      ];
      const thirds=[
        {label:'Zona 1', n:zones[0].reduce((a,b)=>a+b,0)},
        {label:'Zona 2', n:zones[1].reduce((a,b)=>a+b,0)},
        {label:'Zona 3', n:zones[2].reduce((a,b)=>a+b,0)},
      ];
      const bar=(n,color)=>`<div style="flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden"><div style="width:${((n/total)*100).toFixed(1)}%;height:100%;background:${color};border-radius:4px"></div></div>`;
      const corrHTML=corr.map(({label,n})=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:12px;color:var(--text2);width:130px;flex-shrink:0">${label}</span>
        ${bar(n,'#c8a96e')}
        <span style="font-size:13px;font-weight:700;color:var(--accent);width:44px;text-align:right">${((n/total)*100).toFixed(1)}%</span>
      </div>`).join('');
      const thirdHTML=thirds.map(({label,n})=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:12px;color:var(--text2);width:130px;flex-shrink:0">${label}</span>
        ${bar(n,'#58a6ff')}
        <span style="font-size:13px;font-weight:700;color:var(--blue);width:44px;text-align:right">${((n/total)*100).toFixed(1)}%</span>
      </div>`).join('');

      const rival=partido.local==='Pontevedra CF'?partido.vis:partido.local;
      const lugar=partido.local==='Pontevedra CF'?'🏠':'✈️';

      cont.innerHTML=`
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
          <div><div style="font-size:11px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px">${partido.j} · ${partido.f} · ${lugar} · Tendencia de juego</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px">Pontevedra CF vs ${rival}</div></div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent)">${partido.s}</div>
          <div style="margin-left:auto;font-size:12px;color:var(--text2)">${total} pases exitosos</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px">
          <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
            <rect x="${MX}" y="${MY}" width="${PW}" height="${PH}" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1.5"/>
            ${zoneSVG}
            <line x1="${W/2}" y1="${MY}" x2="${W/2}" y2="${H-MY}" stroke="#1e3a1e" stroke-width="1" stroke-dasharray="4,4"/>
            <circle cx="${W/2}" cy="${H/2}" r="${(PH*9.15/68).toFixed(0)}" fill="none" stroke="#1e3a1e" stroke-width="1"/>
            <rect x="${MX}" y="${(MY+PH*(68-40.32)/2/68).toFixed(1)}" width="${(PW*16.5/105).toFixed(1)}" height="${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e" stroke-width="0.8"/>
            <rect x="${(W-MX-PW*16.5/105).toFixed(1)}" y="${(MY+PH*(68-40.32)/2/68).toFixed(1)}" width="${(PW*16.5/105).toFixed(1)}" height="${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e" stroke-width="0.8"/>
            ${axisLabels}
            <text x="${MX+8}" y="${H-MY+22}" font-size="10" fill="#2a4a2a">← Portería propia</text>
            <text x="${W-MX-8}" y="${H-MY+22}" text-anchor="end" font-size="10" fill="#2a4a2a">Portería rival →</text>
          </svg>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px">
            <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:14px">Por carril</div>
            ${corrHTML}
          </div>
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px">
            <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:14px">Por tercio de campo</div>
            ${thirdHTML}
          </div>
        </div>`;
    } catch(e){
      cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--red)">${e.message}</div>`;
    }
  }

  async function renderComparativa() {
    const tid=currentTeam.id, mid=redMatchId;
    const cont=document.getElementById('redCont');
    if(!cont) return;
    cont.innerHTML=`<div class="loading"><div class="spinner"></div><span>Calculando comparativa...</span></div>`;
    const partido=PARTIDOS.find(p=>p.id==mid);
    try {
      const lineup=await getLineup(mid,tid);
      if(!lineup.length){cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3)">Sin datos de alineación</div>`;return;}

      const [pp1r,pp2r,pd1r,pd2r]=await Promise.all([
        sbGet('eventos',`select=player_name,x_start,y_start&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&period=eq.1&x_start=not.is.null&limit=5000`),
        sbGet('eventos',`select=player_name,x_start,y_start&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&period=eq.2&x_start=not.is.null&limit=5000`),
        sbGet('eventos',`select=player_name,player_targeted_name,x_start,x_end&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&pass_outcome=eq.successful&period=eq.1&limit=5000`),
        sbGet('eventos',`select=player_name,player_targeted_name,x_start,x_end&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&pass_outcome=eq.successful&period=eq.2&limit=5000`),
      ]);

      function getPlayers(period){
        if(period===1) return lineup.filter(p=>timeToMin(p.start_time)<45);
        return lineup.filter(p=>{const e=timeToMin(p.start_time),s=p.end_time?timeToMin(p.end_time):999;return e<90&&s>45;});
      }

      function computeMetrics(players,ppData,pdData){
        const playerMap={};players.forEach(p=>{playerMap[p.name]=p.position;});
        const tits=Object.keys(playerMap);
        const GK=['GK','PT','PORTERO','POR','P','GOALKEEPER'];
        const posA={},posC={};
        ppData.forEach(e=>{
          if(!tits.includes(e.player_name)) return;
          if(!posA[e.player_name]){posA[e.player_name]={x:0,y:0};posC[e.player_name]=0;}
          posA[e.player_name].x+=e.x_start;posA[e.player_name].y+=e.y_start;posC[e.player_name]++;
        });
        const posM={};
        tits.forEach(n=>{posM[n]=posC[n]>0?{x:posA[n].x/posC[n],y:posA[n].y/posC[n]}:(GK.includes((playerMap[n]||'').toUpperCase().trim())?{x:-47,y:0}:null);});
        const pases={},progP={};tits.forEach(n=>{progP[n]=0;});
        pdData.forEach(e=>{
          if(!tits.includes(e.player_name)||!tits.includes(e.player_targeted_name)||e.player_name===e.player_targeted_name) return;
          const k=`${e.player_name}|${e.player_targeted_name}`;pases[k]=(pases[k]||0)+1;
          if(e.x_end!=null&&e.x_start!=null&&(e.x_end-e.x_start)>9) progP[e.player_name]=(progP[e.player_name]||0)+1;
        });
        const totP={};tits.forEach(n=>{totP[n]=0;});
        Object.entries(pases).forEach(([k,n])=>{const[f]=k.split('|');totP[f]=(totP[f]||0)+n;});
        const maxP=Math.max(1,...Object.values(pases));
        const maxT=Math.max(1,...Object.values(totP));
        const totPases=Object.values(pases).reduce((a,b)=>a+b,0);
        const totProg=Object.values(progP).reduce((a,b)=>a+b,0);
        const bcScores=calcBetweenness(tits,pases);
        const maxBC=Math.max(1,...Object.values(bcScores));
        const topCentral=tits.filter(n=>posM[n]).sort((a,b)=>(bcScores[b]||0)-(bcScores[a]||0))[0];
        const topConn=Object.entries(pases).sort((a,b)=>b[1]-a[1])[0];
        const validPos=tits.filter(n=>posM[n]);
        const avgX=validPos.length?validPos.reduce((s,n)=>s+(posM[n].x||0),0)/validPos.length:0;
        return {tits,playerMap,posM,pases,totP,progP,bcScores,maxBC,topCentral,topConn,totPases,totProg,avgX,maxP,maxT};
      }

      const m1=computeMetrics(getPlayers(1),pp1r.data,pd1r.data);
      const m2=computeMetrics(getPlayers(2),pp2r.data,pd2r.data);

      const MW=500,MH=330,MMX=38,MMY=28,MPW=MW-MMX*2,MPH=MH-MMY*2;
      const msv=(x,y)=>({sx:MMX+((x+52.5)/105)*MPW,sy:MMY+((34-y)/68)*MPH});

      function miniNet(m,label,color){
        let lin='';
        Object.entries(m.pases).forEach(([k,n])=>{
          const[fr,to]=k.split('|');if(!m.posM[fr]||!m.posM[to]) return;
          const{sx:x1,sy:y1}=msv(m.posM[fr].x,m.posM[fr].y);
          const{sx:x2,sy:y2}=msv(m.posM[to].x,m.posM[to].y);
          const g=0.8+(n/m.maxP)*5,op=0.1+(n/m.maxP)*0.7;
          const angle=Math.atan2(y2-y1,x2-x1);
          const ax=x1+0.65*(x2-x1),ay=y1+0.65*(y2-y1),as=3+(n/m.maxP)*4;
          const a1=`${(ax+as*Math.cos(angle)).toFixed(1)},${(ay+as*Math.sin(angle)).toFixed(1)}`;
          const a2=`${(ax+as*0.45*Math.cos(angle+2.2)).toFixed(1)},${(ay+as*0.45*Math.sin(angle+2.2)).toFixed(1)}`;
          const a3=`${(ax+as*0.45*Math.cos(angle-2.2)).toFixed(1)},${(ay+as*0.45*Math.sin(angle-2.2)).toFixed(1)}`;
          lin+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${color}" stroke-width="${g.toFixed(1)}" stroke-opacity="${op.toFixed(2)}" stroke-linecap="round"/>
            <polygon points="${a1} ${a2} ${a3}" fill="${color}" fill-opacity="${(op*0.9).toFixed(2)}"/>`;
        });
        let nod='';
        m.tits.forEach(n=>{
          if(!m.posM[n]) return;
          const{sx,sy}=msv(m.posM[n].x,m.posM[n].y);
          const r=13+(m.totP[n]/m.maxT)*8;
          const bcNorm=m.maxBC>0?(m.bcScores[n]||0)/m.maxBC:0;
          const glow=bcNorm>0.25?`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${(r+5).toFixed(1)}" fill="none" stroke="#f0883e" stroke-width="2" stroke-opacity="${(bcNorm*0.85).toFixed(2)}" stroke-dasharray="3,2"/>`:'' ;
          const pos=m.playerMap[n]||'';const ap=n.split(' ').slice(-1)[0].substring(0,8);
          nod+=`<g>${glow}<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${r.toFixed(1)}" fill="#1c2333" stroke="${color}" stroke-width="2"/>
            <text x="${sx.toFixed(1)}" y="${(sy-2).toFixed(1)}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" font-weight="700" fill="#e8c98e">${pos}</text>
            <text x="${sx.toFixed(1)}" y="${(sy+8).toFixed(1)}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#8b949e">${ap}</text></g>`;
        });
        const pctProg=m.totPases>0?Math.round((m.totProg/m.totPases)*100):0;
        return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px">
            <span style="font-size:13px;font-weight:700;color:${color}">${label}</span>
            <span style="font-size:12px;color:var(--text2)">${m.totPases} pases</span>
            <span style="font-size:12px;color:var(--green)">↑${pctProg}%</span>
            <span style="font-size:11px;color:var(--text3);margin-left:auto">${m.tits.length} jugadores</span>
          </div>
          <svg viewBox="0 0 ${MW} ${MH}" style="width:100%;display:block">
            <rect x="${MMX}" y="${MMY}" width="${MPW}" height="${MPH}" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1.5"/>
            <line x1="${MW/2}" y1="${MMY}" x2="${MW/2}" y2="${MH-MMY}" stroke="#1e3a1e" stroke-width="0.8"/>
            <circle cx="${MW/2}" cy="${MH/2}" r="${(MPH*9.15/68).toFixed(0)}" fill="none" stroke="#1e3a1e" stroke-width="0.8"/>
            <rect x="${MMX}" y="${(MMY+MPH*(68-40.32)/2/68).toFixed(1)}" width="${(MPW*16.5/105).toFixed(1)}" height="${(MPH*40.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e" stroke-width="0.6"/>
            <rect x="${(MW-MMX-MPW*16.5/105).toFixed(1)}" y="${(MMY+MPH*(68-40.32)/2/68).toFixed(1)}" width="${(MPW*16.5/105).toFixed(1)}" height="${(MPH*40.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e" stroke-width="0.6"/>
            <text x="${MMX+6}" y="${MH-MMY+18}" font-size="9" fill="#2a4a2a">← Def.</text>
            <text x="${MW-MMX-6}" y="${MH-MMY+18}" text-anchor="end" font-size="9" fill="#2a4a2a">Ata. →</text>
            ${lin}${nod}
          </svg>
        </div>`;
      }

      function zoneLabel(x){return x<-17.5?'Zona 1 — Defensiva':x<17.5?'Zona 2 — Medio':'Zona 3 — Ataque';}
      function shortConn(c){if(!c) return '—';const[fr,to]=c[0].split('|');return `${fr.split(' ').slice(-1)[0]} → ${to.split(' ').slice(-1)[0]} (×${c[1]})`;}
      function shortName(n){return n?n.split(' ').slice(-1)[0]:'—';}

      const cmpRows=[
        {label:'Pases completados',  v1:m1.totPases,  v2:m2.totPases,  num:true},
        {label:'Pases progresivos',  v1:m1.totProg,   v2:m2.totProg,   num:true},
        {label:'% Progresivos',      v1:m1.totPases?Math.round(m1.totProg/m1.totPases*100):0, v2:m2.totPases?Math.round(m2.totProg/m2.totPases*100):0, num:true, suf:'%'},
        {label:'Jugador más central',v1:shortName(m1.topCentral), v2:shortName(m2.topCentral), num:false},
        {label:'Top conexión',       v1:shortConn(m1.topConn),    v2:shortConn(m2.topConn),    num:false},
        {label:'Zona media',         v1:zoneLabel(m1.avgX),       v2:zoneLabel(m2.avgX),       num:false},
      ];

      const cmpHTML=cmpRows.map(({label,v1,v2,num,suf=''})=>{
        const w1=num&&v1>v2,w2=num&&v2>v1;
        const fmt=(v)=>num?`<span style="font-family:'Bebas Neue',sans-serif;font-size:20px">${v}${suf}</span>`:`<span style="font-size:12px">${v}</span>`;
        return `<tr style="border-bottom:1px solid rgba(255,255,255,0.04)">
          <td style="padding:10px 16px;text-align:right;color:${w1?'var(--accent)':'var(--text2)'}">${fmt(v1)}</td>
          <td style="padding:10px 16px;text-align:center;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);border-left:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap">${label}</td>
          <td style="padding:10px 16px;text-align:left;color:${w2?'var(--green)':'var(--text2)'}">${fmt(v2)}</td>
        </tr>`;
      }).join('');

      const rival=partido.local==='Pontevedra CF'?partido.vis:partido.local;
      const lugar=partido.local==='Pontevedra CF'?'🏠':'✈️';

      cont.innerHTML=`
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
          <div><div style="font-size:11px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px">${partido.j} · ${partido.f} · ${lugar} · 1ª vs 2ª Parte</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px">Pontevedra CF vs ${rival}</div></div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent)">${partido.s}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
          ${miniNet(m1,'⚽ 1ª Parte','#c8a96e')}
          ${miniNet(m2,'⚽ 2ª Parte','#58a6ff')}
        </div>
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="border-bottom:2px solid var(--border)">
              <th style="padding:10px 16px;text-align:right;font-size:12px;color:var(--accent);font-weight:700;width:35%">1ª Parte</th>
              <th style="padding:10px 16px;text-align:center;font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;border-left:1px solid var(--border);border-right:1px solid var(--border)">MÉTRICA</th>
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--blue);font-weight:700;width:35%">2ª Parte</th>
            </tr></thead>
            <tbody>${cmpHTML}</tbody>
          </table>
        </div>`;
    } catch(e){
      cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--red)">${e.message}</div>`;
    }
  }

  async function renderJugadores() {
    const tid=currentTeam.id, mid=redMatchId;
    const cont=document.getElementById('redCont');
    if(!cont) return;
    if(!mid){
      cont.innerHTML=`<div style="text-align:center;padding:60px;color:var(--text3);font-size:13px">Selecciona un partido</div>`;
      return;
    }
    cont.innerHTML=`<div class="loading"><div class="spinner"></div><span>Calculando red por jugador...</span></div>`;
    const partido=PARTIDOS.find(p=>p.id==mid);
    try {
      const lineup=await getLineup(mid,tid);
      if(!lineup.length){
        cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3)">Sin datos de alineación</div>`;
        return;
      }
      const playerMap={};
      lineup.forEach(p=>{ playerMap[p.name]=p.position; });
      const allPlayers=Object.keys(playerMap);
      const allPlayersSet=new Set(allPlayers);

      // Posiciones medias desde posesiones
      const {data:posData}=await sbGet('eventos',`select=player_name,x_start,y_start&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&x_start=not.is.null&limit=5000`);
      const posA={},posC={};
      posData.forEach(e=>{
        if(!allPlayersSet.has(e.player_name)) return;
        if(!posA[e.player_name]){posA[e.player_name]={x:0,y:0};posC[e.player_name]=0;}
        posA[e.player_name].x+=e.x_start; posA[e.player_name].y+=e.y_start; posC[e.player_name]++;
      });
      const posM={};
      const GK_POS=['GK','PT','PORTERO','POR','P','GOALKEEPER'];
      allPlayers.forEach(n=>{
        if(posC[n]>0){ posM[n]={x:posA[n].x/posC[n],y:posA[n].y/posC[n]}; }
        else { const pos=(playerMap[n]||'').toUpperCase().trim(); posM[n]=GK_POS.includes(pos)?{x:-47,y:0}:null; }
      });

      // Pases por jugador
      const {data:passData}=await sbGet('eventos',`select=player_name,player_targeted_name&team_id=eq.${tid}&match_id=eq.${mid}&event_type=eq.player_possession&pass_outcome=eq.successful&limit=5000`);
      const playerPasses={},playerTotal={};
      passData.forEach(e=>{
        if(!allPlayersSet.has(e.player_name)||!allPlayersSet.has(e.player_targeted_name)||e.player_name===e.player_targeted_name) return;
        if(!playerPasses[e.player_name]) playerPasses[e.player_name]={};
        playerPasses[e.player_name][e.player_targeted_name]=(playerPasses[e.player_name][e.player_targeted_name]||0)+1;
        playerTotal[e.player_name]=(playerTotal[e.player_name]||0)+1;
      });

      // Clasificación por línea (derecha → izquierda dentro de cada línea)
      function getPosTier(pos){
        const p=(pos||'').toUpperCase().trim();
        if(['GK','PT','POR','PORTERO','P','GOALKEEPER'].includes(p)) return {tier:0,order:0};
        if(['RB','RWB'].includes(p)) return {tier:1,order:1};
        if(['CB','DC','DF','DEF','CD','BC','CT'].includes(p)) return {tier:1,order:2};
        if(['LB','LWB'].includes(p)) return {tier:1,order:3};
        if(['RM'].includes(p)) return {tier:2,order:1};
        if(['CDM','DM','SD','CM','MC','MID','CAM','AM','MF','M','MO'].includes(p)) return {tier:2,order:2};
        if(['LM'].includes(p)) return {tier:2,order:3};
        if(['RW'].includes(p)) return {tier:3,order:1};
        if(['CF','ST','FW','ATT','DEL','SS'].includes(p)) return {tier:3,order:2};
        if(['LW'].includes(p)) return {tier:3,order:3};
        return {tier:2,order:2};
      }

      const sorted=allPlayers.map(n=>({
        name:n, pos:playerMap[n]||'',
        ...getPosTier(playerMap[n]),
        total:playerTotal[n]||0,
      })).sort((a,b)=>a.tier!==b.tier?a.tier-b.tier:a.order-b.order);

      // Mini campo SVG
      const W=220,H=143,MX=18,MY=12,PW=W-MX*2,PH=H-MY*2;
      const sv=(x,y)=>({sx:MX+((x+52.5)/105)*PW,sy:MY+((34-y)/68)*PH});

      function miniField(playerName){
        const p=posM[playerName];
        if(!p) return null;
        const {sx:px,sy:py}=sv(p.x,p.y);
        const passes=playerPasses[playerName]||{};
        const maxP=Math.max(1,...Object.values(passes));
        let lines='',tdots='';
        Object.entries(passes).forEach(([target,count])=>{
          const tp=posM[target];
          if(!tp) return;
          const {sx:tx,sy:ty}=sv(tp.x,tp.y);
          const op=0.15+(count/maxP)*0.65;
          const sw=0.8+(count/maxP)*3.2;
          lines+=`<line x1="${px.toFixed(1)}" y1="${py.toFixed(1)}" x2="${tx.toFixed(1)}" y2="${ty.toFixed(1)}" stroke="#c8a96e" stroke-width="${sw.toFixed(1)}" stroke-opacity="${op.toFixed(2)}" stroke-linecap="round"/>`;
          tdots+=`<circle cx="${tx.toFixed(1)}" cy="${ty.toFixed(1)}" r="3.5" fill="#21262d" stroke="#484f58" stroke-width="1"/>`;
        });
        return `<rect x="${MX}" y="${MY}" width="${PW}" height="${PH}" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1"/>
          <line x1="${(W/2).toFixed(1)}" y1="${MY}" x2="${(W/2).toFixed(1)}" y2="${H-MY}" stroke="#1e3a1e" stroke-width="0.7"/>
          <circle cx="${(W/2).toFixed(1)}" cy="${(H/2).toFixed(1)}" r="${(PH*9.15/68).toFixed(0)}" fill="none" stroke="#1e3a1e" stroke-width="0.7"/>
          <rect x="${MX}" y="${(MY+PH*(68-40.32)/2/68).toFixed(1)}" width="${(PW*16.5/105).toFixed(1)}" height="${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e" stroke-width="0.5"/>
          <rect x="${(W-MX-PW*16.5/105).toFixed(1)}" y="${(MY+PH*(68-40.32)/2/68).toFixed(1)}" width="${(PW*16.5/105).toFixed(1)}" height="${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e" stroke-width="0.5"/>
          ${lines}${tdots}
          <circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="6" fill="#1c2333" stroke="#c8a96e" stroke-width="2"/>`;
      }

      const rival=partido.local==='Pontevedra CF'?partido.vis:partido.local;
      const lugar=partido.local==='Pontevedra CF'?'🏠':'✈️';

      let html=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:20px">
        <div><div style="font-size:11px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px">${partido.j} · ${partido.f} · ${lugar} · Red por jugador</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:20px">Pontevedra CF vs ${rival}</div></div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent)">${partido.s}</div>
        <div style="margin-left:auto;font-size:12px;color:var(--text2)">${allPlayers.length} jugadores</div>
      </div>`;

      const tierLabels=['Portero','Defensas','Centrocampistas','Delanteros'];
      for(let tierId=0;tierId<=3;tierId++){
        const tierPlayers=sorted.filter(p=>p.tier===tierId&&posM[p.name]);
        if(!tierPlayers.length) continue;
        html+=`<div style="margin-bottom:28px">
          <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-weight:600;padding-bottom:6px;border-bottom:1px solid var(--border)">${tierLabels[tierId]}</div>
          <div style="display:flex;flex-wrap:wrap;gap:14px">`;
        tierPlayers.forEach(({name,pos,total})=>{
          const fieldContent=miniField(name);
          if(!fieldContent) return;
          const ap=name.split(' ').slice(-1)[0].substring(0,14);
          const dispName=name.length>18?ap:name;
          html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;width:220px;flex-shrink:0">
            <div style="padding:8px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px">
              <span style="color:var(--accent);font-size:9px;font-weight:700;background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.2);padding:2px 5px;border-radius:4px;flex-shrink:0">${pos}</span>
              <span style="font-size:11px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${dispName}</span>
            </div>
            <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">${fieldContent}</svg>
            <div style="padding:6px 10px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)">
              <span style="color:var(--accent);font-weight:700">${total}</span> pases completados
            </div>
          </div>`;
        });
        html+=`</div></div>`;
      }

      cont.innerHTML=html;
    } catch(e){
      cont.innerHTML=`<div style="text-align:center;padding:40px;color:var(--red)">${e.message}</div>`;
    }
  }

  // INIT
  loadRedPases();
</script>
</body>
</html>
