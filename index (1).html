<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <title>SkillCorner · Análisis</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0d1117;
      --bg2:      #161b22;
      --bg3:      #21262d;
      --bg4:      #2d333b;
      --border:   rgba(255,255,255,0.08);
      --accent:   #c8a96e;
      --accent2:  #e8c98e;
      --text:     #e6edf3;
      --text2:    #8b949e;
      --text3:    #484f58;
      --green:    #3fb950;
      --red:      #f85149;
      --blue:     #58a6ff;
      --orange:   #f0883e;
      --sidebar:  220px;
      --header:   52px;
      --tabs:     48px;
      --radius:   10px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-rows: var(--header) 1fr;
      grid-template-columns: var(--sidebar) 1fr;
      grid-template-areas:
        "header header"
        "sidebar main";
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      grid-area: header;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 50;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--text);
    }

    .header-sub {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-left: 4px;
      margin-top: 2px;
    }

    .header-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(200,169,110,0.08);
      border: 1px solid rgba(200,169,110,0.15);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    /* ── SIDEBAR ── */
    aside {
      grid-area: sidebar;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-track { background: transparent; }
    aside::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

    .sidebar-section-label {
      padding: 16px 16px 6px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 600;
    }

    .team-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 8px;
      margin: 2px 8px;
      transition: all 0.15s;
      position: relative;
    }

    .team-item:hover {
      background: var(--bg3);
    }

    .team-item.active {
      background: rgba(200,169,110,0.1);
      border: 1px solid rgba(200,169,110,0.2);
    }

    .team-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
      margin-left: -8px;
    }

    .team-escudo {
      width: 30px;
      height: 30px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .team-info {
      flex: 1;
      min-width: 0;
    }

    .team-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-item.active .team-name { color: var(--accent); }

    .team-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 1px;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 16px;
    }

    /* ── MAIN ── */
    main {
      grid-area: main;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── TABS ── */
    .tabs-bar {
      height: var(--tabs);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 4px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .tabs-bar::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      border: 1px solid transparent;
    }

    .tab:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .tab.active {
      background: rgba(200,169,110,0.1);
      border-color: rgba(200,169,110,0.2);
      color: var(--accent);
    }

    .tab .tab-icon { font-size: 14px; }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

    /* ── WELCOME ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      text-align: center;
      animation: fadeUp 0.4s ease;
    }

    .welcome-escudo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 8px 24px rgba(200,169,110,0.2));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text2);
      max-width: 360px;
      line-height: 1.6;
    }

    .welcome-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text2);
      margin-top: 8px;
    }

    /* ── CONTENT HEADER ── */
    .content-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .content-head-escudo {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .content-head h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
    }

    .content-head p {
      font-size: 12px;
      color: var(--text2);
      margin-top: 1px;
    }

    /* ── CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      transition: all 0.2s;
    }

    .card:hover {
      border-color: rgba(200,169,110,0.25);
      transform: translateY(-1px);
    }

    .card-label {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      letter-spacing: 1px;
      color: var(--accent);
      line-height: 1;
    }

    .card-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
    }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      padding: 10px 16px;
      text-align: left;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      background: var(--bg2);
    }

    td {
      padding: 11px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      color: var(--text2);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg3); color: var(--text); }
    td:first-child { color: var(--text); font-weight: 500; }

    /* ── PARTIDOS ── */
    .partidos {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .partido {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.15s;
    }

    .partido:hover {
      border-color: rgba(200,169,110,0.2);
      background: var(--bg3);
    }

    .partido-j {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--accent);
      width: 40px;
      text-align: center;
      flex-shrink: 0;
    }

    .partido-teams {
      flex: 1;
    }

    .partido-teams strong {
      font-size: 13px;
      font-weight: 600;
      display: block;
    }

    .partido-teams span {
      font-size: 11px;
      color: var(--text3);
    }

    .partido-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
    }

    .win  { color: var(--green); }
    .draw { color: var(--accent); }
    .loss { color: var(--red); }

    /* ── BAR ── */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bar-bg {
      flex: 1;
      height: 5px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .bar-pct {
      font-size: 12px;
      color: var(--text2);
      min-width: 38px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ── PILL ── */
    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
    }
    .pill-blue   { background:rgba(88,166,255,0.12); color:var(--blue); }
    .pill-green  { background:rgba(63,185,80,0.12);  color:var(--green); }
    .pill-accent { background:rgba(200,169,110,0.12);color:var(--accent); }
    .pill-red    { background:rgba(248,81,73,0.12);  color:var(--red); }

    /* ── LOADING ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 80px;
      color: var(--text3);
      font-size: 13px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--bg4);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .anim { animation: fadeUp 0.3s ease; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <img class="header-logo"
       src="https://upload.wikimedia.org/wikipedia/en/thumb/6/6d/Pontevedra_CF_logo.png/150px-Pontevedra_CF_logo.png"
       alt="">
  <div>
    <div class="header-title">Tactical</div>
  </div>
  <div class="header-sub">Primera Federación · 2025-26</div>
  <div class="header-badge">⚽ 106.908 eventos</div>
</header>

<!-- SIDEBAR -->
<aside>
  <div class="sidebar-section-label">Equipos</div>

  <div class="team-item active" id="team-2908" onclick="selectTeam(2908, 'Pontevedra CF', 'https://upload.wikimedia.org/wikipedia/en/thumb/6/6d/Pontevedra_CF_logo.png/150px-Pontevedra_CF_logo.png')">
    <img class="team-escudo" src="https://upload.wikimedia.org/wikipedia/en/thumb/6/6d/Pontevedra_CF_logo.png/150px-Pontevedra_CF_logo.png" alt="">
    <div class="team-info">
      <div class="team-name">Pontevedra CF</div>
      <div class="team-sub">27 partidos</div>
    </div>
  </div>

  <div class="sidebar-divider"></div>
  <div class="sidebar-section-label">Próximamente</div>

  <div class="team-item" style="opacity:0.4;pointer-events:none">
    <div style="width:30px;height:30px;background:var(--bg4);border-radius:50%;flex-shrink:0"></div>
    <div class="team-info">
      <div class="team-name">Real Madrid B</div>
      <div class="team-sub">Sin datos</div>
    </div>
  </div>

  <div class="team-item" style="opacity:0.4;pointer-events:none">
    <div style="width:30px;height:30px;background:var(--bg4);border-radius:50%;flex-shrink:0"></div>
    <div class="team-info">
      <div class="team-name">SD Ponferradina</div>
      <div class="team-sub">Sin datos</div>
    </div>
  </div>

  <div class="team-item" style="opacity:0.4;pointer-events:none">
    <div style="width:30px;height:30px;background:var(--bg4);border-radius:50%;flex-shrink:0"></div>
    <div class="team-info">
      <div class="team-name">Barakaldo CF</div>
      <div class="team-sub">Sin datos</div>
    </div>
  </div>

</aside>

<!-- MAIN -->
<main>

  <!-- TABS -->
  <div class="tabs-bar" id="tabsBar">
    <div class="tab active" data-tab="resumen" onclick="selectTab('resumen', this)">
      <span class="tab-icon">📊</span> Resumen
    </div>
    <div class="tab" data-tab="partidos" onclick="selectTab('partidos', this)">
      <span class="tab-icon">🗓️</span> Partidos
    </div>
    <div class="tab" data-tab="pressing" onclick="selectTab('pressing', this)">
      <span class="tab-icon">⚡</span> Pressing
    </div>
    <div class="tab" data-tab="carreras" onclick="selectTab('carreras', this)">
      <span class="tab-icon">🏃</span> Carreras
    </div>
    <div class="tab" data-tab="pases" onclick="selectTab('pases', this)">
      <span class="tab-icon">🎯</span> Pases
    </div>
    <div class="tab" data-tab="fases" onclick="selectTab('fases', this)">
      <span class="tab-icon">🔄</span> Fases
    </div>
    <div class="tab" data-tab="jugadores" onclick="selectTab('jugadores', this)">
      <span class="tab-icon">👤</span> Jugadores
    </div>
    <div class="tab" data-tab="redpases" onclick="selectTab('redpases', this)">
      <span class="tab-icon">🕸️</span> Red de Pases
    </div>
    <div style="margin-left:auto;padding-right:4px">
      <button id="refreshBtn" onclick="refreshCurrentTab()" title="Actualizar"
        style="background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s"
        onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">↺</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><span>Cargando...</span></div>
  </div>

</main>

<script>
  const URL  = 'https://grvcjuwzdewebxablwyb.supabase.co';
  const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdydmNqdXd6ZGV3ZWJ4YWJsd3liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTM0NzgsImV4cCI6MjA5NTAyOTQ3OH0.KPbDShmdsjH0VaJ9kggF34FZ-IiAKZ61qcPxNi6w6Rk';

  let currentTeam = { id: 2908, name: 'Pontevedra CF', escudo: 'https://upload.wikimedia.org/wikipedia/en/thumb/6/6d/Pontevedra_CF_logo.png/150px-Pontevedra_CF_logo.png' };
  let currentTab  = 'resumen';

  async function get(table, params) {
    const r = await fetch(`${URL}/rest/v1/${table}?${params}`, {
      headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Prefer': 'count=exact' }
    });
    const count = r.headers.get('content-range')?.split('/')[1];
    return { data: await r.json(), count: parseInt(count) || 0 };
  }

  function setLoading() {
    document.getElementById('content').innerHTML =
      `<div class="loading"><div class="spinner"></div><span>Cargando datos...</span></div>`;
  }

  function headHTML() {
    return `
      <div class="content-head">
        <img class="content-head-escudo" src="${currentTeam.escudo}" alt="">
        <div>
          <h2>${currentTeam.name}</h2>
          <p>Primera Federación · Temporada 2025-26</p>
        </div>
      </div>`;
  }

  // ── EQUIPO ──
  function selectTeam(id, name, escudo) {
    document.querySelectorAll('.team-item').forEach(i => i.classList.remove('active'));
    document.getElementById(`team-${id}`)?.classList.add('active');
    currentTeam = { id, name, escudo };
    loadTab(currentTab);
  }

  // ── TAB ──
  function selectTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentTab = tab;
    loadTab(tab);
  }

  function loadTab(tab) {
    switch(tab) {
      case 'resumen':   loadResumen();   break;
      case 'partidos':  loadPartidos();  break;
      case 'pressing':  loadPressing();  break;
      case 'carreras':  loadCarreras();  break;
      case 'pases':     loadPases();     break;
      case 'fases':     loadFases();     break;
      case 'jugadores': loadJugadores(); break;
      case 'redpases':  loadRedPases();  break;
    }
  }

  // ── RESUMEN ──
  async function loadResumen() {
    setLoading();
    const tid = currentTeam.id;
    const [pp, obr, obe, po] = await Promise.all([
      get('eventos', `select=event_id&team_id=eq.${tid}&event_type=eq.player_possession`),
      get('eventos', `select=event_id&team_id=eq.${tid}&event_type=eq.off_ball_run`),
      get('eventos', `select=event_id&team_id=eq.${tid}&event_type=eq.defensive_engagement`),
      get('eventos', `select=event_id&team_id=eq.${tid}&event_type=eq.passing_option`)
    ]);

    document.getElementById('content').innerHTML = `
      <div class="anim">
        ${headHTML()}
        <div class="cards">
          <div class="card">
            <div class="card-label">Posesiones de jugador</div>
            <div class="card-value">${pp.count.toLocaleString()}</div>
            <div class="card-sub">Player Possessions</div>
          </div>
          <div class="card">
            <div class="card-label">Carreras sin balón</div>
            <div class="card-value">${obr.count.toLocaleString()}</div>
            <div class="card-sub">Off-Ball Runs</div>
          </div>
          <div class="card">
            <div class="card-label">Opciones de pase</div>
            <div class="card-value">${po.count.toLocaleString()}</div>
            <div class="card-sub">Passing Options</div>
          </div>
          <div class="card">
            <div class="card-label">Acciones defensivas</div>
            <div class="card-value">${obe.count.toLocaleString()}</div>
            <div class="card-sub">On-Ball Engagements</div>
          </div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;color:var(--text2);font-size:13px;line-height:1.8">
          <strong style="color:var(--accent)">Datos SkillCorner · Dynamic Events</strong><br>
          Tracking v3 · 310 variables por evento · 27 partidos analizados
        </div>
      </div>`;
  }

  // ── PARTIDOS ──
  async function loadPartidos() {
    setLoading();
    const tid = currentTeam.id;
    const { data } = await get('eventos',
      `select=match_id,team_id,team_shortname,team_score,opponent_team_score&event_type=eq.player_possession&order=match_id&limit=5000`
    );

    const matches = {};
    data.forEach(e => {
      if (!matches[e.match_id]) matches[e.match_id] = {};
      if (e.team_id === tid) {
        matches[e.match_id].myScore  = e.team_score;
        matches[e.match_id].oppScore = e.opponent_team_score;
      } else {
        matches[e.match_id].rival = e.team_shortname;
      }
    });

    const rows = Object.entries(matches).sort((a,b)=>a[0]-b[0]).map(([mid, m], i) => {

      // 2a. Posición media — usar TODAS las PP del jugador en el partido

        pases[key] = (pases[key] || 0) + 1;
      });

      // Posición media por jugador
      const posMedia = {};
      titulares.forEach(p => {
        if (posiciones[p] && contadorPos[p] > 0) {
          posMedia[p] = { x: posiciones[p].x / contadorPos[p], y: posiciones[p].y / contadorPos[p] };
        } else {
          posMedia[p] = { x: 0, y: 0 };
        }
      });

      // 4. Calcular total de pases por jugador
      const totalPases = {};
      titulares.forEach(p => { totalPases[p] = 0; });
      Object.entries(pases).forEach(([key, n]) => {
        const [from] = key.split('→');

      });

      const W = 800, H = 520, MX = 50, MY = 40;

      function toSVG(x, y) {
        // x: -52.5 a 52.5 → MX a W-MX (izq=defensa, der=ataque)
        // y: en SkillCorner positivo=banda izquierda (arriba SVG), negativo=banda derecha (abajo SVG)
        // Por tanto y positivo → sy pequeño (arriba), y negativo → sy grande (abajo)
        const sx = MX + ((x + 52.5) / 105) * PW;
        const sy = MY + ((34 - y) / 68) * PH;
        return { sx, sy };
      }

      Object.entries(pases).forEach(([key, n]) => {

        const { sx: x2, sy: y2 } = toSVG(posMedia[to].x, posMedia[to].y);
        const grosor = 1 + (n / maxPases) * 7;

        lineas += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"
          stroke="#c8a96e" stroke-width="${grosor.toFixed(1)}" stroke-opacity="${opacidad.toFixed(2)}" stroke-linecap="round"/>`;
      });

      // Nodos de jugadores
      let nodos = '';
      titulares.forEach(nombre => {
        if (!posMedia[nombre]) return;

              fill="#1c2333" stroke="#c8a96e" stroke-width="2" opacity="0.95"/>
            <text x="${sx.toFixed(1)}" y="${(sy-2).toFixed(1)}" text-anchor="middle"

            <text x="${sx.toFixed(1)}" y="${(sy+8).toFixed(1)}" text-anchor="middle"
              font-family="'DM Sans',sans-serif" font-size="8" fill="#8b949e">${apellido.substring(0,8)}</text>
          </g>`;

            <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px">Pontevedra CF vs ${rival}</div>

        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          <svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;display:block">

            <!-- Línea central -->
            <line x1="${W/2}" y1="${MY}" x2="${W/2}" y2="${H-MY}" stroke="#2a4a2a" stroke-width="1"/>
            <circle cx="${W/2}" cy="${H/2}" r="${(PH*9.15/68).toFixed(0)}" fill="none" stroke="#2a4a2a" stroke-width="1"/>

            <!-- Área izquierda -->
            <rect x="${MX}" y="${(MY + PH*(68-40.32)/2/68).toFixed(1)}" width="${(PW*16.5/105).toFixed(1)}" height="${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#2a4a2a" stroke-width="1"/>
            <rect x="${MX}" y="${(MY + PH*(68-18.32)/2/68).toFixed(1)}" width="${(PW*5.5/105).toFixed(1)}" height="${(PH*18.32/68).toFixed(1)}" fill="none" stroke="#2a4a2a" stroke-width="1"/>

            <!-- Área derecha -->
            <rect x="${(W-MX-PW*16.5/105).toFixed(1)}" y="${(MY + PH*(68-40.32)/2/68).toFixed(1)}" width="${(PW*16.5/105).toFixed(1)}" height="${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#2a4a2a" stroke-width="1"/>
            <rect x="${(W-MX-PW*5.5/105).toFixed(1)}" y="${(MY + PH*(68-18.32)/2/68).toFixed(1)}" width="${(PW*5.5/105).toFixed(1)}" height="${(PH*18.32/68).toFixed(1)}" fill="none" stroke="#2a4a2a" stroke-width="1"/>

            <!-- Líneas de pases -->
            ${lineas}

            <!-- Nodos de jugadores -->
            ${nodos}
          </svg>
        </div>

        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px">
          <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px">Titulares</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${titulares.map(n => `
              <div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;display:flex;gap:6px;align-items:center">
                <span style="color:var(--accent);font-size:10px;font-weight:600">${titularesMap[n]}</span>
                <span style="color:var(--text)">${n}</span>
                <span style="color:var(--text3);font-size:11px">${totalPases[n]} pases</span>
              </div>`).join('')}
          </div>
        </div>`;

    } catch(e) {
      container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--red)">${e.message}</div>`;
    }

  // ── REFRESH ──
  function refreshCurrentTab() {
    const btn = document.getElementById('refreshBtn');
    btn.style.transform = 'rotate(360deg)';
    btn.style.transition = 'transform 0.5s ease';
    setTimeout(() => { btn.style.transform = ''; btn.style.transition = ''; }, 500);
    loadTab(currentTab);
  }

  // ── RED DE PASES ──
  let redPasesMatchId = null;
  let redPasesSubTab  = '1parte';

  async function loadRedPases() {
    const tid = currentTeam.id;
    const opciones = PARTIDOS.map(p => {
      const rival = p.local === 'Pontevedra CF' ? p.visitante : p.local;
      const signo = p.local === 'Pontevedra CF' ? '🏠' : '✈️';
      return `<option value="${p.match_id}" ${p.match_id == redPasesMatchId ? 'selected' : ''}>${signo} ${p.jornada} · ${rival} · ${p.score} · ${p.fecha}</option>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      <div class="anim">
        ${headHTML()}

        <!-- Selector partido -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
          <select id="matchSelector" onchange="redPasesMatchId=this.value; renderRedPasesTab()"
            style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;flex:1;min-width:280px">
            <option value="">— Selecciona un partido —</option>
            ${opciones}
          </select>
        </div>

        <!-- Sub-tabs -->
        <div style="display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;width:fit-content">
          <button id="subtab-1parte"  onclick="setRedSubTab('1parte')"  class="subtab active-subtab">⚽ 1ª Parte</button>
          <button id="subtab-2parte"  onclick="setRedSubTab('2parte')"  class="subtab">⚽ 2ª Parte</button>
          <button id="subtab-matriz"  onclick="setRedSubTab('matriz')"  class="subtab">📊 Matriz de Pases</button>
        </div>

        <!-- Contenido red -->
        <div id="redPasesContainer">
          <div style="text-align:center;padding:60px;color:var(--text3);font-size:13px">
            Selecciona un partido para ver el análisis
          </div>
        </div>
      </div>`;

    // Añadir estilos sub-tabs
    if (!document.getElementById('subtabStyles')) {
      const st = document.createElement('style');
      st.id = 'subtabStyles';
      st.textContent = \`
        .subtab { background:transparent; border:none; color:var(--text2); padding:7px 16px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
        .subtab:hover { color:var(--text); background:var(--bg3); }
        .active-subtab { background:rgba(200,169,110,0.1) !important; color:var(--accent) !important; }
      \`;
      document.head.appendChild(st);
    }

    if (redPasesMatchId) renderRedPasesTab();
  }

  function setRedSubTab(tab) {
    redPasesSubTab = tab;
    document.querySelectorAll('.subtab').forEach(b => b.classList.remove('active-subtab'));
    document.getElementById('subtab-' + tab)?.classList.add('active-subtab');
    if (redPasesMatchId) renderRedPasesTab();
  }

  async function renderRedPasesTab() {
    if (!redPasesMatchId) return;
    if (redPasesSubTab === '1parte') await renderRed(redPasesMatchId, 1);
    else if (redPasesSubTab === '2parte') await renderRed(redPasesMatchId, 2);
    else await renderMatriz(redPasesMatchId);
  }

  // ── DIBUJAR RED DE PASES (periodo 1 o 2) ──
  async function renderRed(matchId, periodo) {
    const tid = currentTeam.id;
    const container = document.getElementById('redPasesContainer');
    container.innerHTML = `<div class="loading"><div class="spinner"></div><span>Calculando red de pases...</span></div>`;
    const partido = PARTIDOS.find(p => p.match_id == matchId);

    try {
      // 1. Titulares del periodo:
      //    - Periodo 1: jugadores con PP en period=1 y minute_start <= 2
      //    - Periodo 2: los 11 jugadores con PP más temprana en period=2 (minute_start <= 47)
      const minutoCorte = periodo === 1 ? 2 : 47;
      const { data: titData } = await get('eventos',
        `select=player_name,player_position&team_id=eq.${tid}&match_id=eq.${matchId}&event_type=eq.player_possession&period=eq.${periodo}&minute_start=lte.${minutoCorte}`
      );
      const titularesMap = {};
      titData.forEach(e => { titularesMap[e.player_name] = e.player_position; });

      // Limitar a 11 jugadores (los que más posesiones tienen si hay más de 11)
      if (Object.keys(titularesMap).length > 11) {
        const { data: contData } = await get('eventos',
          `select=player_name&team_id=eq.${tid}&match_id=eq.${matchId}&event_type=eq.player_possession&period=eq.${periodo}&limit=5000`
        );
        const conteo = {};
        contData.forEach(e => { if (titularesMap[e.player_name]) conteo[e.player_name] = (conteo[e.player_name]||0)+1; });
        const top11 = Object.entries(conteo).sort((a,b)=>b[1]-a[1]).slice(0,11).map(([n])=>n);
        Object.keys(titularesMap).forEach(n => { if (!top11.includes(n)) delete titularesMap[n]; });
      }

      const titulares = Object.keys(titularesMap);

      if (titulares.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3)">Sin datos para este periodo</div>`;
        return;
      }

      // 2. Posición media con TODAS las PP del periodo
      const { data: todasPP } = await get('eventos',
        `select=player_name,x_start,y_start&team_id=eq.${tid}&match_id=eq.${matchId}&event_type=eq.player_possession&period=eq.${periodo}&x_start=not.is.null&limit=5000`
      );
      const posAcum = {}, posCount = {};
      todasPP.forEach(e => {
        if (!titulares.includes(e.player_name)) return;
        if (!posAcum[e.player_name]) { posAcum[e.player_name]={x:0,y:0}; posCount[e.player_name]=0; }
        posAcum[e.player_name].x += e.x_start;
        posAcum[e.player_name].y += e.y_start;
        posCount[e.player_name]++;
      });
      const posMedia = {};
      titulares.forEach(n => {
        posMedia[n] = posCount[n] > 0
          ? { x: posAcum[n].x/posCount[n], y: posAcum[n].y/posCount[n] }
          : { x: 0, y: 0 };
      });

      // 3. Pases completados entre titulares en este periodo
      const { data: pasesData } = await get('eventos',
        `select=player_name,player_targeted_name&team_id=eq.${tid}&match_id=eq.${matchId}&event_type=eq.player_possession&pass_outcome=eq.successful&period=eq.${periodo}&limit=5000`
      );
      const pases = {};
      pasesData.forEach(e => {
        if (!titulares.includes(e.player_name) || !titulares.includes(e.player_targeted_name)) return;
        if (e.player_name === e.player_targeted_name) return;
        const key = \`\${e.player_name}→\${e.player_targeted_name}\`;
        pases[key] = (pases[key]||0)+1;
      });

      // 4. Suplentes que entraron en 2ª parte
      let infoSuplentes = '';
      if (periodo === 2) {
        const { data: suplData } = await get('eventos',
          \`select=player_name,minute_start&team_id=eq.\${tid}&match_id=eq.\${matchId}&event_type=eq.player_possession&period=eq.2&minute_start=gt.47&order=minute_start&limit=1000\`
        );
        const suplMap = {};
        suplData.forEach(e => {
          if (!titulares.includes(e.player_name) && !suplMap[e.player_name]) {
            suplMap[e.player_name] = e.minute_start;
          }
        });
        if (Object.keys(suplMap).length > 0) {
          infoSuplentes = \`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px">
            <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Suplentes 2ª parte</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px">
              \${Object.entries(suplMap).map(([n,m]) => \`
                <div style="background:rgba(88,166,255,0.08);border:1px solid rgba(88,166,255,0.2);border-radius:6px;padding:5px 12px;font-size:12px;display:flex;gap:6px;align-items:center">
                  <span style="color:#58a6ff">↑</span>
                  <span style="color:var(--text)">\${n}</span>
                  <span style="color:var(--text3);font-size:11px">min \${m}'</span>
                </div>\`).join('')}
            </div>
          </div>\`;
        }
      }

      // 5. Dibujar SVG
      const totalPases = {};
      titulares.forEach(p => { totalPases[p] = 0; });
      Object.entries(pases).forEach(([key,n]) => { const [f] = key.split('→'); totalPases[f]=(totalPases[f]||0)+n; });
      const maxPases = Math.max(1, ...Object.values(pases));
      const maxTotal = Math.max(1, ...Object.values(totalPases));

      const W=820, H=540, MX=50, MY=40, PW=W-MX*2, PH=H-MY*2;
      const toSVG = (x,y) => ({
        sx: MX + ((x+52.5)/105)*PW,
        sy: MY + ((34-y)/68)*PH
      });

      let lineas = '';
      Object.entries(pases).forEach(([key,n]) => {
        const [from,to] = key.split('→');
        if (!posMedia[from]||!posMedia[to]) return;
        const {sx:x1,sy:y1} = toSVG(posMedia[from].x, posMedia[from].y);
        const {sx:x2,sy:y2} = toSVG(posMedia[to].x, posMedia[to].y);
        const grosor = 1 + (n/maxPases)*7;
        const op = 0.12 + (n/maxPases)*0.7;
        // Flecha en el centro
        const mx=(x1+x2)/2, my=(y1+y2)/2;
        lineas += \`<line x1="\${x1.toFixed(1)}" y1="\${y1.toFixed(1)}" x2="\${x2.toFixed(1)}" y2="\${y2.toFixed(1)}"
          stroke="#c8a96e" stroke-width="\${grosor.toFixed(1)}" stroke-opacity="\${op.toFixed(2)}" stroke-linecap="round"/>
          <text x="\${mx.toFixed(1)}" y="\${(my-2).toFixed(1)}" text-anchor="middle" font-size="9" fill="#c8a96e" opacity="\${Math.min(op+0.2,1).toFixed(2)}" font-family="'DM Mono',monospace">\${n}</text>\`;
      });

      let nodos = '';
      titulares.forEach(nombre => {
        if (!posMedia[nombre]) return;
        const {sx,sy} = toSVG(posMedia[nombre].x, posMedia[nombre].y);
        const radio = 18 + (totalPases[nombre]/maxTotal)*10;
        const pos = titularesMap[nombre]||'';
        const apellido = nombre.split(' ').slice(-1)[0].substring(0,9);
        nodos += \`<g>
          <circle cx="\${sx.toFixed(1)}" cy="\${sy.toFixed(1)}" r="\${radio.toFixed(1)}"
            fill="#1c2333" stroke="#c8a96e" stroke-width="2.5" opacity="0.97"/>
          <text x="\${sx.toFixed(1)}" y="\${(sy-3).toFixed(1)}" text-anchor="middle"
            font-family="'DM Sans',sans-serif" font-size="9" font-weight="700" fill="#e8c98e">\${pos}</text>
          <text x="\${sx.toFixed(1)}" y="\${(sy+9).toFixed(1)}" text-anchor="middle"
            font-family="'DM Sans',sans-serif" font-size="8" fill="#8b949e">\${apellido}</text>
        </g>\`;
      });

      const rival = partido.local==='Pontevedra CF' ? partido.visitante : partido.local;
      const lugar = partido.local==='Pontevedra CF' ? '🏠 Casa' : '✈️ Fuera';
      const totalPasesCount = Object.values(pases).reduce((a,b)=>a+b,0);

      container.innerHTML = \`
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
          <div>
            <div style="font-size:11px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px">\${partido.jornada} · \${partido.fecha} · \${lugar} · \${periodo===1?'1ª Parte':'2ª Parte'}</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px">Pontevedra CF vs \${rival}</div>
          </div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent)">\${partido.score}</div>
          <div style="margin-left:auto;font-size:12px;color:var(--text2)">\${titulares.length} jugadores · \${totalPasesCount} pases</div>
        </div>

        \${infoSuplentes}

        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px">
          <svg viewBox="0 0 \${W} \${H}" style="width:100%;display:block">
            <rect x="\${MX}" y="\${MY}" width="\${PW}" height="\${PH}" fill="#0d1a0d" stroke="#1e3a1e" stroke-width="1.5"/>
            <line x1="\${W/2}" y1="\${MY}" x2="\${W/2}" y2="\${H-MY}" stroke="#1e3a1e" stroke-width="1"/>
            <circle cx="\${W/2}" cy="\${H/2}" r="\${(PH*9.15/68).toFixed(0)}" fill="none" stroke="#1e3a1e" stroke-width="1"/>
            <rect x="\${MX}" y="\${(MY+PH*(68-40.32)/2/68).toFixed(1)}" width="\${(PW*16.5/105).toFixed(1)}" height="\${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e" stroke-width="1"/>
            <rect x="\${MX}" y="\${(MY+PH*(68-18.32)/2/68).toFixed(1)}" width="\${(PW*5.5/105).toFixed(1)}" height="\${(PH*18.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e" stroke-width="1"/>
            <rect x="\${(W-MX-PW*16.5/105).toFixed(1)}" y="\${(MY+PH*(68-40.32)/2/68).toFixed(1)}" width="\${(PW*16.5/105).toFixed(1)}" height="\${(PH*40.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e" stroke-width="1"/>
            <rect x="\${(W-MX-PW*5.5/105).toFixed(1)}" y="\${(MY+PH*(68-18.32)/2/68).toFixed(1)}" width="\${(PW*5.5/105).toFixed(1)}" height="\${(PH*18.32/68).toFixed(1)}" fill="none" stroke="#1e3a1e" stroke-width="1"/>
            <text x="\${MX+20}" y="\${H-MY+25}" font-family="'DM Sans',sans-serif" font-size="11" fill="#2a4a2a">← Portería propia</text>
            <text x="\${W-MX-20}" y="\${H-MY+25}" text-anchor="end" font-family="'DM Sans',sans-serif" font-size="11" fill="#2a4a2a">Portería rival →</text>
            \${lineas}
            \${nodos}
          </svg>
        </div>

        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px">
          <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px">11 jugadores · \${periodo===1?'1ª Parte':'2ª Parte'}</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            \${titulares.map(n => \`
              <div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;display:flex;gap:6px;align-items:center">
                <span style="color:var(--accent);font-size:10px;font-weight:700">\${titularesMap[n]}</span>
                <span style="color:var(--text)">\${n}</span>
                <span style="color:var(--text3);font-size:11px">\${totalPases[n]} pases</span>
              </div>\`).join('')}
          </div>
        </div>\`;

    } catch(e) {
      container.innerHTML = \`<div style="text-align:center;padding:40px;color:var(--red)">\${e.message}</div>\`;
    }
  }

  // ── MATRIZ DE PASES ──
  async function renderMatriz(matchId) {
    const tid = currentTeam.id;
    const container = document.getElementById('redPasesContainer');
    container.innerHTML = \`<div class="loading"><div class="spinner"></div><span>Calculando matriz...</span></div>\`;
    const partido = PARTIDOS.find(p => p.match_id == matchId);

    try {
      // Todos los jugadores del equipo en el partido con sus pases
      const { data } = await get('eventos',
        \`select=player_name,player_targeted_name,pass_outcome,period&team_id=eq.\${tid}&match_id=eq.\${matchId}&event_type=eq.player_possession&pass_outcome=eq.successful&limit=5000\`
      );

      // Construir matriz
      const jugadores = new Set();
      const matriz = {};
      data.forEach(e => {
        if (!e.player_name || !e.player_targeted_name) return;
        jugadores.add(e.player_name);
        jugadores.add(e.player_targeted_name);
        const key = \`\${e.player_name}|\${e.player_targeted_name}\`;
        matriz[key] = (matriz[key]||0)+1;
      });

      // Ordenar por total de pases dados
      const totalDados = {};
      const totalRecibidos = {};
      jugadores.forEach(j => { totalDados[j]=0; totalRecibidos[j]=0; });
      Object.entries(matriz).forEach(([key,n]) => {
        const [f,t] = key.split('|');
        totalDados[f]=(totalDados[f]||0)+n;
        totalRecibidos[t]=(totalRecibidos[t]||0)+n;
      });

      const jugs = [...jugadores].sort((a,b) => (totalDados[b]||0)-(totalDados[a]||0));
      const maxVal = Math.max(1, ...Object.values(matriz));

      // Cabecera
      const thCells = jugs.map(j => {
        const apellido = j.split(' ').slice(-1)[0].substring(0,7);
        return \`<th style="padding:6px 4px;font-size:9px;letter-spacing:0.5px;color:var(--text3);text-align:center;writing-mode:vertical-rl;transform:rotate(180deg);min-width:28px;max-width:28px">\${apellido}</th>\`;
      }).join('');

      const filas = jugs.map(from => {
        const apellido = from.split(' ').slice(-1)[0].substring(0,9);
        const celdas = jugs.map(to => {
          if (from === to) return \`<td style="background:var(--bg4);border:1px solid var(--border)"></td>\`;
          const n = matriz[\`\${from}|\${to}\`]||0;
          if (n === 0) return \`<td style="border:1px solid var(--border);text-align:center;font-size:10px;color:var(--text3);padding:4px">—</td>\`;
          const intensity = n/maxVal;
          const bg = \`rgba(200,169,110,\${(intensity*0.6+0.08).toFixed(2)})\`;
          const color = intensity > 0.4 ? '#0d1117' : '#e8c98e';
          return \`<td style="background:\${bg};border:1px solid var(--border);text-align:center;font-size:11px;font-weight:600;color:\${color};padding:4px;\${intensity>0.3?'font-family:\'DM Mono\',monospace':''}">\${n}</td>\`;
        }).join('');
        return \`<tr>
          <td style="padding:4px 10px 4px 6px;font-size:11px;color:var(--text);white-space:nowrap;border:1px solid var(--border);font-weight:500">\${apellido}</td>
          \${celdas}
          <td style="padding:4px 8px;font-size:11px;color:var(--accent);font-weight:700;border:1px solid var(--border);text-align:center;font-family:'DM Mono',monospace">\${totalDados[from]||0}</td>
        </tr>\`;
      }).join('');

      const totalRecRow = jugs.map(j => \`<td style="padding:4px 4px;font-size:11px;color:var(--blue);font-weight:700;border:1px solid var(--border);text-align:center;font-family:'DM Mono',monospace">\${totalRecibidos[j]||0}</td>\`).join('');

      const rival = partido.local==='Pontevedra CF' ? partido.visitante : partido.local;

      container.innerHTML = \`
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
          <div>
            <div style="font-size:11px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px">\${partido.jornada} · \${partido.fecha} · Ambas partes</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px">Pontevedra CF vs \${rival}</div>
          </div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--accent)">\${partido.score}</div>
          <div style="margin-left:auto;font-size:12px;color:var(--text2)">\${jugs.length} jugadores · \${data.length} pases completados</div>
        </div>

        <div style="display:flex;gap:16px;font-size:11px;color:var(--text3);margin-bottom:12px">
          <span>Filas = <span style="color:var(--accent)">Pasador</span></span>
          <span>Columnas = <span style="color:var(--blue)">Receptor</span></span>
          <span>El color indica intensidad del vínculo</span>
        </div>

        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:auto">
          <table style="border-collapse:collapse;min-width:100%">
            <thead>
              <tr>
                <th style="padding:6px 10px;font-size:10px;color:var(--text3);border:1px solid var(--border);min-width:80px">Pasador \ Receptor</th>
                \${thCells}
                <th style="padding:6px 8px;font-size:10px;color:var(--accent);border:1px solid var(--border);text-align:center;min-width:36px">TOTAL</th>
              </tr>
            </thead>
            <tbody>
              \${filas}
              <tr style="border-top:2px solid var(--border)">
                <td style="padding:4px 10px;font-size:10px;color:var(--blue);font-weight:700;border:1px solid var(--border)">RECIBIDOS</td>
                \${totalRecRow}
                <td style="border:1px solid var(--border)"></td>
              </tr>
            </tbody>
          </table>
        </div>\`;

    } catch(e) {
      container.innerHTML = \`<div style="text-align:center;padding:40px;color:var(--red)">\${e.message}</div>\`;
    }
  }

  // ── INIT ──
  loadTab('resumen');
</script>
</body>
</html>
